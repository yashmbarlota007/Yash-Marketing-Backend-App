<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yash Marketing Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); }
    .radar-container { max-height: 350px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">

  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
      <div>
        <h1 class="text-4xl font-black text-indigo-900 italic tracking-tighter">YASH MARKETING</h1>
        <p class="text-slate-500 font-bold tracking-widest text-xs uppercase">Distribution Super-App (Backend)</p>
      </div>
      <div class="stats glass shadow-xl rounded-2xl border border-white">
        <div class="stat p-4">
          <div class="stat-title text-indigo-400 font-bold">Total Orders</div>
          <div id="total-count" class="stat-value text-3xl">0</div>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Radar Section -->
      <div class="lg:col-span-4 card glass shadow-2xl p-6 border border-white/50">
        <h2 class="text-sm font-black text-slate-400 mb-6 uppercase tracking-widest">Office Ops Radar</h2>
        <div class="radar-container">
            <canvas id="radarChart"></canvas>
        </div>
      </div>

      <!-- Assembly Line Section -->
      <div class="lg:col-span-8 space-y-4">
        <div class="flex justify-between items-center px-4">
            <h2 id="stage-title" class="font-bold text-slate-600">All Live Orders</h2>
            <button onclick="fetchData()" class="btn btn-sm btn-ghost text-indigo-600">Sync Now</button>
        </div>
        <div id="assembly-line" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
            <!-- Order Cards will be injected here -->
            <div class="text-center py-20"><span class="loading loading-ring loading-lg text-indigo-600"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // APNA APPS SCRIPT URL YAHAN DALEIN
    const API_URL = "YOUR_APPS_SCRIPT_URL_HERE"; 
    
    let allOrders = [];
    const stages = ["Received", "Balance Check", "Call 1", "Processed", "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"];

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        allOrders = await response.json();
        updateUI(allOrders);
      } catch (err) {
        console.error("Error fetching data:", err);
      }
    }

    function updateUI(data) {
      document.getElementById('total-count').innerText = data.length;
      renderCards(data);
      updateRadar(data);
    }

    function renderCards(data) {
      const container = document.getElementById('assembly-line');
      container.innerHTML = data.map(order => `
        <div class="card glass hover:shadow-2xl transition-all border-l-8 ${order.isLate ? 'border-red-500' : 'border-indigo-500'} p-5 cursor-pointer">
          <div class="flex justify-between items-center">
            <div>
              <span class="text-[10px] font-bold text-indigo-400">#${order.Order_ID}</span>
              <h3 class="text-lg font-bold text-slate-800">${order.Dealer_Name}</h3>
              <p class="text-xs text-slate-500 font-medium">${order.Items || 'Stock Processing...'}</p>
            </div>
            <div class="text-right">
              <div class="badge badge-indigo text-white p-3 font-bold">${order.Current_Status || 'Received'}</div>
              <p class="text-[10px] text-slate-400 mt-2 font-bold">${new Date(order.Date).toLocaleDateString()}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Chart logic setup
    const ctx = document.getElementById('radarChart');
    const chart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: stages,
            datasets: [{
                label: 'Orders in Dept',
                data: [0,0,0,0,0,0,0,0,0],
                backgroundColor: 'rgba(99, 102, 241, 0.2)',
                borderColor: 'rgb(99, 102, 241)',
                pointBackgroundColor: 'rgb(99, 102, 241)',
            }]
        }
    });

    function updateRadar(data) {
      const counts = stages.map(s => data.filter(o => o.Current_Status === s).length);
      chart.data.datasets[0].data = counts;
      chart.update();
    }

    // Auto-load
    fetchData();
    setInterval(fetchData, 30000); // 30 seconds auto-refresh
  </script>
</body>
</html>
