// Extremely robust case & space insensitive column reader helper
function getProp(obj, propName) {
  if (!obj) return "";
  if (obj[propName] !== undefined) return obj[propName];
  var cleanTarget = propName.toLowerCase().replace(/[^a-z0-9]/g, "");
  for (var key in obj) {
    var cleanKey = key.toLowerCase().replace(/[^a-z0-9]/g, "");
    if (cleanKey === cleanTarget) {
      return obj[key];
    }
  }
  return "";
}

function getSmartImage(product) {
  if (!product) return null;
  var imageUrl = getProp(product, "ImageURL");
  if (imageUrl && String(imageUrl).trim() !== "") {
    let url = String(imageUrl).trim();
    if (url.indexOf("//") === 0) {
      url = "https:" + url;
    }
    if (url.includes("drive.google.com")) {
      let fileId = "";
      const dMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (dMatch) fileId = dMatch[1];
      else if (idMatch) fileId = idMatch[1];
      if (fileId) return "https://drive.google.com/uc?export=view&id=" + fileId;
    }
    return url;
  }

  var brand = String(getProp(product, "Brand") || "").toUpperCase();
  if (brand.indexOf("BOAT") > -1) return "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Boat_Logo.webp/512px-Boat_Logo.webp.png";
  if (brand.indexOf("PORTRONICS") > -1) return "https://portronics.com/cdn/shop/files/Portronics_Logo_01_1.png";
  if (brand.indexOf("JBL") > -1) return "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/JBL_logo.svg/512px-JBL_logo.svg.png";
  if (brand.indexOf("HIKVISION") > -1) return "https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Hikvision_logo.svg/512px-Hikvision_logo.svg.png";
  if (brand) return "https://ui-avatars.com/api/?name=" + encodeURIComponent(brand) + "&background=f3f4f6&color=1e3a8a&size=200&bold=true";
  return null;
}

function ProgressBar(props) {
  var totalAmount = props.totalAmount;
  var discounts = props.discounts;

  var sortedDiscounts = [...discounts]
  .map(d => ({ minAmount: Number(d.minAmount), percent: Number(d.percent) }))
  .filter(d => !isNaN(d.minAmount) && !isNaN(d.percent))
  .sort((a, b) => a.minAmount - b.minAmount);

  if (sortedDiscounts.length === 0) return null;

  var activeTier = null;
  var nextTier = null;

  for (var i = 0; i < sortedDiscounts.length; i++) {
    if (totalAmount >= sortedDiscounts[i].minAmount) {
      activeTier = sortedDiscounts[i];
    } else {
      nextTier = sortedDiscounts[i];
      break;
    }
  }

  var progress = 0;
  var message = "";

  if (!activeTier) {
    var first = sortedDiscounts[0];
    progress = (totalAmount / first.minAmount) * 100;
    message = "Add ₹" + (first.minAmount - totalAmount).toLocaleString('en-IN') + " more to unlock " + first.percent + "% discount";
  } else if (nextTier) {
    var range = nextTier.minAmount - activeTier.minAmount;
    var currentInRange = totalAmount - activeTier.minAmount;
    progress = (currentInRange / range) * 100;
    message = "🎉 " + activeTier.percent + "% Unlocked! Add ₹" + (nextTier.minAmount - totalAmount).toLocaleString('en-IN') + " more to get " + nextTier.percent + "% discount";
  } else {
    progress = 100;
    message = "🎉 Maximum " + activeTier.percent + "% Bulk Discount Unlocked!";
  }

  return (
    <div className="bg-amber-50 p-4 border-b-2 border-amber-200 shadow-sm">
      <div className="flex justify-between text-xs font-black text-amber-900 mb-1.5 uppercase tracking-wider">
        <span>Bulk Discount Tracker</span>
        <span className="bg-amber-200 px-2 py-0.5 rounded-full text-[11px]">
          {activeTier ? activeTier.percent + "% Active" : "No Discount"} (₹{totalAmount.toLocaleString('en-IN')})
        </span>
      </div>
      <div className="w-full bg-gray-200 h-4 rounded-full overflow-hidden border border-gray-300 shadow-inner">
        <div className="bg-green-600 h-full transition-all duration-300" style={{ width: Math.min(progress, 100) + '%' }}></div>
      </div>
      <p className="text-[10px] text-green-800 font-black mt-2 uppercase tracking-wide flex items-center gap-1">
        <span>💡</span> {message}
      </p>
    </div>
  );
}

// Case-insensitive, grouping corrector to solve the "Standard" issue
function groupProductsByVariant(flatList) {
  var grouped = {};
  var capacityRegex = /\b(\d+\s*?GB|\d+\s*?TB|\d+\s*?W|\d+\s*?MAH)\b/i;

  flatList.forEach(function(p) {
    // BUG FIX: Wrapped everything in String() to prevent numeric crashes
    var name = String(getProp(p, "ProductName") || "");
    var brand = String(getProp(p, "Brand") || "");
    var type = String(getProp(p, "Type") || "");
    var itemCode = String(getProp(p, "ItemCode") || "");

    if (!name) {
      name = "Product " + (itemCode || Math.random().toString(36).substr(2, 5));
    }

    var match = name.match(capacityRegex);
    var capacity = match ? match[1].toUpperCase().replace(/\s/g, "") : "";

    var baseName = name;
    if (match) {
      baseName = name.replace(match[0], "").replace(/\s+/g, " ").trim();
      baseName = baseName.replace(/^[-/\s]+|[-/\s]+$/g, "").replace(/\s+/g, " ").trim();
    }

    var groupKey = capacity
    ? (brand.toLowerCase() + "_" + type.toLowerCase() + "_" + baseName.toLowerCase())
    : (brand.toLowerCase() + "_" + type.toLowerCase() + "_" + name.toLowerCase() + "_" + itemCode);

    if (!grouped[groupKey]) {
      grouped[groupKey] = {
        key: groupKey,
        baseName: baseName,
        Brand: brand,
        Type: type,
        Features: String(getProp(p, "Features") || ""),
        ImageURL: getProp(p, "ImageURL"),
        MoreImages: getProp(p, "MoreImages"),
        variants: []
      };
    }

    grouped[groupKey].variants.push(
      Object.assign({}, p, {
        ProductName: name,
        capacity: capacity || "Standard"
      })
    );
  });

  return Object.keys(grouped).map(function(k) {
    var group = grouped[k];

    group.variants.sort(function(a, b) {
      var numA = parseInt(a.capacity) || 0;
      var numB = parseInt(b.capacity) || 0;
      return numA - numB;
    });

    var primary = group.variants[0];
    var primaryName = String(getProp(primary, "ProductName") || "");
    return Object.assign({}, primary, {
      ProductName: group.variants.length > 1 ? group.baseName : primaryName,
      isGrouped: group.variants.length > 1,
      variants: group.variants
    });
  });
}

function calculateSchemeProgress(cartItems, scheme) {
  let currentQty = 0;
  cartItems.forEach(item => {
    const itemName = String(getProp(item, "ProductName") || "").toLowerCase();
    const brand = String(getProp(item, "Brand") || "").toLowerCase();
    const type = String(getProp(item, "Type") || "").toLowerCase();
    const target = String(scheme.target || "").toLowerCase();
    
    if (scheme.type === "Product" && itemName.includes(target)) {
      currentQty += item.qty;
    } else if (scheme.type === "Brand" && brand.includes(target)) {
      currentQty += item.qty;
    } else if (scheme.type === "MixCategory") {
      const targets = target.split(",").map(t => t.trim());
      if (targets.some(t => type.includes(t) || itemName.includes(t))) {
        currentQty += item.qty;
      }
    }
  });
  return {
    current: currentQty,
    required: scheme.minQty,
    isUnlocked: currentQty >= scheme.minQty
  };
}

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState("catalog");
  const [products, setProducts] = useState([]);

  // Permanent Cart (Background Clear Proof)
  const [cart, setCart] = useState(() => {
    try {
      const savedCart = localStorage.getItem("yashDealerCart");
      return savedCart ? JSON.parse(savedCart) : {};
    } catch (e) {
      return {};
    }
  });

  const [loading, setLoading] = useState(false);
  const [customerMode, setCustomerMode] = useState(false);
  const [announcements, setAnnouncements] = useState([]);
  const [showNotice, setShowNotice] = useState(false);
  const [isNotificationGranted, setIsNotificationGranted] = useState(true);

  // Smart Back Button Setup
  useEffect(() => {
    window.history.replaceState({ page: 'catalog' }, '');
    const handlePopState = (e) => {
      if (e.state && e.state.page) {
        setView(e.state.page);
      } else {
        setView('catalog');
      }
    };
    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, []);

  const handleSetView = (newView) => {
    if (newView !== view) {
      window.history.pushState({ page: newView }, '');
      setView(newView);
    }
  };

  useEffect(() => {
    try {
      const savedUser = localStorage.getItem("yashDealerSession");
      if (savedUser) {
        setUser(JSON.parse(savedUser));
      }
    } catch (e) {
      console.error(e);
    }
  }, []);

  // Save cart to LocalStorage instantly
  useEffect(() => {
    localStorage.setItem("yashDealerCart", JSON.stringify(cart));
  }, [cart]);

  useEffect(() => {
    if (window.Notification) {
      if (Notification.permission !== "granted") {
        setIsNotificationGranted(false);
      }
    }
  }, []);

  useEffect(() => {
    if (user) {
      fetch(API_URL + cacheBypass, {
        method: 'POST',
        body: JSON.stringify({ action: "getAnnouncements" }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      })
      .then(r => r.json())
      .then(res => {
        let parsedData = [];
        if (res && res.success && Array.isArray(res.data)) {
          parsedData = res.data;
        } else if (res && Array.isArray(res.data)) {
          parsedData = res.data;
        } else if (Array.isArray(res)) {
          parsedData = res;
        }

        if (parsedData.length > 0) {
          setAnnouncements(parsedData);
          setShowNotice(true);
        } else {
          setShowNotice(false);
        }
      }).catch((e) => {
        var defaultMsg = [{
          title: "Welcome to Yash Marketing",
          message: "Naye schemes aur bulk order discount live hain. Kisi bhi inquiry ke liye direct WhatsApp par contact karein."
        }];
        setAnnouncements(defaultMsg);
        setShowNotice(true);
      });
    }
  }, [user]);

  const logSpyData = (eventName, detailsStr) => {
    var details = detailsStr || "";
    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: "logEvent", phone: user ? user.phone : "Unknown", shopName: user ? user.shopName : "Unknown", event: eventName, details: details }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    }).catch(e => console.log("Silent Log Failed"));
  };

  const globalProps = { logSpyData, customerMode };

  const callAPI = function(payload) {
    return fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    })
    .then(function(response) {
      return response.json();
    })
    .catch(function(e) {
      alert("🚨 API CONNECT ERROR:\n" + e.toString() + "\n\nTarget URL: " + API_URL);
      return { success: false, message: "Network Error: Check Internet" };
    });
  };

  const handleRequestPermission = () => {
    if (window.Notification) {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          setIsNotificationGranted(true);
        } else {
          alert("App use karne ke liye Permission allow karna compulsory hai!");
        }
      });
    }
  };

  const handleLogout = () => {
    localStorage.removeItem("yashDealerSession");
    localStorage.removeItem("yashDealerCart");
    setUser(null);
    setCart({});
    handleSetView("catalog");
  };

  if (!user) return <LoginScreen onLogin={(data) => { setUser(data); }} callAPI={callAPI} loading={loading} setLoading={setLoading} />;

  if (!isNotificationGranted) {
    return (
      <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-white p-6 text-center select-none font-sans">

        </div>

        </div>
        <div className="flex gap-1.5 items-center">
          <button onClick={() => {
            const m = !customerMode;
            setCustomerMode(m);
            if (m && (view === "ledger" || view === "orders")) handleSetView("catalog");
            logSpyData(m ? "Enabled Customer Mode" : "Disabled Customer Mode");
          }} className={`text-[10px] font-black px-2.5 py-2 rounded-lg transition-colors shadow-sm ${customerMode ? 'bg-green-600 text-white' : 'bg-blue-800 text-blue-100'}`}>
            {customerMode ? "👥 CUSTOMER" : "💼 DEALER"}
          </button>
