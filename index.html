<script>
    const API_URL = "APNA_APPS_SCRIPT_URL_YAHAN_DALEIN";
    let allOrders = [];
    const stages = ["Received", "Balance Check", "Call 1", "Processed", "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"];

    async function fetchData() {
        const response = await fetch(API_URL);
        allOrders = await response.json();
        renderUI(allOrders);
        updateRadar(allOrders);
    }

    function renderUI(orders) {
        const container = document.getElementById('assembly-line');
        container.innerHTML = orders.map(o => {
            // Date Format: DD/MM/YY
            const dateObj = new Date(o.Date);
            const formattedDate = `${dateObj.getDate()}/${dateObj.getMonth()+1}/${dateObj.getFullYear().toString().slice(-2)}`;
            
            return `
                <div class="card glass shadow-md p-4 border-l-4 border-indigo-600 cursor-pointer hover:bg-white/50" onclick="openProcessModal('${o.Order_ID}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-400">#${o.Order_ID}</span>
                            <h3 class="font-bold text-slate-800">${o.Dealer_Name}</h3>
                            <p class="text-[11px] text-slate-500 line-clamp-1">${o.Items || 'No items'}</p>
                        </div>
                        <div class="text-right">
                            <div class="badge badge-sm badge-primary">${o.Current_Status || 'Received'}</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-2">${formattedDate}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openProcessModal(id) {
        const order = allOrders.find(o => o.Order_ID === id);
        document.getElementById('m-dealer').innerText = order.Dealer_Name;
        document.getElementById('m-id').innerText = "ID: " + order.Order_ID;
        
        // --- NEW: Display Stock Items in Modal ---
        const proofViewer = document.getElementById('proof-viewer');
        proofViewer.innerHTML = `
            <div class="col-span-2 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <h4 class="text-[10px] font-bold text-indigo-600 uppercase mb-2">Order Items (Pick-List)</h4>
                <div class="text-sm font-bold text-slate-700 whitespace-pre-line">
                    ${order.Items ? order.Items.split('|').join('\n') : 'No items listed'}
                </div>
            </div>
        `;

        // Update Steps UI
        const currentStageIdx = stages.indexOf(order.Current_Status || "Received");
        const steps = document.querySelectorAll('.step');
        steps.forEach((s, idx) => {
            if(idx <= currentStageIdx) s.classList.add('step-primary');
            else s.classList.remove('step-primary');
        });

        // Toggle Input based on stage
        const input = document.getElementById('media-upload');
        if(order.Current_Status === "Received") {
            // Received par upload ki zarurat nahi, sirf button daba ke aage badho
            document.getElementById('input-container').innerHTML = "<p class='text-sm italic text-slate-400'>Order Received. Click below to start Balance Check.</p>";
        } else {
            document.getElementById('input-container').innerHTML = `<input type="file" id="media-upload" class="file-input file-input-bordered file-input-primary w-full shadow-sm" ${order.Current_Status.includes('Call') ? 'accept="audio/*"' : 'accept="image/*" capture="environment"'} />`;
        }

        window.currentOrderId = id;
        window.currentStatus = order.Current_Status || "Received";
        process_modal.showModal();
    }

    async function submitStep() {
        const nextIdx = stages.indexOf(window.currentStatus) + 1;
        if(nextIdx >= stages.length) return alert("Order already completed!");

        const btn = event.target;
        btn.innerText = "Syncing...";
        btn.disabled = true;

        const payload = {
            orderId: window.currentOrderId,
            currentStage: window.currentStatus,
            nextStage: stages[nextIdx],
            fileUrl: "Link_will_appear_here" // Base64 logic can be added later
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert("Step Completed!");
            fetchData();
            process_modal.close();
        } catch(e) {
            alert("Error syncing. Try again.");
        } finally {
            btn.innerText = "Submit Progress & Sync";
            btn.disabled = false;
        }
    }
</script>
