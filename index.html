<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .stage-card { 
            transition: all 0.2s; 
            cursor: pointer; 
        }
        .stage-card:hover { 
            transform: translateY(-2px); 
            border-color: #3b82f6; 
        }
        ::-webkit-scrollbar { 
            width: 6px; 
            height: 6px; 
        }
        ::-webkit-scrollbar-track { 
            background: #1e293b; 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #475569; 
            border-radius: 4px; 
        }
        .hide-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        @keyframes slideDown { 
            from { transform: translateY(-100%); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .toast-enter { 
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
    </style>
</head>
<body class="min-h-screen p-2 md:p-8">

    <!-- Notification Radar Area -->
    <div id="notificationArea" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none">
    </div>

    <!-- Login Authentication Screen -->
    <div id="loginScreen" class="flex h-[80vh] items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                YASH MARKETING
            </h1>
            <p class="text-slate-400 text-sm tracking-widest mb-8 uppercase">
                Staff Login Interface
            </p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="loginEmpId" placeholder="Employee ID (e.g. YM001)" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                <input type="password" id="loginPass" placeholder="Password" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition">
                    Access System
                </button>
            </form>
            <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- Main Operational Dashboard Screen -->
    <div id="dashboardScreen" class="hidden max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 border-b border-slate-700 pb-4 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-white">Active Sprints</h1>
                <p class="text-emerald-400 text-sm mt-1">Operator: <span id="userName" class="font-bold"></span></p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <input type="date" id="historyDate" onchange="renderDashboard()" 
                       class="bg-slate-800 text-sm text-white rounded-lg p-2 border border-slate-600 flex-1 md:flex-none outline-none focus:border-blue-500">
                <button onclick="clearDateFilter()" 
                        class="text-sm font-semibold text-blue-400 hover:text-blue-300 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition">
                    Clear
                </button>
                <button onclick="logout()" 
                        class="text-red-400 hover:text-red-300 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg border border-slate-700 text-sm font-bold transition shadow-sm">
                    Logout
                </button>
            </div>
        </div>

        <!-- MDO Command Center (Owner Exclusive) -->
        <div id="mdoCommandCenter" class="hidden mb-6">
            <!-- Populated via JS if user is Owner -->
        </div>

        <!-- Premium KPI Filter Pipeline -->
        <div id="stageFilterBar" class="flex overflow-x-auto gap-3 mb-6 pb-2 hide-scrollbar">
            <!-- Dynamically Populated via JS -->
        </div>
        
        <!-- Order Cards Grid (Minimum 4 cards visible) -->
        <div id="orderGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Dynamically Populated via JS -->
        </div>
    </div>

    <!-- Order Execution Task Modal -->
    <div id="orderModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-95 backdrop-blur-sm flex items-center justify-center z-50 p-3">
        <div class="glass-panel w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh] shadow-2xl border border-slate-600">
            <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/90 shadow-md z-10">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight" id="modalOrderId">ORD-000</h2>
                    <p class="text-emerald-400 text-sm font-bold mt-1" id="modalShopName">Shop Name</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-4xl leading-none transition-colors">
                    &times;
                </button>
            </div>
            
            <div class="p-4 md:p-6 overflow-y-auto flex-grow bg-slate-900/50" id="stagesContainer">
                <!-- Items List & Execution Stages Populated Here -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION AND GLOBAL STATE
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbyws0jd3sL7L3rp0nXsHxcnI3A8npsJldRuCeSV_BswzHsYB5Syzm9dLpFlSA_tIW0vsQ/exec"; // <--- MENDATORY TO UPDATE
        
        const STAGE_NAMES = [
            "Order Received", 
            "Balance Check", 
            "Call 1 (Confirmation)", 
            "Processed (Stock)", 
            "Invoiced", 
            "Dispatched", 
            "Call 2 (Out-for-delivery)", 
            "Delivered", 
            "Final Call (Rating)"
        ];

        let allOrdersData = [];
        let currentActiveOrder = null;
        let activeStageFilter = null;
        let latestOrderTimestamp = null;
        let autoRefreshInterval = null;
        let queuedFiles = []; 
        let currentUserRole = 'Staff';

        // ==========================================
        // LOGIN & AUTHENTICATION
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            
            btn.innerText = "Authenticating Operator...";
            
            try {
                const payload = {
                    action: 'login', 
                    employeeId: document.getElementById('loginEmpId').value, 
                    password: document.getElementById('loginPass').value
                };
                
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('yash_user', data.user.name);
                    localStorage.setItem('yash_role', data.user.role || 'Staff');
                    
                    showDashboard(data.user.name, data.user.role);
                } else {
                    error.innerText = data.message; 
                    error.classList.remove('hidden'); 
                    btn.innerText = "Access System";
                }
            } catch (err) {
                error.innerText = "Network Error. Check API_URL."; 
                error.classList.remove('hidden'); 
                btn.innerText = "Access System";
            }
        });

        function showDashboard(name, role) {
            currentUserRole = role || 'Staff';
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = name;
            
            fetchOrders(false);
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => { 
                fetchOrders(true); 
            }, 15000); // 15 seconds live radar
        }

        function logout() { 
            localStorage.removeItem('yash_user'); 
            localStorage.removeItem('yash_role'); 
            location.reload(); 
        }
        
        if (localStorage.getItem('yash_user')) { 
            showDashboard(localStorage.getItem('yash_user'), localStorage.getItem('yash_role')); 
        }

        // ==========================================
        // NOTIFICATIONS
        // ==========================================
        function showNotification(title, message) {
            const area = document.getElementById('notificationArea');
            const toast = document.createElement('div');
            
            toast.className = "bg-slate-800 text-white px-5 py-3 rounded-xl shadow-[0_10px_40px_rgba(37,99,235,0.4)] border border-blue-500 flex items-center gap-4 toast-enter pointer-events-auto";
            toast.innerHTML = `
                <span class="text-2xl animate-bounce">🚨</span>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-blue-400">${title}</p>
                    <p class="text-sm font-bold text-white mt-0.5">${message}</p>
                </div>
            `;
            
            area.appendChild(toast);
            
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300); 
            }, 6000);
        }

        // ==========================================
        // DATA FETCHING & SYNCING
        // ==========================================
        async function fetchOrders(isSilent = false) {
            const grid = document.getElementById('orderGrid');
            
            if (!isSilent && allOrdersData.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-blue-400 text-center font-bold text-lg animate-pulse mt-10">📡 Fetching Radar Data from Control Tower...</p>';
            }
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getOrders' }) 
                });
                const response = await res.json();
                
                if (response.status === 'success') {
                    const newOrders = response.data;
                    
                    if (newOrders.length > 0 && latestOrderTimestamp !== null) {
                        const incomingLatest = new Date(newOrders[0].date).getTime();
                        if (incomingLatest > latestOrderTimestamp) {
                            showNotification("New Order Detected", newOrders[0].shopName);
                        }
                    }
                    if (newOrders.length > 0) {
                        latestOrderTimestamp = new Date(newOrders[0].date).getTime();
                    }
                    
                    allOrdersData = newOrders;
                    renderDashboard();

                    if (currentActiveOrder && !document.getElementById('orderModal').classList.contains('hidden')) {
                        const updatedOrder = allOrdersData.find(o => o.orderId === currentActiveOrder.orderId);
                        if (updatedOrder) {
                            openModal(updatedOrder); 
                        }
                    }
                }
            } catch (err) { 
                console.log("Background sync error."); 
            }
        }

        function clearDateFilter() { 
            document.getElementById('historyDate').value = ""; 
            renderDashboard(); 
        }
        
        function setStageFilter(stageIndex) { 
            activeStageFilter = stageIndex; 
            renderDashboard(); 
        }

        // ==========================================
        // OWNER MDO DASHBOARD RENDERING
        // ==========================================
        function renderMdoDashboard() {
            const userName = localStorage.getItem('yash_user') || "";
            const isOwner = currentUserRole.toLowerCase() === 'admin' || currentUserRole.toLowerCase() === 'owner' || userName.toLowerCase().includes('yash');
            
            const mdoDiv = document.getElementById('mdoCommandCenter');
            
            if (!isOwner) {
                mdoDiv.classList.add('hidden');
                return;
            }
            
            mdoDiv.classList.remove('hidden');

            // 1. Dealer LTV & 2. Pareto Matrix
            let shopStats = {};
            allOrdersData.forEach(o => {
                if(!shopStats[o.shopName]) shopStats[o.shopName] = { count: 0, items: 0, lastOrder: new Date(0) };
                shopStats[o.shopName].count++;
                let d = new Date(o.date);
                if(d > shopStats[o.shopName].lastOrder) shopStats[o.shopName].lastOrder = d;
                
                o.items.forEach(i => {
                    shopStats[o.shopName].items += parseInt(i.qty || 1);
                });
            });

            let sortedShops = Object.entries(shopStats).sort((a,b) => b[1].items - a[1].items);
            let top20Count = Math.max(1, Math.ceil(sortedShops.length * 0.2));
            let vipShops = sortedShops.slice(0, top20Count);
            
            let now = new Date();
            let vipAlerts = vipShops.filter(s => (now - s[1].lastOrder) / (1000*60*60*24) > 14);

            // 3. Pipeline Friction
            let stageStuck = Array(9).fill(0);
            allOrdersData.forEach(o => {
                if(!o.isFullyCompleted) stageStuck[o.completedStages]++;
            });
            let maxStuck = Math.max(...stageStuck);
            let frictionStage = maxStuck > 0 ? STAGE_NAMES[stageStuck.indexOf(maxStuck)] : "All Clear";

            // 4. Brand Asymmetry (Volume)
            let brandStats = { 'boAt': 0, 'Velocity': 0, 'Portronics': 0, 'JBL': 0, 'Hikvision': 0, 'Others': 0 };
            allOrdersData.forEach(o => {
                o.items.forEach(i => {
                    let name = i.name.toLowerCase();
                    let qty = parseInt(i.qty || 1);
                    if(name.includes('boat')) brandStats['boAt'] += qty;
                    else if(name.includes('velocity')) brandStats['Velocity'] += qty;
                    else if(name.includes('portronics')) brandStats['Portronics'] += qty;
                    else if(name.includes('jbl')) brandStats['JBL'] += qty;
                    else if(name.includes('hikvision')) brandStats['Hikvision'] += qty;
                    else brandStats['Others'] += qty;
                });
            });

            // 5 & 6. Sprint Velocity & Accountability Scorecard
            let staffBottlenecks = [
                { role: 'Sales (Call 1/2)', stuck: stageStuck[2] + stageStuck[6] },
                { role: 'Warehouse (Picking)', stuck: stageStuck[3] },
                { role: 'Accounts (Invoicing)', stuck: stageStuck[4] },
                { role: 'Dispatch (Logistics)', stuck: stageStuck[5] }
            ].sort((a,b) => b.stuck - a.stuck);
            let biggestLag = staffBottlenecks[0].stuck > 0 ? staffBottlenecks[0] : { role: 'System Optimal', stuck: 0 };

            // 7. S-30 MDO Pulse
            let today = new Date().toDateString();
            let todayOrders = allOrdersData.filter(o => new Date(o.date).toDateString() === today).length;
            let totalPending = allOrdersData.filter(o => !o.isFullyCompleted).length;

            mdoDiv.innerHTML = `
                <div class="glass-panel border-l-4 border-l-purple-500 rounded-xl p-4 md:p-6 shadow-2xl">
                    <h2 class="text-xl font-black text-purple-400 mb-4 flex items-center gap-2">
                        <span class="text-2xl">👑</span> MDO Control Tower (S-30 Pulse)
                    </h2>
                    
                    <!-- Pulse & KPI Grid -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Today's Pulse</div>
                            <div class="text-3xl font-black text-white">${todayOrders} <span class="text-xs text-emerald-400 font-bold">Orders</span></div>
                        </div>
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Total Pipeline</div>
                            <div class="text-3xl font-black text-white">${totalPending} <span class="text-xs text-blue-400 font-bold">Active</span></div>
                        </div>
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 border-l-2 border-l-red-500 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Friction Index</div>
                            <div class="text-lg font-black text-red-400 truncate leading-tight" title="${frictionStage}">${frictionStage}</div>
                            <div class="text-xs text-slate-500 mt-1 font-bold">${maxStuck} Orders Stuck</div>
                        </div>
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Velocity Scorecard</div>
                            <div class="text-sm font-black text-orange-400 truncate leading-tight">Lag: ${biggestLag.role}</div>
                            <div class="text-xs text-slate-500 mt-1 font-bold">- ${biggestLag.stuck} Tasks Pending</div>
                        </div>
                    </div>

                    <!-- Matrix & Heatmap Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Pareto Dealer Matrix -->
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                            <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest mb-3 border-b border-slate-700 pb-2">Pareto Matrix (80/20 VIPs)</h3>
                            <div class="max-h-40 overflow-y-auto hide-scrollbar space-y-2 pr-1">
                                ${vipAlerts.length > 0 ? vipAlerts.map(v => `
                                    <div class="flex justify-between items-center bg-red-900/30 border border-red-500/50 p-2.5 rounded-lg animate-pulse">
                                        <span class="text-xs font-black text-red-400 truncate w-2/3">🚨 ${v[0]}</span>
                                        <span class="text-[9px] font-black text-slate-300 bg-red-950 px-2 py-1 rounded tracking-widest uppercase">No Order >14 Days</span>
                                    </div>
                                `).join('') : '<div class="text-xs text-emerald-500 font-bold p-2 bg-emerald-900/20 rounded border border-emerald-500/20">All VIPs are active and ordering.</div>'}
                                
                                ${vipShops.slice(0, 10).map((v, i) => `
                                    <div class="flex justify-between items-center p-2 border-b border-slate-800 last:border-0 hover:bg-slate-800 rounded transition">
                                        <span class="text-xs font-bold text-slate-300 truncate w-2/3"><span class="text-slate-500 mr-2">#${i+1}</span>${v[0]}</span>
                                        <span class="text-xs font-black text-blue-400 bg-blue-900/30 px-2 py-0.5 rounded">LTV: ${v[1].items}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Brand Asymmetry Heatmap -->
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 flex flex-col">
                            <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest mb-3 border-b border-slate-700 pb-2 flex justify-between">
                                <span>Brand Asymmetry</span>
                                <span class="text-purple-400">Profit vs Vol</span>
                            </h3>
                            <div class="flex-1 flex items-end gap-3 mt-4 h-32 px-2">
                                ${Object.entries(brandStats).filter(b => b[1] > 0).map(b => {
                                    let total = Object.values(brandStats).reduce((a,c)=>a+c, 0);
                                    let h = total > 0 ? Math.max(15, (b[1]/total)*100) : 0;
                                    let color = b[0] === 'Velocity' ? 'bg-purple-500' : (b[0] === 'boAt' ? 'bg-red-500' : 'bg-blue-500'); 
                                    return `
                                    <div class="flex-1 flex flex-col items-center justify-end group relative cursor-pointer">
                                        <div class="absolute -top-8 bg-slate-800 text-[10px] font-black text-white px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity z-10 border border-slate-600">${b[1]} Units</div>
                                        <div class="w-full ${color} rounded-t-md transition-all shadow-[0_0_10px_rgba(0,0,0,0.5)]" style="height: ${h}%"></div>
                                        <span class="text-[10px] text-slate-400 mt-2 font-bold truncate w-full text-center">${b[0]}</span>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // DASHBOARD RENDERING (GRIDS & PIPELINE)
        // ==========================================
        function renderDashboard() {
            renderMdoDashboard(); // Render MDO features if applicable

            const grid = document.getElementById('orderGrid');
            const filterBar = document.getElementById('stageFilterBar');
            const selectedDate = document.getElementById('historyDate').value;
            
            let baseOrders = allOrdersData.filter(order => {
                if (selectedDate) {
                    return new Date(order.date).toISOString().split('T')[0] === selectedDate;
                }
                return !order.isFullyCompleted;
            });

            let stageCounts = Array(9).fill(0);
            baseOrders.forEach(o => { 
                if (o.completedStages < 9) {
                    stageCounts[o.completedStages]++; 
                }
            });

            let filterHtml = `
                <div onclick="setStageFilter(null)" class="cursor-pointer ${activeStageFilter === null ? 'bg-gradient-to-br from-blue-600 to-blue-800 border-blue-400 shadow-lg shadow-blue-500/30' : 'bg-slate-800 border-slate-700 hover:bg-slate-700'} flex flex-col justify-between p-3 rounded-xl border min-w-[120px] shrink-0 transition-all">
                    <span class="${activeStageFilter === null ? 'text-blue-200' : 'text-slate-400'} text-[10px] font-bold uppercase tracking-wider mb-1">Overview</span>
                    <span class="text-white text-sm font-bold mb-2">All Active</span>
                    <div class="flex items-center justify-between mt-auto pt-2 border-t border-slate-600/30">
                        <span class="text-[10px] ${activeStageFilter === null ? 'text-blue-200' : 'text-slate-500'} font-bold uppercase">Total</span>
                        <span class="${activeStageFilter === null ? 'bg-white text-blue-900' : 'bg-slate-900 text-slate-400'} px-2 py-0.5 rounded text-xs font-black">${baseOrders.length}</span>
                    </div>
                </div>
            `;
            
            STAGE_NAMES.forEach((name, idx) => {
                let isActive = activeStageFilter === idx;
                let orderCount = stageCounts[idx];
                
                filterHtml += `
                <div onclick="setStageFilter(${idx})" class="cursor-pointer ${isActive ? 'bg-gradient-to-br from-blue-600 to-blue-800 border-blue-400 shadow-lg shadow-blue-500/30' : 'bg-slate-800 border-slate-700 hover:bg-slate-700'} flex flex-col justify-between p-3 rounded-xl border min-w-[130px] shrink-0 transition-all">
                    <span class="${isActive ? 'text-blue-200' : 'text-slate-500'} text-[10px] font-bold uppercase tracking-wider mb-1">Step ${idx+1}</span>
                    <span class="${isActive ? 'text-white' : 'text-slate-300'} text-sm font-bold mb-2 leading-tight">${name.split(' (')[0]}</span>
                    <div class="flex items-center justify-between mt-auto pt-2 border-t border-slate-600/30">
                        <span class="text-[10px] ${isActive ? 'text-blue-200' : 'text-slate-500'} font-bold uppercase">Pending</span>
                        <span class="${orderCount > 0 ? (isActive ? 'bg-white text-blue-900' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/20') : (isActive ? 'bg-blue-900/50 text-blue-300' : 'bg-slate-900 text-slate-600')} px-2 py-0.5 rounded text-xs font-black">${orderCount}</span>
                    </div>
                </div>`;
            });
            
            filterBar.innerHTML = filterHtml;

            let displayOrders = activeStageFilter !== null ? baseOrders.filter(o => o.completedStages === activeStageFilter) : baseOrders;
            grid.innerHTML = '';
            
            if (displayOrders.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-slate-800/30 border border-slate-700/50 p-8 rounded-2xl text-center">
                        <p class="text-slate-400 text-lg font-medium">Inbox Zero. No orders pending here.</p>
                    </div>`;
                return;
            }

            displayOrders.forEach(order => {
                const progress = (order.completedStages / 9) * 100;
                let nextStepName = order.completedStages < 9 ? STAGE_NAMES[order.completedStages].split(' (')[0] : "Fully Completed";
                
                let dateStr = "";
                if (order.date) {
                    const d = new Date(order.date);
                    if (!isNaN(d)) {
                        dateStr = `${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
                    }
                }

                grid.innerHTML += `
                    <div onclick='openModal(${JSON.stringify(order).replace(/'/g, "\\'")})' class="bg-slate-800 border border-slate-700 hover:border-blue-500 rounded-xl p-4 stage-card shadow-lg flex flex-col justify-between relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-12 h-12 bg-blue-500/10 rounded-bl-full transition-transform group-hover:scale-150"></div>
                        
                        <div class="mb-3 relative z-10">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-black text-sm text-white">${order.orderId}</h3>
                                <span class="bg-slate-900 text-[9px] px-1.5 py-0.5 rounded text-slate-400 font-mono tracking-tighter">${dateStr}</span>
                            </div>
                            <p class="text-emerald-400 font-semibold text-[11px] leading-tight line-clamp-2" title="${order.shopName}">${order.shopName}</p>
                        </div>
                        
                        <div>
                            <div class="bg-slate-900/70 p-2 rounded-lg mb-3 border border-slate-700 flex justify-between items-center">
                                <span class="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Next Action:</span>
                                <span class="text-[10px] text-blue-400 font-bold bg-blue-900/30 px-2 py-0.5 rounded truncate max-w-[50%]">${nextStepName}</span>
                            </div>
                            
                            <div class="flex justify-between text-[10px] text-slate-400 mb-1 font-bold">
                                <span>Progress</span>
                                <span class="text-white">${order.completedStages}/9</span>
                            </div>
                            <div class="w-full bg-slate-900 rounded-full h-1.5 overflow-hidden border border-slate-700">
                                <div class="bg-gradient-to-r from-blue-500 to-emerald-400 h-1.5 rounded-full" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // ==========================================
        // CUSTOM FILE SELECTION QUEUE LOGIC
        // ==========================================
        function handleFileSelection(inputElement, stageNum) {
            queuedFiles = Array.from(inputElement.files);
            const statusLabel = document.getElementById(`fileStatusText_${stageNum}`);
            
            if (queuedFiles.length > 0) {
                statusLabel.innerText = `✓ ${queuedFiles.length} File(s) Selected & Ready`;
                statusLabel.classList.remove('hidden');
            } else {
                statusLabel.classList.add('hidden');
            }
        }

        // ==========================================
        // MODAL AND TASK EXECUTION
        // ==========================================
        function openModal(order) {
            currentActiveOrder = order;
            queuedFiles = []; 
            document.getElementById('modalOrderId').innerText = order.orderId;
            document.getElementById('modalShopName').innerText = order.shopName;
            
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            
            // ------------------------------------------
            // 1. DYNAMIC ITEMS TO PICK LIST (Showing 5+ easily)
            // ------------------------------------------
            let itemsHtml = `
                <div class="mb-6 bg-slate-800 border border-slate-600 rounded-xl p-4 shadow-inner">
                    <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="text-emerald-400 text-lg">📦</span> Items to Pick
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-60 overflow-y-auto pr-2 hide-scrollbar">
            `;
            
            if (order.items && order.items.length > 0) {
                order.items.forEach(item => {
                    let imgTag = item.image 
                        ? `<img src="${item.image}" class="w-14 h-14 object-contain rounded bg-white p-1 shrink-0 shadow-sm">` 
                        : `<div class="w-14 h-14 bg-slate-700 rounded flex items-center justify-center text-[10px] text-slate-400 shrink-0 font-mono border border-slate-600">No Img</div>`;
                    
                    itemsHtml += `
                        <div class="flex items-center gap-3 bg-slate-900/80 p-2.5 rounded-lg border border-slate-700">
                            ${imgTag}
                            <div class="flex-1 min-w-0">
                                <p class="text-xs text-white font-semibold leading-tight break-words whitespace-normal">${item.name}</p>
                                <div class="mt-1.5 flex items-center gap-2">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Qty:</span>
                                    <span class="text-xs font-black text-emerald-400 bg-emerald-900/40 px-2 rounded border border-emerald-500/20">${item.qty}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else { 
                itemsHtml += `<p class="text-sm text-slate-500 italic px-2">No products found in data format.</p>`; 
            }
            
            itemsHtml += `
                    </div>
                </div>
            `;
            container.innerHTML += itemsHtml;

            // ------------------------------------------
            // 2. PIPELINE STAGES LOGIC
            // ------------------------------------------
            let stagesListHtml = '<div class="space-y-4">';
            
            for (let i = 0; i < 9; i++) {
                const stageNum = i + 1; 
                const isCompleted = i < order.completedStages; 
                const isActive = i === order.completedStages; 
                const isLocked = i > order.completedStages;
                
                let uiHtml = '';
                
                if (isCompleted) {
                    let fileUrls = order.stageUrls ? order.stageUrls[i].split(',') : [];
                    let previewHtml = `<div class="flex flex-col gap-2 mt-3">`;
                    
                    fileUrls.forEach((url, index) => {
                        url = url.trim();
                        if (url.includes("http")) {
                            if (stageNum === 3 || stageNum === 7 || stageNum === 9) { 
                                previewHtml += `<audio controls src="${url}" class="h-10 w-full outline-none bg-slate-900 rounded"></audio>`;
                            } else { 
                                previewHtml += `
                                    <a href="${url}" target="_blank" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg p-3 text-sm font-bold text-blue-400 flex items-center justify-between transition shadow-sm">
                                        <span>🖼️ View Uploaded Document ${index + 1}</span>
                                        <span class="text-slate-500 text-lg">→</span>
                                    </a>
                                `;
                            }
                        }
                    });
                    previewHtml += `</div>`;

                    uiHtml = `
                        <div class="bg-emerald-900/10 border border-emerald-500/30 rounded-xl p-4 hover:bg-emerald-900/20 transition">
                            <div class="flex justify-between items-center">
                                <span class="text-emerald-400 text-base font-bold">${stageNum}. ${STAGE_NAMES[i]}</span>
                                <span class="bg-emerald-900/60 text-emerald-400 border border-emerald-500/30 font-bold text-[10px] px-2 py-1 rounded shadow-inner uppercase tracking-widest">✔ COMPLETED</span>
                            </div>
                            ${previewHtml}
                        </div>
                    `;
                } 
                else if (isLocked) {
                    uiHtml = `
                        <div class="bg-slate-800/40 border border-slate-700/50 rounded-xl p-4 flex justify-between items-center grayscale opacity-60">
                            <span class="text-slate-500 text-base font-medium">${stageNum}. ${STAGE_NAMES[i]}</span>
                            <span class="text-slate-600 text-[10px] font-mono tracking-widest bg-slate-900 px-2 py-1 rounded">🔒 LOCKED</span>
                        </div>
                    `;
                } 
                else if (isActive) {
                    let inputHtml = '';
                    
                    if (stageNum === 1) {
                        inputHtml = `
                            <button onclick="submitStage(${stageNum})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all active:scale-95 text-lg">
                                Accept Task & Begin Process
                            </button>
                        `;
                    } else {
                        if (stageNum === 3 || stageNum === 7 || stageNum === 9) { 
                            inputHtml = `
                                <p class="text-xs font-bold text-slate-300 mt-4 mb-2 uppercase tracking-widest flex items-center gap-2">
                                    <span class="text-blue-400">🎤</span> Record Audio / Call
                                </p>
                                <input type="file" accept="audio/*" class="w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-black file:bg-blue-600 file:text-white bg-slate-900 p-1.5 rounded-xl border border-slate-600 cursor-pointer" onchange="handleFileSelection(this, ${stageNum})">
                                <p id="fileStatusText_${stageNum}" class="text-xs font-bold text-emerald-400 mt-2 text-center hidden"></p>
                            `;
                        } else {
                            inputHtml = `
                                <p class="text-xs font-bold text-slate-300 mt-4 mb-2 uppercase tracking-widest flex items-center gap-2">
                                    <span class="text-blue-400">⚡</span> Upload Proof (Required)
                                </p>
                                <div class="flex gap-2 w-full">
                                    <label class="flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-center py-3 rounded-xl cursor-pointer text-xs font-bold transition shadow-inner">
                                        📸 Live Camera
                                        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handleFileSelection(this, ${stageNum})">
                                    </label>
                                    <label class="flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-center py-3 rounded-xl cursor-pointer text-xs font-bold transition shadow-inner">
                                        🖼️ Multi Gallery
                                        <input type="file" accept="image/*" multiple class="hidden" onchange="handleFileSelection(this, ${stageNum})">
                                    </label>
                                </div>
                                <p id="fileStatusText_${stageNum}" class="text-xs font-bold text-emerald-400 mt-3 text-center bg-emerald-900/20 py-1.5 rounded hidden border border-emerald-500/20"></p>
                            `;
                        }
                        
                        if (stageNum === 9) {
                            inputHtml += `
                                <div class="mt-4">
                                    <label class="text-xs font-bold text-slate-300 uppercase tracking-widest mb-2 block">Customer Rating</label>
                                    <input type="number" id="ratingInput" min="1" max="5" placeholder="Enter Score (1-5)" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3.5 text-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-lg text-center">
                                </div>
                            `;
                        }
                        
                        inputHtml += `
                            <button id="submitBtn_${stageNum}" onclick="submitStage(${stageNum})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all active:scale-95 text-lg">
                                Execute & Proceed
                            </button>
                        `;
                    }
                    
                    uiHtml = `
                        <div class="bg-slate-800 border-[3px] border-blue-500 rounded-xl p-5 shadow-[0_0_30px_rgba(59,130,246,0.15)] relative overflow-hidden transform scale-[1.02]">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-white font-black text-xl">${stageNum}. ${STAGE_NAMES[i]}</span>
                                <span class="bg-blue-500 text-white text-[10px] font-black px-2 py-1 rounded animate-pulse tracking-widest uppercase">ACTION REQUIRED</span>
                            </div>
                            <div id="actionArea_${stageNum}">
                                ${inputHtml}
                            </div>
                            <p id="status_${stageNum}" class="text-sm font-bold mt-3 hidden text-center"></p>
                        </div>
                    `;
                }
                
                stagesListHtml += uiHtml;
            }
            
            stagesListHtml += '</div>';
            container.innerHTML += stagesListHtml;
            
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('orderModal').classList.add('hidden'); 
            fetchOrders(true); 
        }

        // ==========================================
        // DATA COMPRESSION & UPLOAD PROTOCOLS
        // ==========================================
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); 
                reader.readAsDataURL(file);
                
                reader.onload = (event) => {
                    const img = new Image(); 
                    img.src = event.target.result;
                    
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); 
                        const MAX_WIDTH = 800; 
                        let scale = 1;
                        
                        if (img.width > MAX_WIDTH) {
                            scale = MAX_WIDTH / img.width;
                        }
                        
                        canvas.width = img.width * scale; 
                        canvas.height = img.height * scale;
                        
                        const ctx = canvas.getContext('2d'); 
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                        
                        resolve({ 
                            name: file.name, 
                            mimeType: 'image/jpeg', 
                            base64: dataUrl.split(',')[1] 
                        });
                    };
                };
            });
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); 
                reader.readAsDataURL(file);
                
                reader.onload = () => resolve({ 
                    name: file.name, 
                    mimeType: file.type, 
                    base64: reader.result.split(',')[1] 
                });
                
                reader.onerror = error => reject(error);
            });
        }

        async function submitStage(stageNum) {
            const btn = document.getElementById(`submitBtn_${stageNum}`);
            const statusLabel = document.getElementById(`status_${stageNum}`);
            
            let payload = { 
                action: 'updateStage', 
                orderId: currentActiveOrder.orderId, 
                stage: stageNum, 
                files: [] 
            };
            
            if (stageNum !== 1) {
                if (queuedFiles.length === 0) { 
                    alert("A file proof is mandatory to clear this stage. Please select an image or audio."); 
                    return; 
                }
                
                btn.innerText = "Compressing & Transmitting..."; 
                btn.disabled = true;
                
                for (let i = 0; i < queuedFiles.length; i++) {
                    let f = queuedFiles[i];
                    if (f.type.startsWith('image/')) { 
                        payload.files.push(await compressImage(f)); 
                    } else { 
                        payload.files.push(await getBase64(f)); 
                    }
                }
                
                if (stageNum === 9) {
                    const rating = document.getElementById('ratingInput').value;
                    if (!rating) { 
                        alert("Customer Rating is mandatory."); 
                        btn.disabled = false; 
                        btn.innerText = "Execute & Proceed"; 
                        return; 
                    }
                    payload.rating = rating;
                }
            } else { 
                if (btn) { 
                    btn.innerText = "Processing Lock..."; 
                    btn.disabled = true; 
                } 
            }
            
            if (statusLabel) { 
                statusLabel.innerText = "📡 Uplinking Data to Control Tower..."; 
                statusLabel.className = "text-[12px] font-bold tracking-widest mt-3 text-blue-400 block animate-pulse text-center"; 
                statusLabel.classList.remove('hidden');
            }

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (btn) {
                        btn.innerText = "Successful ✓";
                    }
                    queuedFiles = []; 
                    fetchOrders(true); 
                } else { 
                    throw new Error(data.message); 
                }
            } catch (err) {
                if (statusLabel) { 
                    statusLabel.innerText = "❌ Sync Failed. Verify connection."; 
                    statusLabel.className = "text-[12px] font-bold mt-3 text-red-500 block text-center"; 
                }
                if (btn) { 
                    btn.innerText = "Retry Transmission"; 
                    btn.disabled = false; 
                }
            }
        }
    </script>
