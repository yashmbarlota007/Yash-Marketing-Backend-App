<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stage-card { transition: all 0.2s; cursor: pointer; }
        .stage-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
        .locked { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
        /* Custom scrollbar for modal */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="loginScreen" class="flex h-[80vh] items-center justify-center">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">YASH MARKETING</h1>
            <p class="text-slate-400 text-sm tracking-widest mb-8 uppercase">Staff Authentication</p>
            <form id="loginForm" class="space-y-4">
                <input type="tel" id="loginPhone" placeholder="Phone Number" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginPass" placeholder="Password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition">Initialize Protocol</button>
            </form>
            <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 border-b border-slate-700 pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Active Sprints</h1>
                <p class="text-emerald-400 text-sm mt-1">Logged in as: <span id="userName" class="font-bold"></span></p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 border border-slate-700 rounded-lg p-2 flex items-center">
                    <label class="text-xs text-slate-400 mr-2 uppercase tracking-wider">Audit Date:</label>
                    <input type="date" id="historyDate" onchange="renderDashboard()" class="bg-slate-900 text-sm text-white rounded p-1 border border-slate-600 focus:outline-none focus:border-blue-500">
                    <button onclick="clearDateFilter()" class="ml-2 text-xs text-blue-400 hover:text-blue-300">Clear</button>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-white text-sm bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">Sign Out</button>
            </div>
        </div>

        <div id="metricsBar" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-8 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
            </div>
        
        <div id="orderGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="glass-panel w-full max-w-2xl rounded-2xl overflow-hidden flex flex-col max-h-[90vh] shadow-[0_0_40px_rgba(0,0,0,0.5)]">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800">
                <div>
                    <h2 class="text-2xl font-bold text-white" id="modalOrderId">ORD-000</h2>
                    <p class="text-emerald-400 text-sm font-semibold" id="modalShopName">Shop Name</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl font-bold transition-colors">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-grow space-y-3" id="stagesContainer">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyws0jd3sL7L3rp0nXsHxcnI3A8npsJldRuCeSV_BswzHsYB5Syzm9dLpFlSA_tIW0vsQ/exec"; // <--- PASTE DEPLOYED URL HERE
        
        const STAGE_NAMES = [
            "Order Received (Accept)", "Balance Check (Tally Photo)", "Call 1 (Confirmation Audio)", 
            "Processed (Stock Photo)", "Invoiced (Invoice Photo)", "Dispatched (Box/Bag Photo)", 
            "Call 2 (Out-for-delivery Audio)", "Delivered (Transport Pauti Photo)", "Final Call (Feedback & Rating)"
        ];

        let allOrdersData = [];
        let currentActiveOrder = null;

        // --- AUTHENTICATION ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            btn.innerText = "Authenticating...";
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        phone: document.getElementById('loginPhone').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('yash_user', data.user.name);
                    showDashboard(data.user.name);
                } else {
                    error.innerText = data.message;
                    error.classList.remove('hidden');
                    btn.innerText = "Initialize Protocol";
                }
            } catch (err) {
                error.innerText = "Connection Error.";
                error.classList.remove('hidden');
                btn.innerText = "Initialize Protocol";
            }
        });

        function showDashboard(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = name;
            fetchOrders();
        }

        function logout() { localStorage.removeItem('yash_user'); location.reload(); }
        if (localStorage.getItem('yash_user')) { showDashboard(localStorage.getItem('yash_user')); }

        // --- DATA FETCHING ---
        async function fetchOrders() {
            const grid = document.getElementById('orderGrid');
            grid.innerHTML = '<p class="text-slate-400">Syncing with Control Tower...</p>';
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getOrders' })
                });
                const response = await res.json();
                
                if (response.status === 'success') {
                    allOrdersData = response.data;
                    renderDashboard();
                }
            } catch (err) {
                grid.innerHTML = '<p class="text-red-400">Failed to load system data.</p>';
            }
        }

        function clearDateFilter() {
            document.getElementById('historyDate').value = "";
            renderDashboard();
        }

        // --- RENDERING METRICS & CARDS ---
        function renderDashboard() {
            const grid = document.getElementById('orderGrid');
            const metricsBar = document.getElementById('metricsBar');
            const selectedDate = document.getElementById('historyDate').value;
            
            grid.innerHTML = '';
            
            // 1. Filter Data Based on Date Selection
            let displayOrders = allOrdersData.filter(order => {
                if (selectedDate) {
                    // Show ANY order from that specific date (even completed ones)
                    const orderDate = new Date(order.date).toISOString().split('T')[0];
                    return orderDate === selectedDate;
                } else {
                    // Default View: Hide fully completed orders (Inbox Zero)
                    return !order.isFullyCompleted;
                }
            });

            // 2. Calculate KPI Metrics
            let stageCounts = { "Pending Actions": 0, "Dispatched": 0, "Delivered": 0 };
            displayOrders.forEach(o => {
                if(o.completedStages < 5) stageCounts["Pending Actions"]++;
                if(o.completedStages >= 5 && o.completedStages < 8) stageCounts["Dispatched"]++;
                if(o.completedStages >= 8) stageCounts["Delivered"]++;
            });

            metricsBar.innerHTML = `
                <div class="text-center p-2"><div class="text-2xl font-bold text-white">${displayOrders.length}</div><div class="text-[10px] text-slate-400 uppercase tracking-widest">Total Shown</div></div>
                <div class="text-center p-2 border-l border-slate-700"><div class="text-2xl font-bold text-blue-400">${stageCounts["Pending Actions"]}</div><div class="text-[10px] text-slate-400 uppercase tracking-widest">In Process</div></div>
                <div class="text-center p-2 border-l border-slate-700"><div class="text-2xl font-bold text-orange-400">${stageCounts["Dispatched"]}</div><div class="text-[10px] text-slate-400 uppercase tracking-widest">Dispatched</div></div>
                <div class="text-center p-2 border-l border-slate-700"><div class="text-2xl font-bold text-emerald-400">${stageCounts["Delivered"]}</div><div class="text-[10px] text-slate-400 uppercase tracking-widest">Delivered</div></div>
            `;

            // 3. Render Cards
            if(displayOrders.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 italic mt-4">No data matches the current filter (Inbox Zero).</p>';
                return;
            }

            displayOrders.forEach(order => {
                const progress = (order.completedStages / 9) * 100;
                let dateString = "Invalid Date";
                if(order.date) {
                    const d = new Date(order.date);
                    if(!isNaN(d)) dateString = d.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short' });
                }
                
                grid.innerHTML += `
                    <div onclick='openModal(${JSON.stringify(order).replace(/'/g, "\\'")})' class="bg-slate-800 border border-slate-700 rounded-xl p-5 stage-card shadow-lg flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-white">${order.orderId}</h3>
                                <span class="bg-slate-700 text-[10px] px-2 py-1 rounded text-slate-300 font-mono tracking-tighter">${dateString}</span>
                            </div>
                            <p class="text-emerald-400 font-semibold text-sm mb-4 truncate">${order.shopName}</p>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-1">
                                <span>Progress</span>
                                <span class="font-bold text-white">${order.completedStages} / 9</span>
                            </div>
                            <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-700">
                                <div class="bg-gradient-to-r from-blue-500 to-emerald-400 h-2 rounded-full shadow-[0_0_10px_rgba(52,211,153,0.5)]" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- EXECUTION MODAL LOGIC WITH PREVIEWS ---
        function openModal(order) {
            currentActiveOrder = order;
            document.getElementById('modalOrderId').innerText = order.orderId;
            document.getElementById('modalShopName').innerText = order.shopName;
            
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const stageNum = i + 1;
                const isCompleted = i < order.completedStages;
                const isActive = i === order.completedStages;
                const isLocked = i > order.completedStages;
                
                let uiHtml = '';
                
                if (isCompleted) {
                    // PREVIEW LOGIC
                    let fileUrl = order.stageUrls ? order.stageUrls[i] : "";
                    let previewHtml = "";
                    
                    if (fileUrl && fileUrl.includes("http")) {
                        if (stageNum === 3 || stageNum === 7 || stageNum === 9) { // Audio Stages
                            previewHtml = `<div class="mt-3 bg-slate-900/50 p-2 rounded-lg border border-slate-700"><audio controls src="${fileUrl}" class="w-full h-8 outline-none"></audio></div>`;
                        } else { // Image Stages
                            previewHtml = `<a href="${fileUrl}" target="_blank" class="mt-2 inline-flex items-center text-xs font-semibold text-blue-400 hover:text-blue-300 bg-blue-900/30 px-3 py-1.5 rounded border border-blue-800 transition">View Uploaded Image Proof &rarr;</a>`;
                        }
                    }

                    uiHtml = `<div class="bg-emerald-900/20 border border-emerald-500/30 rounded-xl p-4 flex flex-col justify-between transition-all hover:bg-emerald-900/40">
                                <div class="flex justify-between items-center">
                                    <span class="text-emerald-400 font-medium">${stageNum}. ${STAGE_NAMES[i]}</span>
                                    <span class="text-emerald-500 font-bold bg-emerald-900/50 px-2 py-1 rounded text-xs shadow-inner">✔ DONE</span>
                                </div>
                                ${previewHtml}
                              </div>`;
                } else if (isLocked) {
                    uiHtml = `<div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 locked flex items-center justify-between">
                                <span class="text-slate-500">${stageNum}. ${STAGE_NAMES[i]}</span>
                                <span class="text-slate-600 font-mono text-xs">🔒 LOCKED</span>
                              </div>`;
                } else if (isActive) {
                    let inputHtml = '';
                    if (stageNum === 1) {
                        inputHtml = `<button onclick="submitStage(${stageNum})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95">Acknowledge & Accept</button>`;
                    } else {
                        // STRICT FILE VALIDATION
                        let acceptType = "image/*";
                        let uploadPrompt = "Upload Photo Proof";
                        if (stageNum === 3 || stageNum === 7 || stageNum === 9) {
                            acceptType = "audio/mp3,audio/wav,audio/m4a,audio/*"; // Only Audio
                            uploadPrompt = "Upload Audio Recording";
                        }
                        
                        inputHtml = `<input type="file" id="fileUpload" accept="${acceptType}" class="w-full mt-4 text-sm text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-400 file:transition-colors bg-slate-900 p-1 rounded-lg border border-slate-600">`;
                        
                        if (stageNum === 9) {
                            inputHtml += `<input type="number" id="ratingInput" min="1" max="5" placeholder="Customer Rating (1-5)" class="w-full mt-3 bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">`;
                        }
                        inputHtml += `<button id="submitBtn_${stageNum}" onclick="submitStage(${stageNum})" class="w-full mt-3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95">Upload & Complete</button>`;
                    }
                    
                    uiHtml = `<div class="bg-slate-800 border-2 border-blue-500 rounded-xl p-5 shadow-[0_0_20px_rgba(59,130,246,0.15)] relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-white font-bold text-lg">${stageNum}. ${STAGE_NAMES[i]}</span>
                                    <span class="bg-blue-500 text-[10px] font-bold px-2 py-1 rounded text-white animate-pulse tracking-wider">ACTION REQUIRED</span>
                                </div>
                                <div id="actionArea_${stageNum}">${inputHtml}</div>
                                <p id="status_${stageNum}" class="text-sm mt-3 hidden font-mono"></p>
                              </div>`;
                }
                container.innerHTML += uiHtml;
            }
            
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
            fetchOrders(); // Sync latest data back to dashboard
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function submitStage(stageNum) {
            const btn = document.getElementById(`submitBtn_${stageNum}`);
            const statusLabel = document.getElementById(`status_${stageNum}`);
            
            let payload = { action: 'updateStage', orderId: currentActiveOrder.orderId, stage: stageNum };
            
            if (stageNum !== 1) {
                const fileInput = document.getElementById('fileUpload');
                if (fileInput.files.length === 0) { alert("Proof file is required to proceed."); return; }
                
                const file = fileInput.files[0];
                
                // Extra security check to reject wrong file types
                if ([3, 7, 9].includes(stageNum) && !file.type.startsWith('audio/')) {
                    alert("System Restriction: Only Audio files (.mp3, .wav) are allowed for this stage.");
                    fileInput.value = ""; return;
                }
                if (![1, 3, 7, 9].includes(stageNum) && !file.type.startsWith('image/')) {
                    alert("System Restriction: Only Image files (.jpg, .png) are allowed for this stage.");
                    fileInput.value = ""; return;
                }

                btn.innerText = "Encoding File..."; btn.disabled = true;
                
                payload.fileName = file.name;
                payload.mimeType = file.type;
                payload.fileBase64 = await getBase64(file);
                
                if (stageNum === 9) {
                    const rating = document.getElementById('ratingInput').value;
                    if(!rating) { alert("Rating required."); btn.disabled = false; btn.innerText = "Upload & Complete"; return;}
                    payload.rating = rating;
                }
            } else {
                if(btn) { btn.innerText = "Processing..."; btn.disabled = true; }
            }
            
            if(statusLabel) {
                statusLabel.innerText = "> Transmitting to Control Tower...";
                statusLabel.className = "text-xs mt-3 text-blue-400 block animate-pulse";
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                
                if (data.status === 'success') {
                    // Update local state and re-open modal to fetch new URLs seamlessly
                    closeModal(); 
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                if(statusLabel) {
                    statusLabel.innerText = "> Error syncing. Network delay.";
                    statusLabel.className = "text-xs mt-3 text-red-400 block";
                }
                if(btn) { btn.innerText = "Upload & Complete"; btn.disabled = false; }
            }
        }
    </script>
</body>
</html>
