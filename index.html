<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - C-Level Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0B1121; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .hover-card {
            transition: all 0.3s ease;
        }
        .hover-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); 
            border-color: rgba(99, 102, 241, 0.4); 
        }
        ::-webkit-scrollbar { 
            width: 6px; 
            height: 6px; 
        }
        ::-webkit-scrollbar-track { 
            background: #0B1121; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #334155; 
            border-radius: 4px; 
        }
        .hide-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        @keyframes slideDown { 
            from { transform: translateY(-100%); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .toast-enter { 
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .active-filter { 
            background: #4F46E5 !important; 
            border-color: #6366F1 !important; 
            color: white !important; 
            font-weight: bold; 
        }
    </style>
</head>
<body class="min-h-screen p-2 md:p-6 lg:p-8 selection:bg-indigo-500 selection:text-white">

    <!-- Notification Radar Area -->
    <div id="notificationArea" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none">
    </div>

    <!-- Login Authentication Screen -->
    <div id="loginScreen" class="flex h-[90vh] items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-4 border-t-indigo-500">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 mb-2 tracking-tight">
                YASH MARKETING
            </h1>
            <p class="text-slate-400 text-xs tracking-[0.2em] mb-8 uppercase font-semibold">
                Enterprise OS Login
            </p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="loginEmpId" placeholder="Access Code / Emp ID" required 
                       class="w-full bg-[#131C31] border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase transition-all shadow-inner">
                <input type="password" id="loginPass" placeholder="Security PIN" required 
                       class="w-full bg-[#131C31] border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner">
                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-black py-4 rounded-xl shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all transform active:scale-[0.98]">
                    INITIALIZE SYSTEM
                </button>
            </form>
            <p id="loginError" class="text-pink-400 text-sm mt-4 font-semibold hidden animate-pulse"></p>
        </div>
    </div>

    <!-- Main Operational Dashboard Screen -->
    <div id="dashboardScreen" class="hidden max-w-[1400px] mx-auto">
        
        <!-- Master Header & Date Controls -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 bg-[#131C31] p-4 rounded-2xl border border-slate-800 shadow-lg">
            <div>
                <h1 class="text-2xl font-black text-white flex items-center gap-2 tracking-tight">
                    <span class="text-indigo-400">⚡</span> Mission Control
                </h1>
                <p class="text-slate-400 text-xs mt-1 font-mono">
                    OP_ID: <span id="userName" class="text-emerald-400 font-bold"></span>
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto bg-[#0B1121] p-1.5 rounded-xl border border-slate-800">
                <button onclick="setDateRange('today', this)" class="date-filter-btn active-filter px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all">Today</button>
                <button onclick="setDateRange('7d', this)" class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all">7 Days</button>
                <button onclick="setDateRange('30d', this)" class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all">30 Days</button>
                <button onclick="setDateRange('all', this)" class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all">All Time</button>
                
                <div class="w-px h-6 bg-slate-700 mx-1 hidden sm:block"></div>
                
                <input type="date" id="customDateFilter" onchange="setDateRange('custom', this)" 
                       class="bg-transparent text-xs text-indigo-300 outline-none cursor-pointer p-1">
                       
                <button onclick="logout()" class="ml-auto lg:ml-2 bg-pink-500/10 text-pink-400 border border-pink-500/30 hover:bg-pink-500 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">
                    LOGOUT
                </button>
            </div>
        </div>

        <!-- MDO Command Center (Owner Exclusive) -->
        <div id="mdoCommandCenter" class="hidden mb-8 space-y-4">
        </div>

        <h3 class="text-lg font-black text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
            <span class="text-indigo-400">🌊</span> Operational Pipeline
        </h3>
        
        <!-- Premium KPI Filter Pipeline -->
        <div id="stageFilterBar" class="flex overflow-x-auto gap-3 mb-6 pb-2 hide-scrollbar">
        </div>
        
        <!-- Order Cards Grid -->
        <div id="orderGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        </div>
    </div>

    <!-- Order Execution Task Modal -->
    <div id="orderModal" class="hidden fixed inset-0 bg-[#0B1121]/95 backdrop-blur-md flex items-center justify-center z-50 p-2 sm:p-4">
        <div class="glass-panel w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh] shadow-2xl border border-slate-700">
            <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-[#131C31] shadow-md z-10">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight" id="modalOrderId">ORD-000</h2>
                    <p class="text-indigo-400 text-sm font-bold mt-1" id="modalShopName">Shop Name</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-pink-400 text-4xl leading-none transition-colors">
                    &times;
                </button>
            </div>
            
            <div class="p-4 md:p-6 overflow-y-auto flex-grow bg-[#0B1121]" id="stagesContainer">
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyws0jd3sL7L3rp0nXsHxcnI3A8npsJldRuCeSV_BswzHsYB5Syzm9dLpFlSA_tIW0vsQ/exec"; 
        
        const STAGE_NAMES = [
            "Order Received", 
            "Balance Check", 
            "Call 1 (Confirmation)", 
            "Processed (Stock)", 
            "Invoiced", 
            "Dispatched", 
            "Call 2 (Out-for-delivery)", 
            "Delivered", 
            "Final Call (Rating)"
        ];

        let allOrdersData = [];
        let filteredData = [];
        let currentActiveOrder = null;
        let activeStageFilter = null;
        let activeDateRange = 'today'; 
        let latestOrderTimestamp = null;
        let autoRefreshInterval = null;
        let queuedFiles = []; 
        let currentUserRole = 'Staff';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            
            btn.innerText = "AUTHENTICATING...";
            
            try {
                const payload = {
                    action: 'login', 
                    employeeId: document.getElementById('loginEmpId').value, 
                    password: document.getElementById('loginPass').value
                };
                
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('yash_user', data.user.name);
                    localStorage.setItem('yash_role', data.user.role || 'Staff');
                    
                    showDashboard(data.user.name, data.user.role);
                } else {
                    error.innerText = data.message; 
                    error.classList.remove('hidden'); 
                    btn.innerText = "INITIALIZE SYSTEM";
                }
            } catch (err) {
                error.innerText = "Network Error. Check Connection."; 
                error.classList.remove('hidden'); 
                btn.innerText = "INITIALIZE SYSTEM";
            }
        });

        function showDashboard(name, role) {
            currentUserRole = role || 'Staff';
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = name.toUpperCase();
            
            fetchOrders(false);
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => { 
                fetchOrders(true); 
            }, 15000); 
        }

        function logout() { 
            localStorage.removeItem('yash_user'); 
            localStorage.removeItem('yash_role'); 
            location.reload(); 
        }
        
        if (localStorage.getItem('yash_user')) { 
            showDashboard(localStorage.getItem('yash_user'), localStorage.getItem('yash_role')); 
        }

        function showNotification(title, message) {
            const area = document.getElementById('notificationArea');
            const toast = document.createElement('div');
            
            toast.className = "bg-[#131C31] text-white px-5 py-3 rounded-xl shadow-[0_10px_40px_rgba(79,70,229,0.4)] border border-indigo-500 flex items-center gap-4 toast-enter pointer-events-auto";
            toast.innerHTML = `
                <span class="text-2xl animate-bounce">⚡</span>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-indigo-400">${title}</p>
                    <p class="text-sm font-bold text-white mt-0.5">${message}</p>
                </div>
            `;
            
            area.appendChild(toast);
            
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300); 
            }, 6000);
        }

        async function fetchOrders(isSilent = false) {
            const grid = document.getElementById('orderGrid');
            
            if (!isSilent && allOrdersData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="inline-block animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-indigo-400 font-bold tracking-widest uppercase text-sm">Syncing with Mainframe...</p>
                    </div>
                `;
            }
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getOrders' }) 
                });
                const response = await res.json();
                
                if (response.status === 'success') {
                    if (response.data.length > 0 && latestOrderTimestamp !== null) {
                        const incomingLatest = new Date(response.data[0].date).getTime();
                        if (incomingLatest > latestOrderTimestamp) {
                            showNotification("New Order Incoming", response.data[0].shopName);
                        }
                    }
                    if (response.data.length > 0) {
                        latestOrderTimestamp = new Date(response.data[0].date).getTime();
                    }
                    
                    allOrdersData = response.data;
                    applyDateFilter(); 

                    if (currentActiveOrder && !document.getElementById('orderModal').classList.contains('hidden')) {
                        const updatedOrder = allOrdersData.find(o => o.orderId === currentActiveOrder.orderId);
                        if (updatedOrder) {
                            openModal(updatedOrder); 
                        }
                    }
                }
            } catch (err) { 
                console.log("Background sync error."); 
            }
        }

        function setDateRange(range, btnElement) {
            activeDateRange = range;
            
            if(range !== 'custom') {
                document.getElementById('customDateFilter').value = '';
            }
            
            if(btnElement && range !== 'custom') {
                document.querySelectorAll('.date-filter-btn').forEach(btn => btn.classList.remove('active-filter'));
                btnElement.classList.add('active-filter');
            }
            
            applyDateFilter();
        }

        function applyDateFilter() {
            let now = new Date();
            now.setHours(0,0,0,0);

            filteredData = allOrdersData.filter(o => {
                let d = new Date(o.date);
                d.setHours(0,0,0,0);
                
                if (activeDateRange === 'today') {
                    return d.getTime() === now.getTime();
                }
                if (activeDateRange === '7d') {
                    return (now - d) / (1000*60*60*24) <= 7;
                }
                if (activeDateRange === '30d') {
                    return (now - d) / (1000*60*60*24) <= 30;
                }
                if (activeDateRange === 'custom') {
                    let customVal = document.getElementById('customDateFilter').value;
                    if(!customVal) return true;
                    return new Date(customVal).getTime() === d.getTime();
                }
                return true; 
            });

            renderMdoDashboard();
            renderPipeline();
        }

        function renderMdoDashboard() {
            const userName = localStorage.getItem('yash_user') || "";
            const isOwner = currentUserRole.toLowerCase() === 'admin' || currentUserRole.toLowerCase() === 'owner' || userName.toLowerCase().includes('yash');
            
            const mdoDiv = document.getElementById('mdoCommandCenter');
            
            if (!isOwner) {
                mdoDiv.classList.add('hidden');
                return;
            }
            
            mdoDiv.classList.remove('hidden');

            let totalVolume = 0;
            let totalCompleted = 0;
            let slaBreaches = 0;
            let shopStats = {};
            let skuStats = {};
            let brandStats = { 'boAt': 0, 'Velocity': 0, 'Portronics': 0, 'JBL': 0, 'Hikvision': 0, 'Others': 0 };
            let stageStuck = Array(9).fill(0);
            const now = new Date().getTime();

            filteredData.forEach(o => {
                if(o.isFullyCompleted) {
                    totalCompleted++;
                } else {
                    stageStuck[o.completedStages]++;
                    let orderDate = new Date(o.date).getTime();
                    if ((now - orderDate) > (48 * 60 * 60 * 1000)) {
                        slaBreaches++;
                    }
                }

                if(!shopStats[o.shopName]) shopStats[o.shopName] = { items: 0 };
                
                o.items.forEach(i => {
                    let qty = parseInt(i.qty || 1);
                    totalVolume += qty;
                    shopStats[o.shopName].items += qty;

                    let cleanName = i.name.trim();
                    if(!skuStats[cleanName]) skuStats[cleanName] = 0;
                    skuStats[cleanName] += qty;

                    let n = cleanName.toLowerCase();
                    if(n.includes('boat')) brandStats['boAt'] += qty;
                    else if(n.includes('velocity')) brandStats['Velocity'] += qty;
                    else if(n.includes('portronics')) brandStats['Portronics'] += qty;
                    else if(n.includes('jbl')) brandStats['JBL'] += qty;
                    else if(n.includes('hikvision')) brandStats['Hikvision'] += qty;
                    else brandStats['Others'] += qty;
                });
            });

            let sortedShops = Object.entries(shopStats).sort((a,b) => b[1].items - a[1].items);
            let sortedSKUs = Object.entries(skuStats).sort((a,b) => b[1] - a[1]).slice(0, 5);
            let topShopVolume = sortedShops.length > 0 ? sortedShops[0][1].items : 1;
            
            let maxStuck = Math.max(...stageStuck);
            let frictionIndex = maxStuck > 0 ? STAGE_NAMES[stageStuck.indexOf(maxStuck)].split(' (')[0] : "Smooth Pipeline";
            
            let completionRate = filteredData.length > 0 ? Math.round((totalCompleted / filteredData.length) * 100) : 0;
            let healthScore = Math.max(0, 100 - (slaBreaches * 5) - ((100 - completionRate) * 0.2)).toFixed(0);
            let healthColor = healthScore > 80 ? 'text-emerald-400' : (healthScore > 50 ? 'text-orange-400' : 'text-pink-500');

            let brandMax = Math.max(...Object.values(brandStats), 1);

            let mdoHtml = `
                <div class="flex justify-between items-center bg-[#0B1121] border border-slate-800 p-4 rounded-2xl mb-4 shadow-lg">
                    <div>
                        <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 tracking-widest uppercase">
                            🔴 Live War Room
                        </h2>
                        <p class="text-[10px] text-slate-500 font-mono mt-1">Real-time Business Telemetry</p>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black ${healthColor} drop-shadow-[0_0_10px_currentColor]">${healthScore}%</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Pipeline Health</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-indigo-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Total Volume Output</div>
                        <div class="flex items-end gap-2 mt-2">
                            <span class="text-4xl font-black text-white">${totalVolume}</span>
                            <span class="text-xs text-indigo-400 font-bold mb-1 pb-1">Units Moved</span>
                        </div>
                    </div>
                    
                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-emerald-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Delivery Success</div>
                        <div class="flex items-center gap-3 mt-2">
                            <span class="text-4xl font-black text-emerald-400">${completionRate}%</span>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-2 font-semibold">${totalCompleted} / ${filteredData.length} Orders Delivered</div>
                    </div>

                    <div class="glass-panel p-5 rounded-2xl border-t-4 ${slaBreaches > 0 ? 'border-t-pink-500 bg-pink-500/5 shadow-[0_0_15px_rgba(236,72,153,0.1)]' : 'border-t-slate-700'} hover-card">
                        <div class="text-[10px] ${slaBreaches > 0 ? 'text-pink-400' : 'text-slate-400'} uppercase font-black tracking-widest mb-1 flex items-center gap-2">
                            ${slaBreaches > 0 ? '<span class="animate-pulse">⚠️</span>' : '✅'} SLA Breaches
                        </div>
                        <div class="flex items-end gap-2 mt-2">
                            <span class="text-4xl font-black ${slaBreaches > 0 ? 'text-pink-500' : 'text-white'}">${slaBreaches}</span>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-2 font-semibold">Orders pending > 48 hours</div>
                    </div>

                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-orange-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Core Bottleneck</div>
                        <div class="text-xl font-black text-orange-400 truncate mt-2 leading-tight" title="${frictionIndex}">${frictionIndex}</div>
                        <div class="inline-block mt-2 bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs font-bold px-2 py-1 rounded">
                            ${maxStuck} Orders Stuck Here
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="glass-panel p-5 rounded-2xl">
                        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-indigo-400">🔥</span> Top Performing SKUs
                        </h3>
                        <div class="space-y-3">
                            ${sortedSKUs.map(([sku, qty], idx) => `
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span class="text-slate-300 truncate max-w-[200px]">${idx + 1}. ${sku}</span>
                                        <span class="text-indigo-400">${qty} pcs</span>
                                    </div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full rounded-full" style="width: ${(qty / (sortedSKUs[0][1] || 1)) * 100}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="glass-panel p-5 rounded-2xl">
                        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-emerald-400">🏬</span> Top Client Outlets
                        </h3>
                        <div class="space-y-3">
                            ${sortedShops.slice(0, 5).map(([shop, sData], idx) => `
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span class="text-slate-300 truncate max-w-[200px]">${idx + 1}. ${shop}</span>
                                        <span class="text-emerald-400">${sData.items} units</span>
                                    </div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                        <div class="bg-emerald-500 h-full rounded-full" style="width: ${(sData.items / topShopVolume) * 100}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="glass-panel p-5 rounded-2xl">
                        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-purple-400">🏷️</span> Brand Distribution
                        </h3>
                        <div class="space-y-3">
                            ${Object.entries(brandStats).map(([brand, count]) => `
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span class="text-slate-300">${brand}</span>
                                        <span class="text-purple-400">${count} pcs</span>
                                    </div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                        <div class="bg-purple-500 h-full rounded-full" style="width: ${(count / brandMax) * 100}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            mdoDiv.innerHTML = mdoHtml;
        }

        function renderPipeline() {
            const bar = document.getElementById('stageFilterBar');
            
            let stageCounts = Array(9).fill(0);
            let totalActive = filteredData.length;

            filteredData.forEach(o => {
                if (!o.isFullyCompleted) {
                    stageCounts[o.completedStages]++;
                }
            });

            let filterBarHtml = `
                <button onclick="filterByStage(null)" 
                        class="stage-chip ${activeStageFilter === null ? 'active-filter' : 'bg-[#131C31] text-slate-400'} px-4 py-3 rounded-xl border border-slate-800 flex items-center gap-2 whitespace-nowrap text-xs font-bold hover:border-indigo-500 transition-all">
                    <span>All Pipeline</span>
                    <span class="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full text-[10px]">${totalActive}</span>
                </button>
            `;

            STAGE_NAMES.forEach((name, idx) => {
                const count = stageCounts[idx];
                const isActive = activeStageFilter === idx;
                filterBarHtml += `
                    <button onclick="filterByStage(${idx})" 
                            class="stage-chip ${isActive ? 'active-filter' : 'bg-[#131C31] text-slate-400'} px-4 py-3 rounded-xl border border-slate-800 flex items-center gap-2 whitespace-nowrap text-xs font-bold hover:border-indigo-500 transition-all">
                        <span>${idx + 1}. ${name.split(' (')[0]}</span>
                        <span class="${count > 0 ? 'bg-indigo-500 text-white' : 'bg-slate-800 text-slate-500'} px-2 py-0.5 rounded-full text-[10px]">${count}</span>
                    </button>
                `;
            });

            bar.innerHTML = filterBarHtml;
            renderOrdersGrid();
        }

        function filterByStage(stageIdx) {
            activeStageFilter = stageIdx;
            renderPipeline();
        }

        function renderOrdersGrid() {
            const grid = document.getElementById('orderGrid');
            
            let displayOrders = filteredData;
            if (activeStageFilter !== null) {
                displayOrders = filteredData.filter(o => !o.isFullyCompleted && o.completedStages === activeStageFilter);
            }

            if (displayOrders.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center glass-panel rounded-2xl border border-slate-800">
                        <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">No active orders found in this operational segment</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = displayOrders.map(order => {
                const currentStageName = order.isFullyCompleted ? "Completed" : STAGE_NAMES[order.completedStages];
                const progressPercent = Math.round((order.completedStages / 9) * 100);
                
                return `
                    <div onclick="openModalById('${order.orderId}')" class="glass-panel p-5 rounded-2xl hover-card cursor-pointer flex flex-col justify-between border border-slate-800 relative overflow-hidden group">
                        <div class="absolute top-0 left-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500" style="width: ${progressPercent}%"></div>
                        
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-xs font-black text-indigo-400 font-mono tracking-wider">${order.orderId}</span>
                                <span class="text-[10px] font-bold px-2 py-1 rounded-md ${order.isFullyCompleted ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-indigo-500/10 text-indigo-300 border border-indigo-500/20'}">
                                    ${order.isFullyCompleted ? 'DONE' : `STAGE ${order.completedStages + 1}/9`}
                                </span>
                            </div>

                            <h4 class="text-base font-black text-white group-hover:text-indigo-300 transition-colors line-clamp-1 mb-1">${order.shopName}</h4>
                            <p class="text-[10px] text-slate-400 font-semibold mb-4">${new Date(order.date).toLocaleDateString()} • ${order.items.length} SKUs</p>

                            <div class="space-y-1.5 mb-4">
                                ${order.items.slice(0, 2).map(i => `
                                    <div class="flex justify-between items-center text-xs text-slate-300 bg-[#0B1121]/50 p-1.5 rounded-lg border border-slate-800/50">
                                        <span class="truncate max-w-[150px] font-medium">${i.name}</span>
                                        <span class="font-bold text-indigo-400">x${i.qty}</span>
                                    </div>
                                `).join('')}
                                ${order.items.length > 2 ? `<p class="text-[10px] text-slate-500 font-bold text-right">+${order.items.length - 2} more items</p>` : ''}
                            </div>
                        </div>

                        <div class="pt-3 border-t border-slate-800/80 flex justify-between items-center">
                            <span class="text-[11px] font-bold text-slate-400 truncate max-w-[180px]">${currentStageName}</span>
                            <span class="text-indigo-400 text-xs font-black group-hover:translate-x-1 transition-transform">→</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModalById(orderId) {
            const order = allOrdersData.find(o => o.orderId === orderId);
            if (order) openModal(order);
        }

        function openModal(order) {
            currentActiveOrder = order;
            queuedFiles = [];

            document.getElementById('modalOrderId').innerText = order.orderId;
            document.getElementById('modalShopName').innerText = order.shopName;

            const container = document.getElementById('stagesContainer');
            
            let html = `
                <div class="bg-[#131C31] p-4 rounded-xl border border-slate-800 mb-6">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Order Items Manifest</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        ${order.items.map(i => `
                            <div class="flex items-center gap-3 bg-[#0B1121] p-2 rounded-lg border border-slate-800">
                                ${i.image ? `<img src="${i.image}" class="w-10 h-10 rounded-md object-cover border border-slate-700">` : '<div class="w-10 h-10 rounded-md bg-slate-800 flex items-center justify-center text-xs">📦</div>'}
                                <div>
                                    <p class="text-xs font-bold text-white line-clamp-1">${i.name}</p>
                                    <p class="text-[10px] font-bold text-indigo-400">Quantity: ${i.qty}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="space-y-4">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Stage Execution Checklist</h4>
            `;

            STAGE_NAMES.forEach((name, idx) => {
                const isCompleted = idx < order.completedStages;
                const isCurrent = idx === order.completedStages && !order.isFullyCompleted;
                const stageDataUrl = order.stageUrls[idx] || "";
                const isCallStage = (idx === 2 || idx === 6 || idx === 8); // Stage 3, 7, 9 (Call stages)

                html += `
                    <div class="p-4 rounded-xl border ${isCompleted ? 'bg-emerald-500/5 border-emerald-500/20' : (isCurrent ? 'bg-indigo-500/10 border-indigo-500/40 shadow-lg' : 'bg-[#131C31]/50 border-slate-800 opacity-60')} flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all">
                        <div class="flex items-center gap-3">
                            <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-black ${isCompleted ? 'bg-emerald-500 text-white' : (isCurrent ? 'bg-indigo-500 text-white animate-pulse' : 'bg-slate-800 text-slate-500')}">
                                ${isCompleted ? '✓' : idx + 1}
                            </div>
                            <div>
                                <p class="text-sm font-bold ${isCompleted ? 'text-emerald-400' : (isCurrent ? 'text-white' : 'text-slate-400')}">${name}</p>
                                ${stageDataUrl ? `<p class="text-[10px] ${stageDataUrl.includes('Call Not Received') ? 'text-amber-400' : 'text-slate-500'} font-mono mt-0.5 truncate max-w-[280px]">${stageDataUrl}</p>` : ''}
                            </div>
                        </div>

                        <div>
                            ${isCompleted ? `
                                <span class="text-xs font-bold text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-lg">Completed</span>
                            ` : (isCurrent ? `
                                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                    ${idx === 8 ? `
                                        <select id="stageRating" class="bg-[#0B1121] border border-slate-700 text-xs text-white p-2 rounded-lg outline-none">
                                            <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                                            <option value="4">⭐⭐⭐⭐ (4/5)</option>
                                            <option value="3">⭐⭐⭐ (3/5)</option>
                                        </select>
                                    ` : ''}

                                    ${isCallStage ? `
                                        <button onclick="logCallNotReceived(${idx + 1})" id="callNotRecBtn" class="bg-amber-500/10 hover:bg-amber-500 hover:text-black text-amber-400 border border-amber-500/30 text-xs font-black px-3 py-2 rounded-lg transition-all">
                                            📞 Call Not Received
                                        </button>
                                    ` : ''}
                                    
                                    ${idx > 0 ? `
                                        <input type="file" id="stageFileInput" multiple onchange="handleFileSelect(event)" class="hidden">
                                        <button onclick="document.getElementById('stageFileInput').click()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold px-3 py-2 rounded-lg border border-slate-700 transition-all">
                                            📎 Attach Documents
                                        </button>
                                    ` : ''}

                                    <button onclick="executeStageUpdate(${idx + 1})" id="execBtn" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white text-xs font-black px-4 py-2 rounded-lg shadow-md transition-all">
                                        MARK COMPLETE
                                    </button>
                                </div>
                                <div id="filePreviewList" class="mt-2 text-[10px] text-indigo-400 font-mono"></div>
                            ` : `
                                <span class="text-xs font-semibold text-slate-600">Pending Stage</span>
                            `}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
            currentActiveOrder = null;
            queuedFiles = [];
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            queuedFiles = [];
            
            const preview = document.getElementById('filePreviewList');
            preview.innerText = `Selected ${files.length} file(s)... Processing encoding`;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result.split(',')[1];
                    queuedFiles.push({
                        name: file.name,
                        mimeType: file.type,
                        base64: base64
                    });
                    preview.innerText = `Ready: ${queuedFiles.length} file(s) attached`;
                };
                reader.readAsDataURL(file);
            });
        }

        async function logCallNotReceived(stageNum) {
            const btn = document.getElementById('callNotRecBtn');
            btn.innerText = "LOGGING...";
            btn.disabled = true;

            const payload = {
                action: 'updateStage',
                orderId: currentActiveOrder.orderId,
                stage: stageNum,
                isCallNotReceived: true
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const response = await res.json();
                
                if (response.status === 'success') {
                    showNotification("Call Logged", `Order ${currentActiveOrder.orderId}: Call Not Received saved.`);
                    await fetchOrders(true);
                } else {
                    alert("Logging Failed: " + response.message);
                    btn.innerText = "📞 Call Not Received";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Network execution error.");
                btn.innerText = "📞 Call Not Received";
                btn.disabled = false;
            }
        }

        async function executeStageUpdate(stageNum) {
            const btn = document.getElementById('execBtn');
            btn.innerText = "UPDATING...";
            btn.disabled = true;

            let ratingVal = null;
            if (stageNum === 9) {
                const ratingSelect = document.getElementById('stageRating');
                if (ratingSelect) ratingVal = ratingSelect.value;
            }

            const payload = {
                action: 'updateStage',
                orderId: currentActiveOrder.orderId,
                stage: stageNum,
                files: queuedFiles,
                rating: ratingVal
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const response = await res.json();
                
                if (response.status === 'success') {
                    showNotification("Stage Updated", `Order ${currentActiveOrder.orderId} moved to Stage ${stageNum + 1}`);
                    await fetchOrders(true);
                } else {
                    alert("Execution Failed: " + response.message);
                    btn.innerText = "MARK COMPLETE";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Network execution error.");
                btn.innerText = "MARK COMPLETE";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
