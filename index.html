<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - Operations Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">YASH MARKETING</h1>
            <p class="text-slate-400 text-sm tracking-widest mt-2 uppercase">Automated Operations Terminal</p>
        </div>

        <form id="opsForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Order ID</label>
                <input type="text" id="orderId" required placeholder="e.g. ORD-8842" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Processing Stage</label>
                <select id="stage" required onchange="checkStage()"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <option value="1">1. Order Received (Accept)</option>
                    <option value="2">2. Balance Check (Tally Photo)</option>
                    <option value="3">3. Call 1 (Confirmation Audio)</option>
                    <option value="4">4. Processed (Stock Photo)</option>
                    <option value="5">5. Invoiced (Invoice Photo)</option>
                    <option value="6">6. Dispatched (Box/Bag Photo)</option>
                    <option value="7">7. Call 2 (Out-for-delivery Audio)</option>
                    <option value="8">8. Delivered (Transport Pauti Photo)</option>
                    <option value="9">9. Final Call (Feedback Audio & Rating)</option>
                </select>
            </div>

            <div id="ratingDiv" class="hidden">
                <label class="block text-sm font-medium text-slate-300 mb-1">Customer Rating (1-5)</label>
                <input type="number" id="rating" min="1" max="5" placeholder="5" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
            </div>

            <div id="fileUploadDiv" class="hidden">
                <label class="block text-sm font-medium text-slate-300 mb-1" id="fileLabel">Upload Proof</label>
                <input type="file" id="fileInput" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 transition">
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-500 hover:to-emerald-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition hover:-translate-y-0.5">
                Update System
            </button>
        </form>
        
        <div id="status" class="mt-4 text-center text-sm font-semibold hidden"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyws0jd3sL7L3rp0nXsHxcnI3A8npsJldRuCeSV_BswzHsYB5Syzm9dLpFlSA_tIW0vsQ/exec"; // <--- PASTE YOUR GAS WEB APP URL HERE

        // Toggle file and rating inputs based on stage
        function checkStage() {
            const stage = document.getElementById('stage').value;
            const fileDiv = document.getElementById('fileUploadDiv');
            const fileLabel = document.getElementById('fileLabel');
            const ratingDiv = document.getElementById('ratingDiv');
            
            ratingDiv.classList.add('hidden');
            
            if (stage === "1") {
                fileDiv.classList.add('hidden');
            } else {
                fileDiv.classList.remove('hidden');
                if (["3", "7", "9"].includes(stage)) {
                    fileLabel.innerText = "Upload Audio Recording (.mp3/.m4a)";
                    document.getElementById('fileInput').accept = "audio/*";
                } else {
                    fileLabel.innerText = "Upload Photo Proof (.jpg/.png)";
                    document.getElementById('fileInput').accept = "image/*";
                }
                
                if (stage === "9") {
                    ratingDiv.classList.remove('hidden');
                }
            }
        }

        // Convert file to Base64
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('opsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            btn.innerText = "Processing...";
            btn.disabled = true;
            statusDiv.classList.add('hidden');

            const orderId = document.getElementById('orderId').value;
            const stage = document.getElementById('stage').value;
            const rating = document.getElementById('rating').value;
            const fileInput = document.getElementById('fileInput');

            let payload = { orderId, stage, rating };

            if (stage !== "1" && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                payload.fileName = file.name;
                payload.mimeType = file.type;
                payload.fileBase64 = await getBase64(file);
            } else if (stage !== "1" && fileInput.files.length === 0) {
                alert("Proof file is required for this stage.");
                btn.innerText = "Update System";
                btn.disabled = false;
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                statusDiv.innerText = result.message;
                statusDiv.className = "mt-4 text-center text-sm font-semibold text-emerald-400";
                document.getElementById('opsForm').reset();
                checkStage();
            } catch (error) {
                statusDiv.innerText = "Error syncing with Control Tower.";
                statusDiv.className = "mt-4 text-center text-sm font-semibold text-red-400";
            }

            statusDiv.classList.remove('hidden');
            btn.innerText = "Update System";
            btn.disabled = false;
        });

        // Initialize UI state
        checkStage();
    </script>
</body>
</html>
