<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - Enterprise OS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0B1121; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .chart-bar { 
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .hover-card {
            transition: all 0.3s ease;
        }
        .hover-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); 
            border-color: rgba(99, 102, 241, 0.4); 
        }
        ::-webkit-scrollbar { 
            width: 6px; 
            height: 6px; 
        }
        ::-webkit-scrollbar-track { 
            background: #0B1121; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #334155; 
            border-radius: 4px; 
        }
        .hide-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        @keyframes slideDown { 
            from { 
                transform: translateY(-100%); 
                opacity: 0; 
            } 
            to { 
                transform: translateY(0); 
                opacity: 1; 
            } 
        }
        .toast-enter { 
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .active-filter { 
            background: #4F46E5 !important; 
            border-color: #6366F1 !important; 
            color: white !important; 
            font-weight: bold; 
        }
        .text-wrap-custom {
            word-wrap: break-word;
            white-space: normal;
        }
    </style>
</head>
<body class="min-h-screen p-2 md:p-6 lg:p-8 selection:bg-indigo-500 selection:text-white">

    <!-- Notification Area -->
    <div id="notificationArea" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none"></div>

    <!-- Login Authentication Screen -->
    <div id="loginScreen" class="flex h-[90vh] items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-4 border-t-indigo-500">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 mb-2 tracking-tight">
                YASH MARKETING
            </h1>
            <p class="text-slate-400 text-xs tracking-[0.2em] mb-8 uppercase font-semibold">
                Enterprise OS Login (v5.5)
            </p>
            <form id="loginForm" class="space-y-4">
                <input 
                    type="text" 
                    id="loginEmpId" 
                    placeholder="Access Code / Emp ID" 
                    required 
                    class="w-full bg-[#131C31] border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase transition-all shadow-inner"
                >
                <input 
                    type="password" 
                    id="loginPass" 
                    placeholder="Security PIN" 
                    required 
                    class="w-full bg-[#131C31] border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner"
                >
                <button 
                    type="submit" 
                    id="loginBtn" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-black py-4 rounded-xl shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all transform active:scale-[0.98]"
                >
                    INITIALIZE SYSTEM
                </button>
            </form>
            <p id="loginError" class="text-pink-400 text-sm mt-4 font-semibold hidden animate-pulse"></p>
        </div>
    </div>

    <!-- Main Operational Dashboard Screen -->
    <div id="dashboardScreen" class="hidden max-w-[1400px] mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 bg-[#131C31] p-4 rounded-2xl border border-slate-800 shadow-lg">
            <div>
                <h1 class="text-2xl font-black text-white flex items-center gap-2 tracking-tight">
                    <span class="text-indigo-400">⚡</span> Mission Control
                </h1>
                <p class="text-slate-400 text-xs mt-1 font-mono">
                    OP_ID: <span id="userName" class="text-emerald-400 font-bold"></span>
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto bg-[#0B1121] p-1.5 rounded-xl border border-slate-800">
                <button 
                    onclick="setDateRange('today', this)" 
                    class="date-filter-btn active-filter px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all"
                >
                    Today
                </button>
                <button 
                    onclick="setDateRange('7d', this)" 
                    class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all"
                >
                    7 Days
                </button>
                <button 
                    onclick="setDateRange('30d', this)" 
                    class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all"
                >
                    30 Days
                </button>
                <button 
                    onclick="setDateRange('all', this)" 
                    class="date-filter-btn px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-white transition-all"
                >
                    All Time
                </button>
                
                <div class="w-px h-6 bg-slate-700 mx-1 hidden sm:block"></div>
                
                <!-- NEW FEATURE: Split Orders -->
                <button 
                    onclick="setDateRange('split', this)" 
                    class="date-filter-btn px-4 py-2 rounded-lg text-xs text-purple-400 border border-purple-500/30 hover:bg-purple-500 hover:text-white transition-all"
                >
                    ✂️ Split Orders
                </button>
                
                <div class="w-px h-6 bg-slate-700 mx-1 hidden sm:block"></div>

                <input 
                    type="date" 
                    id="customDateFilter" 
                    onchange="setDateRange('custom', this)" 
                    class="bg-transparent text-xs text-indigo-300 outline-none cursor-pointer p-1"
                >
                <button 
                    onclick="logout()" 
                    class="ml-auto lg:ml-2 bg-pink-500/10 text-pink-400 border border-pink-500/30 hover:bg-pink-500 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition-all"
                >
                    LOGOUT
                </button>
            </div>
        </div>

        <div id="mdoCommandCenter" class="hidden mb-8 space-y-4"></div>

        <h3 class="text-lg font-black text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
            <span class="text-indigo-400">🌊</span> Operational Pipeline
        </h3>
        
        <div id="stageFilterBar" class="flex overflow-x-auto gap-3 mb-6 pb-2 hide-scrollbar"></div>
        
        <div id="orderGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </div>

    <!-- Order Execution Task Modal -->
    <div id="orderModal" class="hidden fixed inset-0 bg-[#0B1121]/95 backdrop-blur-md flex items-center justify-center z-50 p-2 sm:p-4">
        <div class="glass-panel w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh] shadow-2xl border border-slate-700">
            
            <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-[#131C31] shadow-md z-10">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight" id="modalOrderId">ORD-000</h2>
                    <p class="text-indigo-400 text-sm font-bold mt-1 text-wrap-custom" id="modalShopName">Shop Name</p>
                    <div class="flex gap-3 mt-2">
                        <span 
                            id="modalPaymentMode" 
                            class="text-[10px] bg-slate-800 px-2 py-1 rounded text-white font-black tracking-widest uppercase"
                        ></span>
                        <span 
                            id="modalTotalValue" 
                            class="text-[10px] bg-emerald-900/30 border border-emerald-500/30 px-2 py-1 rounded text-emerald-400 font-black tracking-widest"
                        ></span>
                    </div>
                </div>
                <button 
                    onclick="closeModal()" 
                    class="text-slate-400 hover:text-pink-400 text-4xl leading-none transition-colors"
                >
                    &times;
                </button>
            </div>
            
            <div class="p-4 md:p-6 overflow-y-auto flex-grow bg-[#0B1121]" id="stagesContainer">
                <!-- Dynamically Generated Stages Here -->
            </div>
            
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION AND GLOBAL STATE
        // ==========================================
        
        // REPLACE WITH YOUR NEW DEPLOYMENT URL
        const API_URL = "https://script.google.com/macros/s/AKfycbyJaNQwIGmiEZeALeYJoptKpFBIL0eiV1z62FKYhge4cw6M-BDB_3iMX5bvEYOaZuZTjA/exec"; 
        
        const STAGE_NAMES = [
            "Order Received", 
            "Balance Check", 
            "WhatsApp 1 (Confirmation)", 
            "Processed (Stock)", 
            "Invoiced", 
            "Dispatched", 
            "Dynamic Comms Stage", 
            "Delivered", 
            "Final Call (Rating)"
        ];

        let allOrdersData = [];
        let filteredData = [];
        let currentActiveOrder = null;
        let activeStageFilter = null;
        let activeDateRange = 'today'; 
        let latestOrderTimestamp = null;
        let autoRefreshInterval = null;
        let queuedFiles = []; 
        let currentUserRole = 'Staff';

        // ==========================================
        // LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            
            btn.innerText = "AUTHENTICATING...";
            
            try {
                const payload = { 
                    action: 'login', 
                    employeeId: document.getElementById('loginEmpId').value, 
                    password: document.getElementById('loginPass').value 
                };

                const res = await fetch(API_URL, {
                    method: 'POST', 
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('yash_user', data.user.name); 
                    localStorage.setItem('yash_role', data.user.role || 'Staff');
                    showDashboard(data.user.name, data.user.role);
                } else {
                    error.innerText = data.message; 
                    error.classList.remove('hidden'); 
                    btn.innerText = "INITIALIZE SYSTEM";
                }
            } catch (err) {
                error.innerText = "Network Error. Check Connection."; 
                error.classList.remove('hidden'); 
                btn.innerText = "INITIALIZE SYSTEM";
            }
        });

        function showDashboard(name, role) {
            currentUserRole = role || 'Staff';
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = name.toUpperCase();
            
            fetchOrders(false);
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => { 
                fetchOrders(true); 
            }, 15000); 
        }

        function logout() { 
            localStorage.removeItem('yash_user'); 
            localStorage.removeItem('yash_role'); 
            location.reload(); 
        }
        
        if (localStorage.getItem('yash_user')) { 
            showDashboard(localStorage.getItem('yash_user'), localStorage.getItem('yash_role')); 
        }

        // ==========================================
        // NOTIFICATIONS
        // ==========================================
        function showNotification(title, message) {
            const area = document.getElementById('notificationArea');
            const toast = document.createElement('div');
            
            toast.className = "bg-[#131C31] text-white px-5 py-3 rounded-xl shadow-[0_10px_40px_rgba(79,70,229,0.4)] border border-indigo-500 flex items-center gap-4 toast-enter pointer-events-auto";
            
            toast.innerHTML = `
                <span class="text-2xl animate-bounce">⚡</span>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-indigo-400">${title}</p>
                    <p class="text-sm font-bold text-white mt-0.5">${message}</p>
                </div>
            `;
            
            area.appendChild(toast);
            
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transition = 'opacity 0.3s ease'; 
                setTimeout(() => toast.remove(), 300); 
            }, 6000);
        }

        // ==========================================
        // DATA FETCHING & FILTERING
        // ==========================================
        async function fetchOrders(isSilent = false) {
            const grid = document.getElementById('orderGrid');
            
            if (!isSilent && allOrdersData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="inline-block animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-indigo-400 font-bold tracking-widest uppercase text-sm">Syncing with Mainframe...</p>
                    </div>
                `;
            }
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getOrders' }) 
                });
                
                const response = await res.json();
                
                if (response.status === 'success') {
                    if (response.data.length > 0 && latestOrderTimestamp !== null) {
                        const incomingLatest = new Date(response.data[0].date).getTime();
                        if (incomingLatest > latestOrderTimestamp) {
                            showNotification("New Order Incoming", response.data[0].shopName);
                        }
                    }
                    
                    if (response.data.length > 0) {
                        latestOrderTimestamp = new Date(response.data[0].date).getTime();
                    }
                    
                    allOrdersData = response.data;
                    applyDateFilter(); 

                    if (currentActiveOrder && !document.getElementById('orderModal').classList.contains('hidden')) {
                        const updatedOrder = allOrdersData.find(o => o.orderId === currentActiveOrder.orderId);
                        if (updatedOrder) {
                            openModal(updatedOrder); 
                        }
                    }
                }
            } catch (err) {
                console.log("Background sync error.");
            }
        }

        function setDateRange(range, btnElement) {
            activeDateRange = range;
            
            if(range !== 'custom') {
                document.getElementById('customDateFilter').value = '';
            }
            
            if(btnElement && range !== 'custom') {
                document.querySelectorAll('.date-filter-btn').forEach(btn => btn.classList.remove('active-filter'));
                btnElement.classList.add('active-filter');
            }
            
            applyDateFilter();
        }

        function applyDateFilter() {
            let now = new Date(); 
            now.setHours(0,0,0,0);
            
            if (activeDateRange === 'split') {
                filteredData = allOrdersData.filter(o => o.orderId.includes('-SPLIT-'));
            } else {
                filteredData = allOrdersData.filter(o => {
                    let d = new Date(o.date); 
                    d.setHours(0,0,0,0);
                    
                    if (activeDateRange === 'today') {
                        return d.getTime() === now.getTime();
                    }
                    if (activeDateRange === '7d') {
                        return (now - d) / (1000*60*60*24) <= 7;
                    }
                    if (activeDateRange === '30d') {
                        return (now - d) / (1000*60*60*24) <= 30;
                    }
                    if (activeDateRange === 'custom') {
                        let customVal = document.getElementById('customDateFilter').value;
                        if(!customVal) return true;
                        return new Date(customVal).getTime() === d.getTime();
                    }
                    return true; 
                });
            }
            
            renderMdoDashboard(); 
            renderPipeline();
        }

        // ==========================================
        // OWNER MDO DASHBOARD (WAR ROOM)
        // ==========================================
        function renderMdoDashboard() {
            const userName = localStorage.getItem('yash_user') || "";
            const isOwner = currentUserRole.toLowerCase() === 'admin' || currentUserRole.toLowerCase() === 'owner' || userName.toLowerCase().includes('yash');
            
            const mdoDiv = document.getElementById('mdoCommandCenter');
            
            if (!isOwner) { 
                mdoDiv.classList.add('hidden'); 
                return; 
            }
            
            mdoDiv.classList.remove('hidden');

            let totalVolume = 0; 
            let totalCompleted = 0; 
            let slaBreaches = 0; 
            let shopStats = {}; 
            let skuStats = {}; 
            let brandStats = { 'boAt': 0, 'Velocity': 0, 'Portronics': 0, 'JBL': 0, 'Hikvision': 0, 'Others': 0 };
            let stageStuck = Array(9).fill(0); 
            const now = new Date().getTime();

            filteredData.forEach(o => {
                if(o.isFullyCompleted) {
                    totalCompleted++;
                } else { 
                    stageStuck[o.completedStages]++; 
                    if ((now - new Date(o.date).getTime()) > (48 * 60 * 60 * 1000)) {
                        slaBreaches++;
                    }
                }

                if(!shopStats[o.shopName]) {
                    shopStats[o.shopName] = { items: 0 };
                }
                
                o.items.forEach(i => {
                    let qty = parseInt(i.qty || 1); 
                    totalVolume += qty; 
                    shopStats[o.shopName].items += qty;
                    
                    let cleanName = i.name.trim(); 
                    if(!skuStats[cleanName]) {
                        skuStats[cleanName] = 0; 
                    }
                    skuStats[cleanName] += qty;
                    
                    let n = cleanName.toLowerCase();
                    if(n.includes('boat')) brandStats['boAt'] += qty;
                    else if(n.includes('velocity')) brandStats['Velocity'] += qty;
                    else if(n.includes('portronics')) brandStats['Portronics'] += qty;
                    else if(n.includes('jbl')) brandStats['JBL'] += qty;
                    else if(n.includes('hikvision')) brandStats['Hikvision'] += qty;
                    else brandStats['Others'] += qty;
                });
            });

            let sortedShops = Object.entries(shopStats).sort((a,b) => b[1].items - a[1].items);
            let sortedSKUs = Object.entries(skuStats).sort((a,b) => b[1] - a[1]).slice(0, 5); 
            let topShopVolume = sortedShops.length > 0 ? sortedShops[0][1].items : 1;
            let maxStuck = Math.max(...stageStuck);
            let frictionIndex = maxStuck > 0 ? STAGE_NAMES[stageStuck.indexOf(maxStuck)].split(' (')[0] : "Smooth Pipeline";
            let completionRate = filteredData.length > 0 ? Math.round((totalCompleted / filteredData.length) * 100) : 0;
            let healthScore = Math.max(0, 100 - (slaBreaches * 5) - ((100 - completionRate) * 0.2)).toFixed(0);
            let healthColor = healthScore > 80 ? 'text-emerald-400' : (healthScore > 50 ? 'text-orange-400' : 'text-pink-500');
            let brandMax = Math.max(...Object.values(brandStats), 1);

            let mdoHtml = `
                <div class="flex justify-between items-center bg-[#0B1121] border border-slate-800 p-4 rounded-2xl mb-4 shadow-lg">
                    <div>
                        <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 tracking-widest uppercase">
                            🔴 Live War Room
                        </h2>
                        <p class="text-[10px] text-slate-500 font-mono mt-1">Real-time Business Telemetry</p>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black ${healthColor} drop-shadow-[0_0_10px_currentColor]">${healthScore}%</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Pipeline Health</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-indigo-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Total Volume Output</div>
                        <div class="flex items-end gap-2 mt-2">
                            <span class="text-4xl font-black text-white">${totalVolume}</span>
                            <span class="text-xs text-indigo-400 font-bold mb-1 pb-1">Units Moved</span>
                        </div>
                    </div>
                    
                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-emerald-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Delivery Success</div>
                        <div class="flex items-center gap-3 mt-2">
                            <span class="text-4xl font-black text-emerald-400">${completionRate}%</span>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-2 font-semibold">${totalCompleted} / ${filteredData.length} Orders Delivered</div>
                    </div>
                    
                    <div class="glass-panel p-5 rounded-2xl border-t-4 ${slaBreaches > 0 ? 'border-t-pink-500 bg-pink-500/5 shadow-[0_0_15px_rgba(236,72,153,0.1)]' : 'border-t-slate-700'} hover-card">
                        <div class="text-[10px] ${slaBreaches > 0 ? 'text-pink-400' : 'text-slate-400'} uppercase font-black tracking-widest mb-1 flex items-center gap-2">
                            ${slaBreaches > 0 ? '<span class="animate-pulse">⚠️</span>' : '✅'} SLA Breaches
                        </div>
                        <div class="flex items-end gap-2 mt-2">
                            <span class="text-4xl font-black ${slaBreaches > 0 ? 'text-pink-500' : 'text-white'}">${slaBreaches}</span>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-2 font-semibold">Orders pending > 48 hours</div>
                    </div>
                    
                    <div class="glass-panel p-5 rounded-2xl border-t-4 border-t-orange-500 hover-card">
                        <div class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Core Bottleneck</div>
                        <div class="text-xl font-black text-orange-400 truncate mt-2 leading-tight" title="${frictionIndex}">${frictionIndex}</div>
                        <div class="inline-block mt-2 bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs font-bold px-2 py-1 rounded">
                            ${maxStuck} Orders Stuck Here
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="glass-panel p-5 rounded-2xl lg:col-span-1">
                        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-4 flex items-center gap-2">
                            <span class="text-yellow-400">🔥</span> Hot Movers (Top SKUs)
                        </h3>
                        <div class="space-y-3">
            `;

            if (sortedSKUs.length > 0) {
                sortedSKUs.forEach((sku, i) => { 
                    mdoHtml += `
                        <div class="flex justify-between items-center bg-[#0B1121] p-2.5 rounded-lg border border-slate-800">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <span class="text-slate-600 font-black text-sm">#${i+1}</span>
                                <span class="text-xs font-bold text-slate-300 truncate">${sku[0]}</span>
                            </div>
                            <span class="text-sm font-black text-yellow-400 ml-2 shrink-0">${sku[1]} <span class="text-[9px] text-slate-500">QTY</span></span>
                        </div>
                    `; 
                });
            } else { 
                mdoHtml += `
                    <p class="text-slate-500 text-sm italic">No SKU data available.</p>
                `; 
            }

            mdoHtml += `
                        </div>
                    </div>
                    
                    <div class="glass-panel p-5 rounded-2xl lg:col-span-1">
                        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-4 flex items-center gap-2">
                            <span class="text-emerald-400">👑</span> VIP Dealers
                        </h3>
                        <div class="space-y-3 max-h-60 overflow-y-auto hide-scrollbar pr-2">
            `;

            if (sortedShops.length > 0) {
                sortedShops.slice(0, 6).forEach((v, i) => { 
                    let pct = (v[1].items / topShopVolume) * 100; 
                    mdoHtml += `
                        <div class="relative w-full bg-[#0B1121] rounded-lg p-2.5 overflow-hidden border border-slate-800 group">
                            <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-900/40 to-transparent transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                            <div class="relative z-10 flex justify-between items-center">
                                <div class="flex items-center gap-2 w-2/3">

        function setStageFilter(stageIndex) {

            let pendingOrders = filteredData.filter(o => !o.isFullyCompleted);

                    stageCounts[o.completedStages]++;

            let filterHtml = `

                    onclick="setStageFilter(null)"

        // ==========================================
        // UI INTERACTIONS & FILE SELECTION
        // ==========================================
        function handleFileSelection(inputElement, stageNum) {
            const newFiles = Array.from(inputElement.files);
            queuedFiles = queuedFiles.concat(newFiles);
            
            const statusLabel = document.getElementById(`fileStatusText_${stageNum}`);
            const clearBtn = document.getElementById(`clearFilesBtn_${stageNum}`);
            const container = document.getElementById(`fileStatusContainer_${stageNum}`);
            const previewBox = document.getElementById(`previewBox_${stageNum}`);
            
            if (queuedFiles.length > 0) {
                statusLabel.innerText = `✓ ${queuedFiles.length} File(s) Ready`;
                statusLabel.classList.remove('hidden'); 
                
                if (clearBtn) {
                    clearBtn.classList.remove('hidden'); 
                }
                
                if (container) {
                    container.classList.remove('hidden');
                }
                
                if (previewBox) {
                    previewBox.innerHTML = ''; 
                    previewBox.classList.remove('hidden');
                    
                    queuedFiles.forEach(file => {
                        if (file.type.startsWith('audio/')) { 
                            previewBox.innerHTML += `
                                <div class="w-12 h-12 bg-indigo-900/50 flex flex-col items-center justify-center rounded border border-indigo-500 text-[8px] text-indigo-300 font-bold p-1 overflow-hidden shadow-inner">
                                    🎤<br/>Audio
                                </div>
                            `; 
                        } else {
                            const reader = new FileReader();
                            reader.onload = function(e) { 
                                previewBox.innerHTML += `
                                    <img src="${e.target.result}" class="w-12 h-12 object-cover rounded border border-slate-600 shadow-sm">
                                `; 
                            }
                            reader.readAsDataURL(file);
                        }
                    });
                }
            }
        }
        
        function clearQueuedFiles(stageNum) {
            queuedFiles = [];
            
            const statusLabel = document.getElementById(`fileStatusText_${stageNum}`);
            const clearBtn = document.getElementById(`clearFilesBtn_${stageNum}`);
            const container = document.getElementById(`fileStatusContainer_${stageNum}`);
            const previewBox = document.getElementById(`previewBox_${stageNum}`);
            
            if(statusLabel) {
                statusLabel.classList.add('hidden'); 
            }
            if(clearBtn) {
                clearBtn.classList.add('hidden'); 
            }
            if(container) {
                container.classList.add('hidden');
            }
            if(previewBox) { 
                previewBox.innerHTML = ''; 
                previewBox.classList.add('hidden'); 
            }
        }

        // ==========================================
        // WHATSAPP DIRECT CHAT
        // ==========================================
        window.openWhatsAppMsg = function(stageNum, isCod) {
            const orderId = currentActiveOrder.orderId;
            const shop = currentActiveOrder.shopName;
            const amt = currentActiveOrder.totalValue;
            let phone = currentActiveOrder.phone; 
            
            let msg = "";
            
            if(stageNum === 3) {
                msg = `Hello ${shop},\n\nYour order (${orderId}) with Yash Marketing is successfully processed and confirmed.\n\nPayment Mode: ${currentActiveOrder.paymentMode || 'N/A'}\nTotal Amount: Rs. ${amt}\n\nWe will dispatch it shortly. Thank you!`;
            } else if(stageNum === 7) {
                if (isCod) {
                    msg = `Hello ${shop},\n\nGood News! Your order (${orderId}) from Yash Marketing is OUT FOR DELIVERY today.\n\nPlease keep the exact COD amount Rs. ${amt} ready for a smooth handover.\n\nThank you for choosing Yash Marketing!`;
                } else {
                    msg = `Hello ${shop},\n\nGood News! Your PREPAID order (${orderId}) from Yash Marketing is OUT FOR DELIVERY today.\n\nOur delivery executive will reach you soon.\n\nThank you for choosing Yash Marketing!`;
                }
            }

            let waUrl = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(waUrl, '_blank');
        }

        // ==========================================
        // WHATSAPP SHARE TO GROUP
        // ==========================================
        window.shareToGroup = function(stageNum, fileUrlsString) {
            const orderId = currentActiveOrder.orderId;
            const shop = currentActiveOrder.shopName;
            const stageName = STAGE_NAMES[stageNum - 1]; 
            
            let links = fileUrlsString.split(',').map(u => u.trim()).join('\n');
            
            let msg = `*Order Update Alert*\n\n*Order ID:* ${orderId}\n*Dealer:* ${shop}\n*Stage Update:* ${stageName}\n\n*Attached Files/Proof:*\n${links}`;
            
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        }

                        if (stageNum === 9) {

                                <input

                            ></div>
                            
                            <div 
                                class="flex items-center justify-between mt-2 bg-emerald-900/10 rounded px-2 border border-emerald-500/10 hidden"

                                        min="1" 
                                        max="5"

                            <div class="flex justify-between items-center mb-2">
                                <span class="text-white font-black text-lg">
                                    ${stageNum}. ${displayStageName}
                                </span>
                                <span class="bg-indigo-500 text-white text-[9px] font-black px-2 py-1 rounded animate-pulse tracking-widest uppercase">
                                    ACTION REQUIRED
                                </span>
                            </div>
                            <div id="actionArea_${stageNum}">
                                ${inputHtml}
                            </div>
                            <p id="status_${stageNum}" class="text-xs font-bold mt-3 hidden text-center"></p>

        function closeModal() { 
            document.getElementById('orderModal').classList.add('hidden'); 
            fetchOrders(true); 
        }

        // ==========================================
        // DATA COMPRESSION & UPLOAD PROTOCOLS
        // ==========================================
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); 
                reader.readAsDataURL(file);
                
                reader.onload = (event) => {
                    const img = new Image(); 
                    img.src = event.target.result;
                    
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); 
                        const MAX_WIDTH = 800; 
                        let scale = 1;
                        
                        if (img.width > MAX_WIDTH) {
                            scale = MAX_WIDTH / img.width;
                        }
                        
                        canvas.width = img.width * scale; 
                        canvas.height = img.height * scale;
                        
                        const ctx = canvas.getContext('2d'); 
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                        
                        resolve({ 
                            name: file.name, 
                            mimeType: 'image/jpeg', 
                            base64: dataUrl.split(',')[1] 
                        });
                    };
                };
            });
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); 
                reader.readAsDataURL(file);
                
                reader.onload = () => resolve({ 
                    name: file.name, 
                    mimeType: file.type, 
                    base64: reader.result.split(',')[1] 
                });
                
                reader.onerror = error => reject(error);
            });
        }

        // ==========================================
        // SUBMIT STAGE
        // ==========================================
        async function submitStage(stageNum) {
            const btn = document.getElementById(`submitBtn_${stageNum}`);
            const statusLabel = document.getElementById(`status_${stageNum}`);
            
            let isCod = currentActiveOrder.paymentMode && currentActiveOrder.paymentMode.toUpperCase().includes('COD');

            let payload = { 
                action: 'updateStage', 
                orderId: currentActiveOrder.orderId, 
                stage: stageNum, 
                files: [], 
                isNoResponse: false, 
                isWhatsAppOnly: false, 
                partialStock: null 
            };
            
            const noRespCheckbox = document.getElementById(`noResponse_${stageNum}`);
            if (noRespCheckbox && noRespCheckbox.checked) { 
                payload.isNoResponse = true; 
            }
            
            if (stageNum !== 1) {
                
                let fileRequired = true;
                
                if (payload.isNoResponse || stageNum === 9 || stageNum === 3 || (stageNum === 7 && !isCod)) { 
                    fileRequired = false; 
                }

                if (fileRequired && queuedFiles.length === 0) {
                    if (stageNum === 7 && isCod) { 
                        alert("For COD Orders, Call Recording (Audio File) is MANDATORY to proceed. Or check 'Dealer Didn't Respond'."); 
                    } else { 
                        alert("A file proof (Screenshot/Photo) is mandatory OR check 'Dealer Didn't Respond'."); 
                    }
                    return; 
                }
                
                if (!fileRequired && queuedFiles.length === 0) { 
                    payload.isWhatsAppOnly = true; 
                }
                
                if (btn) { 
                    btn.innerText = "Processing & Transmitting..."; 
                    btn.disabled = true; 
                }
                
                for (let i = 0; i < queuedFiles.length; i++) {
                    let f = queuedFiles[i];
                    if (f.type.startsWith('image/')) { 
                        payload.files.push(await compressImage(f)); 
                    } else { 
                        payload.files.push(await getBase64(f)); 
                    }
                }
                
                // Final rating requirement
                if (stageNum === 9) {
                    const rating = document.getElementById('ratingInput').value;
                    if (!rating) { 
                        alert("Customer Rating is mandatory."); 
                        if(btn) { 
                            btn.disabled = false; 
                            btn.innerText = "Execute & Proceed"; 
                        } 
                        return; 
                    }
                    payload.rating = rating;
                }

                // Gather Partial Stock Options
                if (stageNum === 4) {
                    let processed = []; 
                    let short = [];
                    
                    currentActiveOrder.items.forEach((item, idx) => {
                        let chk = document.getElementById(`chk_item_${idx}`); 
                        let qtyInput = document.getElementById(`qty_item_${idx}`);
                        
                        if (chk && qtyInput) {
                            let isChecked = chk.checked; 
                            let userQty = parseInt(qtyInput.value) || 0; 
                            let origQty = parseInt(item.qty);
                            
                            if (isChecked && userQty > 0) { 
                                processed.push({name: item.name, qty: userQty}); 
                                if (userQty < origQty) { 
                                    short.push({name: item.name, qty: origQty - userQty}); 
                                } 
                            } else { 
                                short.push({name: item.name, qty: origQty}); 
                            }
                        }
                    });
                    
                    if (processed.length === 0) { 
                        alert("You must dispatch at least one item."); 
                        if(btn) { 
                            btn.disabled = false; 
                            btn.innerText = "Execute & Proceed"; 
                        } 
                        return; 
                    }
                    
                    if (short.length > 0) { 
                        payload.partialStock = { processedItems: processed, shortItems: short }; 
                    }
                }
            } else if (btn) { 
                btn.innerText = "Locking Process..."; 
                btn.disabled = true; 
            }
            
            if (statusLabel) { 
                statusLabel.innerText = "📡 Uplinking Data to Control Tower..."; 
                statusLabel.className = "text-[10px] font-black tracking-widest mt-3 text-indigo-400 block animate-pulse text-center uppercase"; 
                statusLabel.classList.remove('hidden'); 
            }

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                
                const data = await res.json();
                
                if (data.status === 'success') { 
                    if (btn) { 
                        btn.innerText = "Transmission Successful ✓"; 
                    } 
                    queuedFiles = []; 
                    fetchOrders(true); 
                } else { 
                    throw new Error(data.message); 
                }
            } catch (err) {
                if (statusLabel) { 
                    statusLabel.innerText = "❌ Sync Failed. Verify connection."; 
                    statusLabel.className = "text-[10px] font-black mt-3 text-pink-500 block text-center uppercase"; 
                }
                if (btn) { 
                    btn.innerText = "Retry Transmission"; 
                    btn.disabled = false; 
                }
            }
        }
    </script>
