<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@3.5.0/dist/full.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; }
    .stage-red { border-left: 5px solid #ef4444; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <div class="navbar bg-white shadow-sm px-6">
    <div class="flex-1 text-2xl font-bold text-indigo-600">DISTRO-PRO <span class="text-xs badge badge-ghost text-slate-400">v2.0</span></div>
    <div class="flex-none"><div class="avatar online"><div class="w-10 rounded-full"><img src="https://ui-avatars.com/api/?name=Staff" /></div></div></div>
  </div>

  <div class="p-6 max-w-7xl mx-auto">
    <!-- 1. Interactive Radar Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="col-span-1 glass-card p-6 shadow-lg border border-indigo-50">
        <h3 class="font-bold text-slate-700 mb-4 uppercase tracking-wider text-sm">Office Ops Radar</h3>
        <canvas id="opsRadar"></canvas>
      </div>

      <!-- Drill-Down Feed Section -->
      <div class="col-span-2 glass-card p-6 shadow-lg overflow-y-auto max-h-[400px]">
        <h3 class="font-bold text-slate-700 mb-4 uppercase tracking-wider text-sm">Live Assembly Line</h3>
        <div id="drillDownFeed" class="space-y-3">
           <!-- Dynamic Cards will be injected here -->
           <p class="text-slate-400 italic">Click a stage on radar to view bottlenecks...</p>
        </div>
      </div>
    </div>

    <!-- 2. Step Counter & Process Modal -->
    <dialog id="processModal" class="modal">
      <div class="modal-box w-11/22 max-w-5xl">
        <h3 id="modalOrderTitle" class="font-bold text-lg">Process Order #12345</h3>
        <div class="divider"></div>
        
        <!-- 9-Stage Timeline -->
        <ul class="steps steps-vertical lg:steps-horizontal w-full text-xs">
          <li class="step step-primary">Received</li>
          <li class="step">Balance</li>
          <li class="step">Call 1</li>
          <li class="step">Processed</li>
          <li class="step">Invoiced</li>
          <li class="step">Dispatched</li>
          <li class="step">Call 2</li>
          <li class="step">Delivered</li>
          <li class="step">Final Call</li>
        </ul>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Left: Action Area -->
          <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">
            <h4 class="font-semibold mb-2">Upload Proof (Mandatory)</h4>
            <div id="fileInputContainer">
              <!-- Dynamically changes between Camera and Audio based on Step -->
              <input type="file" id="proofInput" class="file-input file-input-bordered file-input-primary w-full" capture="environment" accept="image/*" multiple>
            </div>
            <button onclick="submitStep()" class="btn btn-primary w-full mt-4">Complete Step & Sync</button>
          </div>
          
          <!-- Right: Visual Checks -->
          <div class="bg-slate-50 p-4 rounded-xl overflow-y-auto max-h-60">
            <h4 class="font-semibold mb-2">Previous Proofs</h4>
            <div id="proofGallery" class="grid grid-cols-2 gap-2">
              <!-- Images and Audio Players will render here -->
            </div>
          </div>
        </div>
      </div>
    </dialog>
  </div>

<script>
// --- CORE LOGIC ---

// 1. Radar Initialization
const ctx = document.getElementById('opsRadar');
new Chart(ctx, {
  type: 'radar',
  data: {
    labels: ['Received', 'Balance', 'Call 1', 'Stock', 'Invoice', 'Dispatch', 'Call 2', 'Delivered', 'Feedback'],
    datasets: [{
      label: 'Orders in Queue',
      data: [12, 19, 3, 5, 2, 3, 7, 10, 5],
      fill: true,
      backgroundColor: 'rgba(79, 70, 229, 0.2)',
      borderColor: 'rgb(79, 70, 229)',
      pointBackgroundColor: 'rgb(79, 70, 229)',
    }]
  },
  options: {
    onClick: (e, elements) => {
      if (elements.length > 0) {
        const index = elements[0].index;
        showDrillDown(index);
      }
    }
  }
});

// 2. Handle File Type Logic (Image vs Audio)
function updateFileInput(stage) {
  const container = document.getElementById('fileInputContainer');
  const input = document.getElementById('proofInput');
  
  if (['Call 1', 'Call 2', 'Final Call'].includes(stage)) {
    input.setAttribute('accept', 'audio/*');
    input.removeAttribute('capture');
  } else {
    input.setAttribute('accept', 'image/*');
    input.setAttribute('capture', 'environment');
  }
}

// 3. Geotagging
function getGeoLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition((pos) => {
      resolve(`${pos.coords.latitude}, ${pos.coords.longitude}`);
    });
  });
}

// 4. Drill Down Visualization
function showDrillDown(stageIndex) {
  const feed = document.getElementById('drillDownFeed');
  // Sample Data Injection
  feed.innerHTML = `
    <div class="flex items-center justify-between p-4 bg-white border rounded-lg shadow-sm ${Math.random() > 0.5 ? 'stage-red' : ''}">
      <div>
        <div class="font-bold">#ORD-9921 - Ramesh Traders</div>
        <div class="text-xs text-slate-400">Waiting for 3 hours 20 mins</div>
      </div>
      <button onclick="processModal.showModal(); updateFileInput('Call 1');" class="btn btn-sm btn-outline btn-primary">Process</button>
    </div>
  `;
}
</script>
</body>
</html>
