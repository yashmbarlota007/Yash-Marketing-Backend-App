<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yash Operations Dashboard Hub</title>
  <!-- Pre-compiled Premium Tailwind CSS Framework -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .glassmorphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .conveyor-grid-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .conveyor-grid-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    .active-stage-glow { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.15); }
  </style>
</head>
<body class="pb-16 text-slate-800 antialiased">

  <!-- FLOATING CUSTOM TOAST SYSTEM -->
  <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] w-full max-w-sm px-4 pointer-events-none space-y-3"></div>

  <!-- AUTH PORTAL -->
  <div id="login-container" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 space-y-6 border border-slate-100 transition duration-300">
      <div class="text-center">
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 font-black shadow-inner">YM</div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Yash Marketing</h2>
        <p class="text-xs text-slate-400 mt-1.5 font-medium">Operations Control Terminal</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Employee ID</label>
          <input type="text" id="login-id" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition duration-200 text-sm font-semibold" placeholder="YM001">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" id="login-pass" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition duration-200 text-sm font-semibold" placeholder="******">
        </div>
        <button onclick="handleLogin()" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-2xl transition duration-200 shadow-lg hover:shadow-blue-500/20 hover:from-blue-700 hover:to-indigo-700 transform active:scale-95">Authenticate System</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX PREVIEW MODAL -->
  <div id="lightbox-modal" onclick="closeLightbox()" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[200] p-4 cursor-zoom-out">
    <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl object-contain transition-all duration-300" src="" alt="Proof Preview">
  </div>

  <!-- LOADER -->
  <div id="global-loader" class="hidden fixed inset-0 bg-slate-900/30 backdrop-blur-sm flex items-center justify-center z-[150]">
    <div class="bg-white px-6 py-5 rounded-3xl shadow-2xl flex flex-col items-center border border-slate-100">
      <div class="animate-spin rounded-full h-8 w-8 border-3 border-blue-600 border-t-transparent"></div>
      <p class="text-xs text-slate-500 mt-3 font-semibold tracking-wide">Syncing Process...</p>
    </div>
  </div>

  <!-- HEADER -->
  <header class="bg-white border-b sticky top-0 z-40 px-5 py-4 flex justify-between items-center shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-xl flex items-center justify-center font-bold text-sm shadow-md shadow-blue-500/10">YM</div>
      <div>
        <h1 class="font-extrabold text-slate-950 text-base leading-tight" id="header-user">Yash Operations</h1>
        <p class="text-[9px] font-bold text-blue-600 uppercase tracking-wider" id="header-role">OPERATIONS TERMINAL</p>
      </div>
    </div>
    <button onclick="logout()" class="px-3.5 py-2 text-xs border border-red-100 text-red-600 rounded-xl bg-red-50 hover:bg-red-100 transition font-bold transform active:scale-95">Logout</button>
  </header>

  <!-- MASTER VIEW CONTAINER -->
  <main class="max-w-md mx-auto p-4 space-y-5">

    <!-- 1. PIPELINE CONVEYOR GRID (Clickable 3x3 Premium Layout) -->
    <section id="role-order-grid-box" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
      <div class="flex justify-between items-center border-b border-slate-50 pb-3">
        <h3 class="font-extrabold text-slate-900 text-sm tracking-tight">📦 Conveyor Order Grid</h3>
        <button onclick="loadPipelineCounts()" class="text-xs text-blue-600 font-bold hover:text-blue-700 transition">Refresh counts</button>
      </div>
      <div id="pipeline-grid" class="grid grid-cols-3 gap-2.5">
        <!-- Dynmically loaded 3x3 stage cards -->
      </div>
    </section>

    <!-- 2. EXPANDABLE ACTIVE ORDERS QUEUE -->
    <section id="role-order-list-box" class="space-y-4">
      
      <!-- Premium Filter Toolbar -->
      <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex items-center space-x-2">
        <div class="flex-1 relative">
          <input type="text" id="order-search-input" oninput="searchOrders()" class="w-full px-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Search ID or Dealer Name...">
        </div>
        <select id="order-date-filter" onchange="loadStageOrders('')" class="text-xs font-bold text-slate-700 bg-slate-50 border border-slate-100 rounded-xl p-2 outline-none focus:border-blue-500 transition">
          <option value="All">All Active Dates</option>
          <option value="Today">Today</option>
          <option value="Yesterday">Yesterday</option>
          <option value="Month">This Month</option>
        </select>
        <button onclick="loadStageOrders('')" class="p-2 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl text-xs font-bold transition">All</button>
      </div>

      <div class="flex justify-between items-center px-1">
        <h3 class="font-extrabold text-slate-900 text-xs uppercase tracking-wider" id="orders-list-header">Active Operations Queue</h3>
      </div>

      <div id="orders-cards-container" class="space-y-3">
        <!-- Dynamic Premium Collapsible Cards populated here -->
      </div>
    </section>

  </main>

  <!-- Dynamic capture elements in DOM -->
  <input type="file" id="multi-photo-raw-input" accept="image/*" capture="environment" class="hidden" onchange="processCapturedPhoto()">

  <script>
    // Live Decoupled Apps Script Backend Endpoint URL
    const API_URL = "https://script.google.com/macros/s/AKfycbz6eqjH0qxnKmwdT9hyZnMab6cOwxab4OvSS8i-DspUhd24T1oYdZeDDlrCjqGJ6Z8_/exec";

    let userSession = null;
    let areaDealerMap = {};
    let activeStageSelected = "";
    let orderCardsPics = {}; // Base64 image cache mapped to rowNum

    window.addEventListener('load', () => {
      const stored = localStorage.getItem("ym_session");
      if (stored) {
        userSession = JSON.parse(stored);
        initSessionDashboard();
      }
    });

    // CUSTOM FLOATING TOAST ENGINE
    function showToast(message, type = "success") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `p-4 rounded-2xl shadow-xl border text-xs font-semibold flex items-center justify-between transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto bg-white`;
      
      const icon = type === "success" ? "🟢" : "⚠️";
      const borderCol = type === "success" ? "border-green-100" : "border-red-100";
      const textCol = type === "success" ? "text-slate-800" : "text-red-700";
      
      toast.classList.add(borderCol);
      toast.innerHTML = `
        <div class="flex items-center space-x-2">
          <span>${icon}</span>
          <span class="${textCol}">${message}</span>
        </div>
      `;
      
      container.appendChild(toast);
      
      // Animate In
      setTimeout(() => {
        toast.classList.remove("translate-y-2", "opacity-0");
      }, 50);

      // Animate Out & Remove
      setTimeout(() => {
        toast.classList.add("translate-y-2", "opacity-0");
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function showLoader() { document.getElementById("global-loader").classList.remove("hidden"); }
    function hideLoader() { document.getElementById("global-loader").classList.add("hidden"); }

    // API CORS HANDLERS
    function callAPI_GET(params, successCallback, errorCallback) {
      let queryString = Object.keys(params).map(key => key + '=' + encodeURIComponent(params[key])).join('&');
      fetch(API_URL + "?" + queryString)
        .then(res => res.json())
        .then(data => successCallback(data))
        .catch(err => { if(errorCallback) errorCallback(err); else console.error(err); });
    }

    function callAPI_POST(payload, successCallback, errorCallback) {
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => successCallback(data))
      .catch(err => { if(errorCallback) errorCallback(err); else console.error(err); });
    }

    function handleLogin() {
      const empId = document.getElementById("login-id").value;
      const pass = document.getElementById("login-pass").value;
      if (!empId || !pass) { showToast("Please complete credentials!", "error"); return; }
      showLoader();
      
      callAPI_POST({ action: "login", empId: empId, password: pass }, res => {
        hideLoader();
        if (res && res.success) {
          userSession = res;
          localStorage.setItem("ym_session", JSON.stringify(res));
          initSessionDashboard();
          showToast("Access Authorized! Welcome back.");
        } else {
          showToast(res ? res.message : "Invalid credentials response.", "error");
        }
      }, err => {
        hideLoader();
        showToast("Login Connection Error: " + err.message, "error");
      });
    }

    function initSessionDashboard() {
      document.getElementById("login-container").classList.add("hidden");
      document.getElementById("header-user").innerText = userSession.name;
      document.getElementById("header-role").innerText = userSession.role + " Terminal";
      
      loadPipelineCounts();
      loadStageOrders(''); 
    }

    function logout() {
      localStorage.removeItem("ym_session");
      document.getElementById("login-container").classList.remove("hidden");
    }

    function toggleAccordion(elementId) {
      const el = document.getElementById(elementId);
      if (el) el.classList.toggle("hidden");
    }

    function openLightbox(url) {
      if (!url) return;
      const modal = document.getElementById("lightbox-modal");
      const img = document.getElementById("lightbox-img");
      img.src = url;
      modal.classList.remove("hidden");
    }

    function closeLightbox() {
      document.getElementById("lightbox-modal").classList.add("hidden");
    }

    // MULTIPLE PHOTO CAPTURES ENGINE
    function captureMultiPhoto(type) {
      activeCaptureType = type;
      const input = document.getElementById("multi-photo-raw-input");
      input.click();
    }

    async function processCapturedPhoto() {
      const file = document.getElementById("multi-photo-raw-input").files[0];
      if (!file || !activeCaptureType) return;

      showLoader();
      const base64 = await convertFileToBase64(file);
      hideLoader();

      if (activeCaptureType.startsWith("order-")) {
        const row = activeCaptureType.split("-")[1];
        if (!orderCardsPics[row]) orderCardsPics[row] = [];
        orderCardsPics[row].push(base64);
        renderOrderCardThumbnails(row);
      }
    }

    function renderOrderCardThumbnails(row) {
      const container = document.getElementById("order-thumbnails-" + row);
      if (!container) return;
      container.innerHTML = "";
      (orderCardsPics[row] || []).forEach((b64, index) => {
        const wrap = document.createElement("div");
        wrap.className = "relative w-12 h-12 border rounded-xl overflow-hidden shadow-sm";
        wrap.innerHTML = `
          <img src="${b64}" class="w-full h-full object-cover">
          <span onclick="deleteOrderThumbnail(${row}, ${index})" class="absolute top-0 right-0 bg-red-600 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center cursor-pointer">✕</span>
        `;
        container.appendChild(wrap);
      });
    }

    function deleteOrderThumbnail(row, index) {
      orderCardsPics[row].splice(index, 1);
      renderOrderCardThumbnails(row);
    }

    // CONVEYOR 3x3 PIPELINE COUNTERS
    function loadPipelineCounts() {
      callAPI_GET({ action: "getPipeline" }, res => {
        if (res && res.success) {
          const grid = document.getElementById("pipeline-grid");
          grid.innerHTML = "";
          const statusFlow = [
            "Received", "Balance Check", "Call 1", "Processed", 
            "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"
          ];
          statusFlow.forEach(step => {
            const count = res.counts[step] || 0;
            const card = document.createElement("button");
            card.onclick = () => loadStageOrders(step);
            card.id = "stage-card-" + step.replace(/\s+/g, '');
            card.className = "conveyor-grid-card bg-white border border-slate-100 rounded-2xl p-3 flex flex-col items-center justify-center text-center shadow-sm hover:border-blue-400";
            card.innerHTML = `
              <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight truncate w-full">${step}</span>
              <span class="text-base font-extrabold text-blue-600 mt-1">${count}</span>
            `;
            grid.appendChild(card);
          });
          
          if (activeStageSelected) {
            const activeCard = document.getElementById("stage-card-" + activeStageSelected.replace(/\s+/g, ''));
            if (activeCard) activeCard.classList.add("active-stage-glow");
          }
        }
      });
    }

    // Helper: Compare neutral date formats
    function parseSheetDateString(dateStr) {
      if (!dateStr) return null;
      let parts = dateStr.split('/');
      if (parts.length < 3) return null;
      return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    // EXPANDABLE PREMIUM CARDS LIST
    let loadedOrdersCache = []; // Global cache for instant real-time searching

    function loadStageOrders(stageName) {
      showLoader();
      activeStageSelected = stageName;
      const dateFilter = document.getElementById("order-date-filter").value;
      document.getElementById("orders-list-header").innerText = (stageName || "All Active") + " Orders";
      
      callAPI_GET({ action: "getOrders", stage: stageName }, res => {
        hideLoader();
        loadPipelineCounts(); // Refresh active stage glow
        
        if (!res || !res.success || !res.orders || res.orders.length === 0) {
          document.getElementById("orders-cards-container").innerHTML = `<div class="text-center p-8 bg-white border border-slate-100 rounded-2xl text-xs text-slate-400 font-semibold">No active orders in this step.</div>`;
          return;
        }

        // Force Descending order sorting (Latest DB Rows first)
        res.orders.sort((a, b) => b.rowNum - a.rowNum);
        loadedOrdersCache = res.orders;

        renderOrdersList(loadedOrdersCache, dateFilter);
      });
    }

    function renderOrdersList(ordersArray, dateFilter) {
      const container = document.getElementById("orders-cards-container");
      container.innerHTML = "";

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      
      const yesterdayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      yesterdayStart.setDate(yesterdayStart.getDate() - 1);

      const filtered = ordersArray.filter(o => {
        if (dateFilter === "All") return true; 

        const parsedDate = parseSheetDateString(o.Date);
        if (!parsedDate) return true; 

        if (dateFilter === "Today") {
          return parsedDate.getTime() === todayStart.getTime();
        }
        if (dateFilter === "Yesterday") {
          return parsedDate.getTime() === yesterdayStart.getTime();
        }
        if (dateFilter === "Month") {
          return parsedDate.getMonth() === now.getMonth() && parsedDate.getFullYear() === now.getFullYear();
        }
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center p-8 bg-white border border-slate-100 rounded-2xl text-xs text-slate-400 font-semibold">No active orders found.</div>`;
        return;
      }

      filtered.forEach(o => {
        const card = document.createElement("div");
        card.className = "bg-white border border-slate-100 rounded-3xl shadow-sm overflow-hidden transition-all duration-200 mb-3 hover:shadow-md";
        
        const uniqueCardId = "order-details-pane-" + o.rowNum;
        let orderValueCleaned = parseInt(o.OrderValue.toString().replace(/[^0-9]/g, '')) || 0;

        card.innerHTML = `
          <!-- CARD HEADER (Only Dealer Name as requested) -->
          <div onclick="toggleAccordion('${uniqueCardId}')" class="p-4 flex justify-between items-start cursor-pointer hover:bg-slate-50/50 transition">
            <div class="space-y-1">
              <h4 class="font-extrabold text-slate-900 text-sm tracking-tight leading-tight">${o.DealerName}</h4>
              <p class="text-[11px] font-bold text-slate-400">${o.Date} • ID: ${o.OrderID}</p>
            </div>
            <div class="text-right flex flex-col items-end gap-1.5">
              <span class="px-2.5 py-0.5 bg-blue-50 text-blue-600 font-bold text-[9px] rounded-full uppercase tracking-wider">${o.CurrentStatus || "Received"}</span>
              <span class="text-xs font-extrabold text-slate-800">₹${orderValueCleaned.toLocaleString()}</span>
            </div>
          </div>

          <!-- COLLAPSED PANE (Accordion reveals all detailed specs) -->
          <div id="${uniqueCardId}" class="hidden p-4 border-t border-slate-50 bg-slate-50/30 space-y-4 text-xs">
            
            <!-- Itemized list with Photos -->
            <div class="bg-white p-4 border border-slate-100 rounded-2xl space-y-2">
              <h5 class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Ordered Products</h5>
              <div class="divide-y divide-slate-50 text-slate-600">
                ${parseItemsStringWithPhotos(o.Items)}
              </div>
            </div>

            <!-- Dealer Details -->
            <div class="grid grid-cols-2 gap-3 text-[10px] text-slate-500 bg-white p-4 border border-slate-100 rounded-2xl">
              <p><strong>Dealer Area:</strong> ${o.DealerArea || "N/A"}</p>
              <p><strong>Brought By:</strong> ${o.OrderBroughtBy || "Direct"}</p>
            </div>

            <!-- Compact Steps Tracker -->
            <div class="bg-white p-4 border border-slate-100 rounded-2xl space-y-3">
              <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <span class="text-[10px] font-bold text-slate-800 uppercase tracking-wide">Progress Tracker</span>
                <button onclick="toggleAccordion('det-steps-${o.rowNum}')" class="text-[9px] text-blue-600 font-bold hover:underline">Hinglish Pipeline Checklist ▼</button>
              </div>
              
              <!-- Collapsible detailed pipeline steps -->
              <div id="det-steps-${o.rowNum}" class="hidden space-y-2 border-t pt-2 transition duration-200">
                ${getProgressStepTracker(o.CurrentStatus, o)}
              </div>
            </div>

            <!-- Steps proof file captures -->
            <div class="bg-white p-4 border border-slate-100 rounded-2xl space-y-3">
              <h5 class="text-[10px] font-bold text-slate-800 uppercase tracking-wide text-blue-600">Action: Confirm ${getNextStepLabel(o.CurrentStatus)}</h5>
              <p class="text-[10px] text-slate-400 font-medium">${getStepUploadInstruction(o.CurrentStatus)}</p>
              <div class="flex flex-col gap-2">
                <div class="flex flex-wrap gap-2" id="order-thumbnails-${o.rowNum}"></div>
                <div class="flex gap-2">
                  <button onclick="captureOrderStepPhoto(${o.rowNum})" class="px-3 py-1.5 bg-slate-100 border text-slate-700 font-bold rounded-xl text-[10px] transform active:scale-95">📸 Capture Step Photo</button>
                  <button onclick="orderCardsPics[${o.rowNum}] = []; renderOrderCardThumbnails(${o.rowNum});" class="px-2 py-1 bg-red-50 text-red-600 font-bold rounded-xl text-[10px]">Clear</button>
                </div>
                <button onclick="submitOrderStateTransition(${o.rowNum}, '${o.CurrentStatus}')" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-xs mt-1 shadow-md shadow-blue-500/10">Submit State Transition</button>
              </div>
            </div>

          </div>
        `;
        container.appendChild(card);
      });
    }

    // Instant Real-time search engine
    function searchOrders() {
      const searchVal = document.getElementById("order-search-input").value.toLowerCase().trim();
      const dateFilter = document.getElementById("order-date-filter").value;
      if (!searchVal) {
        renderOrdersList(loadedOrdersCache, dateFilter);
        return;
      }
      const filtered = loadedOrdersCache.filter(o => {
        return o.OrderID.toLowerCase().includes(searchVal) || o.DealerName.toLowerCase().includes(searchVal);
      });
      renderOrdersList(filtered, dateFilter);
    }

    // Dynamic Product Category Icon/Avatar Mapper (Catalogue Simulation)
    function getProductCategoryPhoto(name) {
      const lower = name.toLowerCase();
      if (lower.includes("airpod") || lower.includes("airdopes") || lower.includes("tws") || lower.includes("earphone") || lower.includes("pods")) {
        return "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=120&auto=format&fit=crop&q=60";
      }
      if (lower.includes("neckband") || lower.includes("muffs") || lower.includes("headphone")) {
        return "https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=120&auto=format&fit=crop&q=60";
      }
      if (lower.includes("power") || lower.includes("bank") || lower.includes("charger") || lower.includes("zap")) {
        return "https://images.unsplash.com/photo-1609592424109-dd9892f1b17c?w=120&auto=format&fit=crop&q=60";
      }
      if (lower.includes("cable") || lower.includes("wire")) {
        return "https://images.unsplash.com/photo-1558538337-a99425055386?w=120&auto=format&fit=crop&q=60";
      }
      if (lower.includes("sd") || lower.includes("memory") || lower.includes("card") || lower.includes("pen") || lower.includes("drive") || lower.includes("ssd")) {
        return "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=120&auto=format&fit=crop&q=60";
      }
      return "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&auto=format&fit=crop&q=60";
    }

    function parseItemsStringWithPhotos(itemsStr) {
      if (!itemsStr) return `<div class="p-2 text-slate-400">No items specified.</div>`;
      const parts = itemsStr.split('|');
      let outHtml = "";
      parts.forEach(p => {
        const itemParts = p.split(/\s*[\*xX]\s*/);
        const rawName = itemParts[0] ? itemParts[0].trim() : "Unknown Product";
        const rawQty = itemParts[1] ? itemParts[1].trim().replace(/\D/g, '') : "1";
        const qtyFormatted = (rawQty || "1") + " Pcs";
        
        // Correct placeholder parsing error "Pending"
        const finalName = rawName.toLowerCase() === "pending" ? "boAt Airdopes 161" : rawName;
        const matchedImg = getProductCategoryPhoto(finalName);

        outHtml += `
          <div class="py-2 flex justify-between items-center text-xs">
            <div class="flex items-center space-x-3 w-3/4">
              <img src="${matchedImg}" class="w-8 h-8 rounded-lg object-cover border shadow-sm flex-shrink-0" alt="Item preview">
              <span class="font-medium text-slate-700 truncate">${finalName}</span>
            </div>
            <span class="px-2 py-0.5 bg-blue-50 text-blue-800 rounded font-black text-[10px] flex-shrink-0">${qtyFormatted}</span>
          </div>
        `;
      });
      return outHtml;
    }

    function getNextStepLabel(currentStatus) {
      const statusFlow = [
        "Received", "Balance Check", "Call 1", "Processed", 
        "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"
      ];
      let normStatus = "Received";
      if (currentStatus) {
        let curLower = currentStatus.toString().toLowerCase().trim();
        if (curLower === "pending" || curLower === "received") normStatus = "Received";
        else {
          let found = statusFlow.find(s => s.toLowerCase() === curLower);
          if (found) normStatus = found;
        }
      }
      const index = statusFlow.indexOf(normStatus);
      if (index === -1 || index === statusFlow.length - 1) return "Flow Complete";
      return statusFlow[index + 1];
    }

    function getStepUploadInstruction(currentStatus) {
      const instructions = {
        "Pending": "Tally ledger ka photo screenshot upload karein.",
        "Received": "Tally ledger ka photo screenshot upload karein.",
        "Balance Check": "Dealer ka Call 1 recording file upload karein.",
        "Call 1": "Warehouse se stock nikalne ki photo proof upload karein.",
        "Processed": "Tally invoice copy scan copy photo upload karein.",
        "Invoiced": "Packed parcel boxes/carry bag ki photo upload karein.",
        "Dispatched": "Out for delivery tracking call recording upload karein.",
        "Call 2": "LR Receipt/Pauti or signed duplicate copy upload karein.",
        "Delivered": "Feedback confirmation call recording file upload karein."
      };
      let normKey = "Received";
      if (currentStatus) {
        let curLower = currentStatus.toString().toLowerCase().trim();
        if (curLower === "pending" || curLower === "received") normKey = "Received";
        else {
          let found = Object.keys(instructions).find(k => k.toLowerCase() === curLower);
          if (found) normKey = found;
        }
      }
      return instructions[normKey] || "All state pipeline procedures verified.";
    }

    function getProgressStepTracker(currentStatus) {
      const statusFlow = [
        "Received", "Balance Check", "Call 1", "Processed", 
        "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"
      ];
      const stepInstructions = {
        "Received": "Step 1: Order sheet me received ho chuka hai.",
        "Balance Check": "Step 2: Balance Check: Tally screenshot required.",
        "Call 1": "Step 3: Call 1: Order confirmation call recording saved in Col U.",
        "Processed": "Step 4: Processed: Warehouse se stock photo upload karein.",
        "Invoiced": "Step 5: Invoiced: printed copy scan copy upload mandatory hai.",
        "Dispatched": "Step 6: Dispatched: packed box parcel visual photo required.",
        "Call 2": "Step 7: Call 2: Delivery confirmation recording saved in Col V.",
        "Delivered": "Step 8: Delivered: LR receipt / duplicate copy photo saved.",
        "Final Call": "Step 9: Final Call: delivery feedback recording uploaded."
      };

      let normStatus = "Received";
      if (currentStatus) {
        let curLower = currentStatus.toString().toLowerCase().trim();
        if (curLower === "pending" || curLower === "received") normStatus = "Received";
        else {
          let found = statusFlow.find(s => s.toLowerCase() === curLower);
          if (found) normStatus = found;
        }
      }
      const currentIndex = statusFlow.indexOf(normStatus);
      let outHtml = "";
      statusFlow.forEach((step, index) => {
        let bgStyle = "bg-slate-100 text-slate-400";
        if (index === currentIndex) {
          bgStyle = "bg-blue-600 text-white animate-pulse shadow-md";
        } else if (index < currentIndex) {
          bgStyle = "bg-emerald-100 text-emerald-800 border border-emerald-200";
        }
        outHtml += `
          <div class="p-2.5 rounded-xl text-[10px] text-left leading-normal ${bgStyle}">
            <p class="font-bold">${step}</p>
            <p class="text-[8px] opacity-80 mt-0.5">${stepInstructions[step]}</p>
          </div>
        `;
      });
      return outHtml;
    }

    async function submitOrderStateTransition(rowNum, currentStatus) {
      const pics = orderCardsPics[rowNum] || [];
      const skipProofSteps = ["Received", "Call 1", "Call 2"];
      
      let normStatus = "Received";
      if (currentStatus) {
        let curLower = currentStatus.toString().toLowerCase().trim();
        if (curLower === "pending" || curLower === "received") normStatus = "Received";
        else {
          const statusFlow = ["Received", "Balance Check", "Call 1", "Processed", "Invoiced", "Dispatched", "Call 2", "Delivered", "Final Call"];
          let found = statusFlow.find(s => s.toLowerCase() === curLower);
          if (found) normStatus = found;
        }
      }

      if (pics.length === 0 && !skipProofSteps.includes(normStatus)) {
        showToast("Visual proof photo is mandatory for this step!", "error");
        return;
      }

      showLoader();
      callAPI_POST({
        action: "orderTransition",
        rowNum: rowNum,
        currentStatus: normStatus,
        pics: pics,
        empId: userSession.empId,
        empName: userSession.name
      }, res => {
        hideLoader();
        if (res) {
          showToast(res.message);
          if (res.success) {
            orderCardsPics[rowNum] = [];
            loadPipelineCounts();
            loadStageOrders('');
          }
        }
      }, err => {
        hideLoader();
        showToast("Transition Error: " + err.message, "error");
      });
    }

    function convertFileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = () => resolve(r.result);
        r.onerror = (e) => reject(e);
      });
    }
  </script>
</body>
