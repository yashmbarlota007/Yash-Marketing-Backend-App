        <Catalog user={user} callAPI={callAPI} cart={cart} setCart={setCart} products={products} setProducts={setProducts} setView={handleSetView} globalProps={globalProps} />
      ) : view === "cart" ? (
        <Cart user={user} cart={cart} setCart={setCart} setView={handleSetView} callAPI={callAPI} globalProps={globalProps} />
      ) : view === "ledger" ? (
        <LedgerView user={user} callAPI={callAPI} />
      ) : (
        <OrdersHistoryView user={user} callAPI={callAPI} />
      )}

      <ContactFABs />
      <BottomNav view={view} setView={handleSetView} totalItems={totalItems} customerMode={customerMode} />

      {view === "catalog" && totalItems > 0 && !customerMode && (
         <div className="fixed bottom-[80px] left-4 right-4 max-w-md mx-auto bg-green-600 text-white rounded-2xl shadow-2xl p-4 flex justify-between items-center z-30 opacity-95">
           <div>
             <div className="text-[10px] uppercase font-black opacity-80">{totalItems} Total Qty</div>
             <div className="font-black text-lg leading-none">₹{totalAmount.toLocaleString('en-IN')}</div>
           </div>
           <button onClick={() => handleSetView("cart")} className="bg-white text-green-700 font-black px-6 py-2 rounded-xl shadow-md active:scale-95">VIEW CART →</button>
         </div>
      )}

      {user && showNotice && announcements.length > 0 && (
        <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm border-t-8 border-amber-600 shadow-2xl relative text-center animate-slide-up">
            <span className="text-4xl">🔔</span>
            <h2 className="text-xl font-black text-gray-900 mt-3">{announcements[0].title}</h2>
            <p className="text-sm font-semibold text-gray-600 mt-4 leading-relaxed bg-gray-50 p-4 rounded-2xl border border-gray-100">{announcements[0].message}</p>
            <button onClick={() => setShowNotice(false)} className="w-full bg-amber-600 text-white font-black text-md py-3.5 rounded-xl mt-6 shadow-lg active:scale-95">GOT IT, THANKYOU!</button>
          </div>
        </div>
      )}
    </div>
  );
}

function LoginScreen(props) {
  var onLogin = props.onLogin;
  var callAPI = props.callAPI;
  var loading = props.loading;
  var setLoading = props.setLoading;

  const [phone, setPhone] = useState("");

  const handleLogin = function() {
    if (phone.length < 10) return alert("Enter 10-digit number");
    setLoading(true);
    callAPI({ action: "verifyDealer", phone: phone }).then(function(res) {
      setLoading(false);
      if (res.success) {
        var dealerData = { phone: phone, shopName: res.shopName };
        localStorage.setItem("yashDealerSession", JSON.stringify(dealerData));
        fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "logEvent", phone: dealerData.phone, shopName: dealerData.shopName, event: "Login Success", details: "App Opened" }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).catch(function(e) {});
        onLogin(dealerData);
      } else {
        alert(res.message);
      }
    });
  };

  return (
    <div className="flex flex-col items-center justify-center min-h-screen bg-gray-100 p-6 text-center font-sans">
      <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-blue-900">
        <img src={LOGO_URL} className="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-gray-50 shadow-lg" />
        <h2 className="text-3xl font-black mb-1 text-gray-900">Yash Marketing</h2>
        <p className="text-blue-700 font-bold text-xs mb-8 tracking-widest uppercase bg-blue-50 py-1 px-3 rounded-full inline-block">Authorized Dealer Portal</p>
        <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl mb-6 text-center font-black text-xl outline-none border border-gray-200" placeholder="MOBILE NO." />
        <button onClick={handleLogin} disabled={loading} className="w-full bg-blue-900 text-white font-black text-lg p-4 rounded-2xl active:scale-95 shadow-lg flex justify-center">
          {loading ? <div className="border-4 border-white border-t-transparent w-7 h-7 rounded-full spinner"></div> : "SECURE LOGIN"}
        </button>
      </div>
    </div>
  );
}

function Catalog(props) {
  var user = props.user;
  var callAPI = props.callAPI;
  var cart = props.cart;
  var setCart = props.setCart;
  var products = props.products;
  var setProducts = props.setProducts;
  var setView = props.setView;
  var globalProps = props.globalProps;

  const [loading, setLoading] = useState(products.length === 0);
  const [selectedType, setSelectedType] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [discounts, setDiscounts] = useState([{ minAmount: 10000, percent: 1 }, { minAmount: 20000, percent: 1.5 }]);
  const [schemes, setSchemes] = useState([]); 
  const [celebratedTiers, setCelebratedTiers] = useState({ tier1: false, tier2: false });
  const [celebrated25Pcs, setCelebrated25Pcs] = useState(false);
  const [activeVariants, setActiveVariants] = useState({});

  useEffect(() => {
    if (products.length === 0) {
      callAPI({ action: "getProducts" }).then(res => {
        if (res && res.success) setProducts(res.data);
        else alert("Data Error: Please check Sheet");
        setLoading(false);
      });
    }
    callAPI({ action: "getDiscounts" }).then(res => {
      if (res && res.success && res.data.length > 0) {
        setDiscounts(res.data);
      }
    }).catch(() => {});
    
    callAPI({ action: "getSchemes" }).then(res => {
      if (res && res.success) {
        setSchemes(res.data);
      }
    }).catch(() => {});
  }, []);

  const cartItems = Object.values(cart);
  const totalItems = cartItems.reduce((a, b) => a + b.qty, 0);
  const totalAmount = cartItems.reduce((a, b) => {
    const itemPrice = Number(getProp(b, "DealerPrice") || 0);
    return a + (itemPrice * b.qty);
  }, 0);

  useEffect(() => {
    if (totalItems >= 25 && !celebrated25Pcs) {
      if (window.confetti) {
        window.confetti({ 
          particleCount: 250, 
          spread: 100, 
          origin: { y: 0.5 }, 
          colors: ['#ff0055', '#00ffcc', '#ffcc00', '#33ff33'] 
        });
      }
      setCelebrated25Pcs(true);
    } else if (totalItems < 25) {
      setCelebrated25Pcs(false);
    }
  }, [totalItems]);

  useEffect(() => {
    var sortedDiscounts = [...discounts]
    .map(d => ({ minAmount: Number(d.minAmount), percent: Number(d.percent) }))
    .filter(d => !isNaN(d.minAmount) && !isNaN(d.percent))
    .sort((a, b) => a.minAmount - b.minAmount);

    var tier1Min = (sortedDiscounts[0] && sortedDiscounts[0].minAmount) ? sortedDiscounts[0].minAmount : 10000;
    var tier2Min = (sortedDiscounts[1] && sortedDiscounts[1].minAmount) ? sortedDiscounts[1].minAmount : 20000;

    if (totalAmount >= tier2Min) {
      if (!celebratedTiers.tier2) {
        if (window.confetti) {
          window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }
        setCelebratedTiers(prev => Object.assign({}, prev, { tier2: true }));
      }
    } else if (totalAmount >= tier1Min) {
      if (!celebratedTiers.tier1) {
        if (window.confetti) {
          window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
        setCelebratedTiers(prev => Object.assign({}, prev, { tier1: true }));
      }
      if (celebratedTiers.tier2) {
        setCelebratedTiers(prev => Object.assign({}, prev, { tier2: false }));
      }
    } else {
      if (celebratedTiers.tier1 || celebratedTiers.tier2) {
        setCelebratedTiers({ tier1: false, tier2: false });
      }
    }
  }, [totalAmount, discounts]);

  const handleSearchChange = (e) => {
    setSearchQuery(e.target.value);
  };

  const openCategory = (type) => {
    window.history.pushState({ modal: 'category' }, '');
    setSelectedType(type);
  };

  const openProductModal = (p) => {
    window.history.pushState({ modal: 'product' }, '');
    setSelectedProduct(p);
  };

  useEffect(() => {
    const handlePop = (e) => {
      if (selectedProduct) {
        setSelectedProduct(null);
      } else if (selectedType) {
        setSelectedType(null);
      }
    };
    window.addEventListener('popstate', handlePop);
    return () => window.removeEventListener('popstate', handlePop);
  }, [selectedProduct, selectedType]);

  const updateQty = (product, change) => {
    if (globalProps.customerMode) return;
    const updated = Object.assign({}, cart);
    const itemCode = String(getProp(product, "ItemCode") || "");
    if (!itemCode) return;

    const brandStr = String(getProp(product, "Brand") || "").toUpperCase();
    const isAlwaysLiveBrand = brandStr.includes("HIKVISION") || brandStr.includes("VELOCITY");

    const stockVal = parseInt(getProp(product, "Stock") || 0) || 0;
    const currentQty = updated[itemCode] ? updated[itemCode].qty : 0;
    const newQty = currentQty + change;
    
    const maxLimit = isAlwaysLiveBrand ? 99999 : stockVal;

    if (newQty > maxLimit && maxLimit > 0) return alert("Maximum stock limit reached!");
    if (newQty <= 0) delete updated[itemCode];
    else updated[itemCode] = Object.assign({}, product, { qty: newQty });
    setCart(updated);
  };

  if (loading) return <div className="flex flex-col justify-center items-center h-[70vh] text-blue-900"><div className="border-4 border-current border-t-transparent w-12 h-12 rounded-full spinner mb-4"></div><p className="font-bold">Syncing Inventory...</p></div>;

  const inStockFlat = products.filter(p => {
    const brandStr = String(getProp(p, "Brand") || "").toUpperCase();
    const isAlwaysLive = brandStr.includes("HIKVISION") || brandStr.includes("VELOCITY");
    const stockVal = getProp(p, "Stock") || 0;
    return (stockVal && parseInt(stockVal) > 0) || isAlwaysLive;
  });

  const inStockProducts = groupProductsByVariant(inStockFlat);

  const renderProducts = (productList) => (
    <div className="p-4 grid grid-cols-2 gap-4">
      {productList.map((p, idx) => {
        var name = String(getProp(p, "ProductName") || "Premium Item");
        var brand = String(getProp(p, "Brand") || "Premium");
        var type = String(getProp(p, "Type") || "Accessories");

        var activeItemCode = activeVariants[String(getProp(p, "ItemCode") || "")] || (p.variants && p.variants[0] ? String(getProp(p.variants[0], "ItemCode") || "") : String(getProp(p, "ItemCode") || ""));
        var activeVariant = p.variants ? p.variants.find(v => String(getProp(v, "ItemCode") || "") === activeItemCode) || p : p;

        const itemCode = String(getProp(activeVariant, "ItemCode") || "");
        const currentQty = cart[itemCode] ? cart[itemCode].qty : 0;
        const smartImg = getSmartImage(activeVariant);

        const mrpVal = Number(getProp(activeVariant, "MRP") || 0);
        const dealerVal = Number(getProp(activeVariant, "DealerPrice") || 0);
        const hasDiscount = !isNaN(mrpVal) && !isNaN(dealerVal) && mrpVal > dealerVal;
        const discountPercent = hasDiscount ? Math.round(((mrpVal - dealerVal) / mrpVal) * 100) : 0;

        const isValidPrice = !isNaN(dealerVal) && dealerVal > 0;
        const displayPrice = isValidPrice ? `₹${dealerVal}` : "Contact Us";

        const isNewItem = String(getProp(activeVariant, "IsNew")).toUpperCase() === "TRUE" || String(getProp(activeVariant, "Tags")).toUpperCase().includes("NEW");
        const activeBrandStr = String(getProp(activeVariant, "Brand") || "").toUpperCase();
        const isAlwaysLiveBrand = activeBrandStr.includes("HIKVISION") || activeBrandStr.includes("VELOCITY");
        const stockVal = parseInt(getProp(activeVariant, "Stock") || 0);
        const showOnOrder = isAlwaysLiveBrand && stockVal <= 0;

        return (
          <div key={`${activeItemCode}-${idx}`} className="bg-white rounded-2xl p-3 shadow-sm flex flex-col justify-between border border-gray-50 relative overflow-hidden">
            
            {isNewItem && (
              <span className="absolute top-2 right-2 bg-pink-600 text-white text-[9px] font-black px-2 py-1 rounded-md shadow-md uppercase tracking-wider z-10 animate-bounce select-none">✨ NEW</span>
            )}
            
            {showOnOrder && !isNewItem && (
              <span className="absolute top-2 left-2 bg-orange-600 text-white text-[7px] font-black px-1.5 py-0.5 rounded-md shadow-md uppercase tracking-wider z-10 animate-pulse select-none border border-orange-400">⏳ ON ORDER</span>
            )}

            {!isNewItem && !showOnOrder && totalItems >= 25 && (
              <span className="absolute top-2 right-2 bg-green-600 text-white text-[7px] font-black px-1.5 py-0.5 rounded shadow animate-pulse z-10 select-none">25+ Target Unlocked</span>
            )}
            
            <div className="mt-1 cursor-pointer" onClick={() => openProductModal(p)}>
              {smartImg ? (
                <img
                  src={smartImg}
                  className="h-32 w-full object-contain mb-2 p-1"
                  onError={(e) => {
                    e.target.onerror = null;
                    e.target.src = "https://ui-avatars.com/api/?name=Yash+Marketing&background=f3f4f6&color=1e3a8a&size=200&bold=true";
                  }}
                />
              ) : (
                <div className="h-32 bg-gray-50 rounded flex items-center justify-center text-gray-300 text-xs mb-2">No Image</div>
              )}
              <h3 className="font-bold text-xs leading-snug line-clamp-2 h-8">{name}</h3>
            </div>

            {p.isGrouped && (
              <div className="flex flex-wrap gap-1 mt-1 mb-2">
                {p.variants.map(v => {
                  const vItemCode = String(getProp(v, "ItemCode") || "");
                  return (
                    <button
                      key={vItemCode}
                      onClick={(e) => {
                        e.stopPropagation();
                        var nextActives = Object.assign({}, activeVariants);
                        nextActives[String(getProp(p, "ItemCode") || "")] = vItemCode;
                        setActiveVariants(nextActives);
                      }}
                      className={`text-[9px] font-black px-1.5 py-0.5 rounded border ${vItemCode === activeItemCode ? 'bg-blue-900 text-white border-blue-900' : 'bg-gray-50 text-gray-500 border-gray-100'}`}
                    >
                      {v.capacity}
                    </button>
                  );
                })}
              </div>
            )}

            <div className="mt-1">
              {!globalProps.customerMode ? (
                <div>
                  {hasDiscount && isValidPrice ? (
                    <div className="flex items-center gap-1.5 mb-1">
                      <span className="text-[10px] text-gray-400 font-bold line-through tracking-tight">MRP: ₹{getProp(activeVariant, "MRP")}</span>
                      <span className="text-[9px] bg-green-100 text-green-700 font-black px-1.5 py-0.5 rounded shadow-sm">{discountPercent}% OFF</span>
                    </div>
                  ) : (
                    getProp(activeVariant, "MRP") && (
                      <div className="text-[10px] text-gray-400 font-bold line-through tracking-tight mb-1">MRP: ₹{getProp(activeVariant, "MRP")}</div>
                    )
                  )}
                  <div className="font-black text-lg text-blue-950 mb-2 tracking-tight">{displayPrice}</div>

                  {isValidPrice && (
                    currentQty > 0 ? (
                      <div className="flex justify-between items-center bg-blue-50 rounded-xl p-1 border border-blue-100">
                        <button onClick={(e) => { e.stopPropagation(); updateQty(activeVariant, -1); }} className="bg-white text-blue-900 font-black w-8 h-8 rounded-lg shadow-sm">-</button>
                        <span className="font-black text-blue-900">{currentQty}</span>
                        <button onClick={(e) => { e.stopPropagation(); updateQty(activeVariant, 1); }} className="bg-blue-900 text-white font-black w-8 h-8 rounded-lg shadow-sm">+</button>
                      </div>
                    ) : (
                      <button onClick={(e) => { e.stopPropagation(); updateQty(activeVariant, 1); }} className="w-full bg-gray-950 text-white text-[11px] font-bold py-3 rounded-xl shadow-sm">
                        {showOnOrder ? "+ ADD (Next Day)" : "+ ADD"}
                      </button>
                    )
                  )}
                </div>
              ) : (
                <button onClick={(e) => {
                  e.stopPropagation();
                  const shareText = `🔥 Check out this item at our store!\n\n📦 *Product:* ${name} (${activeVariant.capacity})\n⚡ *Brand:* ${brand}\n\n🏢 *Dealer:* ${user ? user.shopName : ''}\n📞 *Contact:* ${user ? user.phone : ''}\n\nAsk for the best price today!`;
                  if (navigator.share) {
                    navigator.share({ title: name, text: shareText, url: smartImg }).catch(() => {});
                  } else {
                    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText + "\nImage: " + smartImg)}`, '_blank');
                  }
                  globalProps.logSpyData("Shared Product Image", String(getProp(activeVariant, "ItemCode") || ""));
                }} className="w-full bg-green-600 hover:bg-green-700 text-white text-[11px] font-black py-3 rounded-xl shadow-sm flex items-center justify-center gap-1">
                  📲 SHARE PHOTO
                </button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

  const handleShareCategory = () => {
    const categoryProducts = inStockProducts.filter(p => {
      const pType = String(getProp(p, "Type") || "");
      return pType === selectedType;
    });
    let shareText = `🔥 *Yash Marketing - ${selectedType} Catalog* 🔥\n\n`;

    categoryProducts.slice(0, 15).forEach((p, idx) => {
      const cleanPhotoUrl = getSmartImage(p);
      const features = String(getProp(p, "Features") || "");
      const featuresExcerpt = (features !== "") ? `\n⚡ *Specs:* ${features.split(" | ").slice(0,2).join(", ")}` : "";
      const name = String(getProp(p, "ProductName") || "");
      const mrp = getProp(p, "MRP") || 0;
      const dealerPrice = getProp(p, "DealerPrice") || 0;

      if (globalProps.customerMode) {
        shareText += `${idx + 1}. *${name}*\n💰 Offer Price: ₹${mrp}${featuresExcerpt}\n🔗 Photo: ${cleanPhotoUrl}\n\n`;
      } else {
        shareText += `${idx + 1}. *${name}*\n💰 Dealer Price: ₹${dealerPrice} (MRP: ₹${mrp})${featuresExcerpt}\n🔗 Photo: ${cleanPhotoUrl}\n\n`;
      }
    });
    shareText += `Ask for the best bulk deals today!`;

    if (navigator.share) {
      navigator.share({ title: `${selectedType} Catalog`, text: shareText }).catch(() => {});
    } else {
      window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`, '_blank');
    }
    globalProps.logSpyData("Shared Category", selectedType);
  };

  const searchBarUI = (
    <div className="p-3 bg-white flex items-center border-b">
      <input
        type="text"
        placeholder="Search products, brands..."
        value={searchQuery}
        onChange={handleSearchChange}
        className="w-full bg-gray-100 p-3 rounded-xl outline-none font-bold text-sm border border-gray-200 focus:border-blue-300 transition-colors"
      />
      {searchQuery && (
        <button onClick={() => setSearchQuery("")} className="ml-2 bg-gray-200 text-gray-600 font-bold px-3 py-3 rounded-xl">✕</button>
      )}
    </div>
  );

  let mainContent;

  if (searchQuery.trim() !== "") {
    const safeQuery = searchQuery.toLowerCase();
    const searchResults = inStockProducts.filter(p => {
      const pName = String(getProp(p, "ProductName") || "").toLowerCase();
      const pBrand = String(getProp(p, "Brand") || "").toLowerCase();
      return pName.includes(safeQuery) || pBrand.includes(safeQuery);
    });
    mainContent = searchResults.length > 0 ? renderProducts(searchResults) : <div className="p-8 text-center font-bold text-gray-400">No products found.</div>;
  } else if (!selectedType) {
    const priorityOrder = [
      "SMART WATCH", "AIRPODS", "NECKBAND", "POWERBANK",
      "CABLE", "CHARGER", "HEADPHONE", "MEMORY CARD", "PENDRIVE"
    ];

    const types = [...new Set(inStockFlat.map(p => String(getProp(p, "Type") || "")).filter(Boolean))].sort((a, b) => {
      const indexA = priorityOrder.indexOf(a.toUpperCase().trim());
      const indexB = priorityOrder.indexOf(b.toUpperCase().trim());

      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });

    mainContent = (
      <div className="p-4">
        <h2 className="font-black text-gray-800 text-xl mb-4">Select Category</h2>
        <div className="grid grid-cols-2 gap-4">
          {types.map(type => {
            const coverProduct = inStockFlat.find(p => String(getProp(p, "Type") || "") === type);
            const cover = coverProduct ? getSmartImage(coverProduct) : null;
            return (
              <div key={type} onClick={() => openCategory(type)} className="bg-white rounded-2xl p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer active:scale-95 h-40">
                {cover ? <img src={cover} className="h-16 object-contain mb-3" /> : <div className="text-3xl mb-3">📦</div>}
                <h3 className="font-extrabold text-sm text-center truncate w-full">{type}</h3>
              </div>
            );
          })}
        </div>
      </div>
    );
  } else {
    const filteredProducts = inStockProducts.filter(p => String(getProp(p, "Type") || "") === selectedType).sort((a, b) => {
      const priceA = Number(getProp(a, "DealerPrice") || 0);
      const priceB = Number(getProp(b, "DealerPrice") || 0);
      return priceB - priceA;
    });
    mainContent = (
      <div>
        <div className="p-4 bg-white bg-opacity-95 z-20 border-b flex justify-between items-center shadow-sm">
          <button onClick={() => window.history.back()} className="font-bold text-blue-900 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 shadow-sm">← Categories</button>
          <span className="font-black text-gray-800">{selectedType}</span>

          <button onClick={handleShareCategory} className="font-black text-xs text-white bg-green-600 px-3.5 py-2.5 rounded-xl shadow-md active:scale-95 flex items-center gap-1">📲 SHARE LIST</button>
        </div>
        {renderProducts(filteredProducts)}
      </div>
    );
  }

  return (
    <div className="max-w-md mx-auto relative flex flex-col">
      <div className="sticky z-30 bg-white shadow-md border-b" style={{ top: '58px' }}>
        {totalItems > 0 && !globalProps.customerMode && (
          <React.Fragment>
            <ProgressBar totalAmount={totalAmount} discounts={discounts} />
            {/* Target 25 Pcs Milestone Activation Banner */}
            {totalItems >= 25 && (
              <div className="bg-green-600 text-white text-center text-[10px] font-black py-1.5 uppercase tracking-widest border-b border-green-700 shadow-md animate-bounce">
                🎉 Target 25 Pcs Met! Extra Bumper Reward Live! 🎁
              </div>
            )}
            {/* CATALOG STICKY SCHEME TRACKER */}
            {schemes.length > 0 && (
              <div className="bg-white">
                {schemes.map((scheme, idx) => {
                  const progress = calculateSchemeProgress(cartItems, scheme);
                  return (
                    <div key={`cat-scheme-${idx}`} className={`px-4 py-2 border-b ${progress.isUnlocked ? 'bg-green-50' : 'bg-blue-50'}`}>
                      <div className="flex justify-between items-end mb-1">
                        <span className={`text-[9px] font-black uppercase ${progress.isUnlocked ? 'text-green-800' : 'text-blue-900'} w-4/5 leading-tight`}>{scheme.message}</span>
                        <span className={`text-[10px] font-black ${progress.isUnlocked ? 'text-green-700' : 'text-blue-800'}`}>{progress.current}/{progress.required}</span>
                      </div>
                      <div className="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden shadow-inner">
                        <div className={`${progress.isUnlocked ? 'bg-green-600' : 'bg-blue-600'} h-full transition-all duration-500`} style={{ width: Math.min((progress.current / progress.required) * 100, 100) + '%' }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </React.Fragment>
        )}
        {searchBarUI}
      </div>
      {mainContent}
      {selectedProduct && (
        <ProductDetailModal
          product={selectedProduct}
          onClose={() => window.history.back()}
          cart={cart}
          updateQty={updateQty}
          user={user}
          globalProps={globalProps}
          activeVariants={activeVariants}
          setActiveVariants={setActiveVariants}
        />
      )}
    </div>
  );
}

function Cart(props) {
  var user = props.user;
  var cart = props.cart;
  var setCart = props.setCart;
  var setView = props.setView;
  var callAPI = props.callAPI;
  var globalProps = props.globalProps;

  const [loading, setLoading] = useState(false);
  const [schemes, setSchemes] = useState([]); 
  const [paymentMode, setPaymentMode] = useState("");
  const [screenshotData, setScreenshotData] = useState(null);
  const [discounts, setDiscounts] = useState([{ minAmount: 10000, percent: 1 }, { minAmount: 20000, percent: 1.5 }]);
  const [celebrated25Pcs, setCelebrated25Pcs] = useState(false);

  const cartItems = Object.values(cart);
  const totalAmount = cartItems.reduce((acc, item) => {
    const itemPrice = Number(getProp(item, "DealerPrice") || 0);
    return acc + (itemPrice * item.qty);
  }, 0);
  const totalItems = cartItems.reduce((a, b) => a + b.qty, 0);

  useEffect(() => {
    callAPI({ action: "getDiscounts" }).then(res => {
      if (res && res.success && res.data.length > 0) {
        setDiscounts(res.data);
      }
    }).catch(() => {});
    
    callAPI({ action: "getSchemes" }).then(res => {
      if (res && res.success) {
        setSchemes(res.data);
      }
    }).catch(() => {});
  }, []);

  // 25 Pcs Target Cart Checker Animation
  useEffect(() => {
    if (totalItems >= 25 && !celebrated25Pcs) {
      if (window.confetti) {
        window.confetti({ particleCount: 200, spread: 90, origin: { y: 0.5 }, colors: ['#ffc0cb', '#87ceeb', '#ffd700'] });
      }
      setCelebrated25Pcs(true);
    } else if (totalItems < 25) {
      setCelebrated25Pcs(false);
    }
  }, [totalItems]);

  var sortedDiscountsDesc = [...discounts]
  .map(d => ({ minAmount: Number(d.minAmount), percent: Number(d.percent) }))
  .filter(d => !isNaN(d.minAmount) && !isNaN(d.percent))
  .sort((a, b) => b.minAmount - a.minAmount);

  let bulkPercent = 0;
  for (var i = 0; i < sortedDiscountsDesc.length; i++) {
    if (totalAmount >= sortedDiscountsDesc[i].minAmount) {
      bulkPercent = sortedDiscountsDesc[i].percent;
      break;
    }
  }

  const bulkDiscountAmount = Math.round(totalAmount * (bulkPercent / 100));
  const afterBulkTotal = totalAmount - bulkDiscountAmount;

  const upiDiscountAmount = paymentMode === 'UPI' ? Math.round(afterBulkTotal * 0.02) : 0;
  const finalAmount = afterBulkTotal - upiDiscountAmount;

  // Screenshot base64 conversion framework
  const handleScreenshotUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setScreenshotData({
          base64: ev.target.result.split(',')[1],
          mimeType: file.type,
          filename: file.name
        });
      };
      reader.readAsDataURL(file);
    }
  };

  const updateQty = (product, change) => {
    const updated = Object.assign({}, cart);
    const itemCode = String(getProp(product, "ItemCode") || "");
    if (!itemCode) return;

    const brandStr = String(getProp(product, "Brand") || "").toUpperCase();
    const isAlwaysLiveBrand = brandStr.includes("HIKVISION") || brandStr.includes("VELOCITY");

    const stockVal = parseInt(getProp(product, "Stock") || 0) || 0;
    const currentQty = updated[itemCode] ? updated[itemCode].qty : 0;
    const newQty = currentQty + change;
    const maxLimit = isAlwaysLiveBrand ? 99999 : stockVal;

    if (newQty > maxLimit && maxLimit > 0) return alert("Maximum stock limit reached!");
    if (newQty <= 0) delete updated[itemCode];
    else updated[itemCode] = Object.assign({}, product, { qty: newQty });
    setCart(updated);
  };

  const handleCheckout = function() {
    if (!paymentMode) return alert("Please select Payment Mode!");
    if (paymentMode === 'UPI' && !screenshotData) return alert("Upload Payment Screenshot first!");
    setLoading(true);
    
    var itemsStr = cartItems.map(function(i) {
      const itemName = String(getProp(i, "ProductName") || "Premium Item");
      return itemName + " x" + i.qty;
    }).join(" | ");

    // Schemes metadata checking for explicit backend synchronization
    let unlockedRewardsList = schemes.filter(s => calculateSchemeProgress(cartItems, s).isUnlocked).map(s => s.reward);
    if (totalItems >= 25) {
      unlockedRewardsList.push("Target 25 Pcs Bumper Reward");
    }
    let rewardsCombinedStr = unlockedRewardsList.join(", ");

    callAPI({
      action: "placeOrder",
      order: { 
        phone: user.phone, 
        shopName: user.shopName, 
        items: itemsStr, 
        totalAmount: totalAmount, 
        finalAmount: finalAmount, 
        paymentMode: paymentMode,
        bulkDiscount: bulkDiscountAmount,
        bulkPercent: bulkPercent,
        upiDiscount: upiDiscountAmount,
        rewards: rewardsCombinedStr,
        screenshot: screenshotData
      }
    }).then(function(res) {
      setLoading(false);
      if (res.success) {
        alert("✅ ORDER CONFIRMED!\n\nDear " + user.shopName + ",\nThank you for choosing Yash Marketing.\n\nOrder ID: " + res.orderId + "\nFinal Amount: ₹" + finalAmount + "\n\n We will dispatch it shortly.");
        globalProps.logSpyData("Order Placed", "ID: " + res.orderId + ", Val: ₹" + finalAmount);
        setCart({});
        setView("catalog");
      } else {
        alert("Order failed.");
      }
    });
  };

  return (
    <div className="p-4 bg-gray-50 min-h-screen pb-[150px] font-sans relative">
      
      {totalItems >= 25 && (
        <div className="p-4 mb-4 rounded-2xl border-2 bg-green-50 border-green-500 shadow-md">
           <h4 className="font-black text-xs text-green-950 uppercase flex items-center gap-1">🏆 25 PCS TARGET ACHIEVED</h4>
           <p className="text-[10px] font-bold text-green-700 mt-1">Bumper celebration package and direct extra reward points allocated explicitly under this master checkout request.</p>
        </div>
      )}

      {schemes.map((scheme, idx) => {
        const progress = calculateSchemeProgress(cartItems, scheme);
        return (
          <div key={idx} className={`p-4 mb-4 rounded-2xl border-2 ${progress.isUnlocked ? 'bg-green-50 border-green-500 shadow-md' : 'bg-amber-50 border-amber-300'}`}>
            <h4 className={`font-black text-xs uppercase ${progress.isUnlocked ? 'text-green-800' : 'text-amber-900'}`}>{scheme.message}</h4>
            <div className="w-full bg-gray-200 h-2 rounded-full mt-2 overflow-hidden border border-gray-300 shadow-inner">
               <div className={`${progress.isUnlocked ? 'bg-green-600' : 'bg-amber-500'} h-full transition-all duration-500`} style={{ width: Math.min((progress.current / progress.required) * 100, 100) + '%' }}></div>
            </div>
            <p className={`text-[10px] font-bold mt-1 ${progress.isUnlocked ? 'text-green-700' : 'text-gray-600'}`}>
              {progress.current}/{progress.required} items added. {progress.isUnlocked && "🎉 REWARD UNLOCKED: " + scheme.reward}
            </p>
          </div>
        );
      })}

      <div className="bg-white rounded-2xl shadow-sm border p-4 mb-6">
        {cartItems.length === 0 ? (
          <div className="text-center py-12">
            <span className="text-4xl">🛒</span>
            <p className="font-black text-gray-400 mt-2 text-sm uppercase">Cart Khali Hai</p>
            <button onClick={() => setView("catalog")} className="mt-4 bg-blue-900 text-white text-xs font-bold px-6 py-2 rounded-xl shadow-sm">Catalog par jayein</button>
          </div>
        ) : (
          cartItems.map(item => {
            var smartImg = getSmartImage(item);
            var itemName = String(getProp(item, "ProductName") || "Premium Item");
            var dealerPrice = Number(getProp(item, "DealerPrice") || 0);
            var itemCode = String(getProp(item, "ItemCode") || "");
            
            // Checking if ON ORDER Tag is required in Cart
            var stockVal = parseInt(getProp(item, "Stock") || 0);
            var activeBrandStr = String(getProp(item, "Brand") || "").toUpperCase();
            var isAlwaysLiveBrand = activeBrandStr.includes("HIKVISION") || activeBrandStr.includes("VELOCITY");
            var showOnOrder = isAlwaysLiveBrand && stockVal <= 0;

            return (
              <div key={itemCode} className="flex gap-3 items-center border-b last:border-0 py-3 bg-white relative">
                {smartImg ? (
                  <img src={smartImg} className="w-12 h-12 object-contain rounded-lg border bg-white p-1 flex-shrink-0" />
                ) : (
                  <div className="w-12 h-12 bg-gray-50 rounded-lg border flex items-center justify-center text-gray-300 text-[10px] flex-shrink-0">No Img</div>
                )}

                <div className="flex-grow">
                  <h4 className="text-xs font-bold leading-tight line-clamp-2">{itemName}</h4>
                  {showOnOrder && <span className="text-[8px] bg-orange-100 text-orange-700 px-1 py-0.5 rounded uppercase font-black">On Order (Next Day)</span>}
                  
                  <div className="flex items-center justify-between mt-2">
                    <div className="flex items-center bg-gray-100 rounded-lg p-0.5 border border-gray-200">
                      <button onClick={() => updateQty(item, -1)} className="bg-white text-gray-800 font-black w-6 h-6 rounded-md shadow-sm text-xs flex items-center justify-center">-</button>
                      <span className="font-black text-blue-900 text-xs px-2 min-w-[20px] text-center">{item.qty}</span>
                      <button onClick={() => updateQty(item, 1)} className="bg-blue-900 text-white font-black w-6 h-6 rounded-md shadow-sm text-xs flex items-center justify-center">+</button>
                    </div>
                    <div className="font-black text-gray-900 text-xs text-right">
                      ₹{(dealerPrice * item.qty).toLocaleString('en-IN')}
                    </div>
                  </div>
                </div>
              </div>
            );
          })
        )}

        {cartItems.length > 0 && (
          <div className="flex justify-between items-center mt-3 pt-3 border-t-2 border-dashed border-gray-100">
            <span className="font-bold text-gray-500 uppercase text-[10px]">Net Value</span>
            <span className="font-black text-lg text-gray-900">₹{totalAmount.toLocaleString('en-IN')}</span>
          </div>
        )}

        {cartItems.length > 0 && bulkDiscountAmount > 0 && (
          <div className="flex justify-between items-center mt-2 text-green-700">
            <span className="font-black uppercase text-[10px]">Bulk Discount ({bulkPercent}%)</span>
            <span className="font-black text-sm">-₹{bulkDiscountAmount.toLocaleString('en-IN')}</span>
          </div>
        )}

        {cartItems.length > 0 && paymentMode === 'UPI' && (
          <div className="flex justify-between items-center mt-2 text-green-700">
            <span className="font-black uppercase text-[10px]">UPI Discount (2%)</span>
            <span className="font-black text-sm">-₹{upiDiscountAmount.toLocaleString('en-IN')}</span>
          </div>
        )}

        {cartItems.length > 0 && totalItems >= 25 && (
          <div className="mt-2 text-blue-700 text-[10px] font-black uppercase flex items-center gap-1 bg-blue-50 p-2 rounded-xl border border-blue-100">
             🎁 Unlocked: Target 25 Pcs Bumper Reward Package Included!
          </div>
        )}
      </div>

      {cartItems.length > 0 && (
        <React.Fragment>
          <h2 className="font-black text-gray-800 text-xl mb-4">Payment Options</h2>
          <div className="space-y-3">
            <div onClick={() => setPaymentMode('COD')} className={`p-4 rounded-2xl border-2 cursor-pointer transition-all ${paymentMode === 'COD' ? 'border-blue-600 bg-blue-50 shadow-md' : 'border-gray-200 bg-white'}`}>
              <div className="font-black text-gray-800">Cash On Delivery (COD)</div>
            </div>

            <div onClick={() => setPaymentMode('UPI')} className={`p-4 rounded-2xl border-2 cursor-pointer transition-all ${paymentMode === 'UPI' ? 'border-purple-600 bg-purple-50 shadow-md' : 'border-gray-200 bg-white'}`}>
              <div className="flex justify-between items-center">
                <div className="font-black text-purple-900 flex items-center gap-1.5 tracking-tight">
                  <span className="bg-purple-600 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">PhonePe</span>
                  UPI (2% CASH DISCOUNT)
                </div>
                <div className="bg-red-500 text-white text-[8px] px-2 py-0.5 rounded font-black">EXTRA SAVINGS</div>
              </div>
              {paymentMode === 'UPI' && (
                <div className="mt-4 bg-white p-4 rounded-xl border border-purple-200 text-center animate-fade-in" onClick={(e) => e.stopPropagation()}>
                  <p className="text-xs font-bold mb-3">Scan & Pay Exactly: <span className="text-purple-700 text-xl font-black">₹{finalAmount}</span></p>

                  <div className="relative inline-block border-4 border-purple-700 p-2 rounded-2xl bg-white shadow-md mb-2">
                    <img src={PHONEPE_QR_URL} className="w-48 h-48 object-contain mx-auto" alt="PhonePe UPI Barcode" />
                    <div className="absolute -bottom-2.5 left-1/2 transform -translate-x-1/2 bg-purple-700 text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">PhonePe QR</div>
                  </div>

                  <div className="text-center font-black text-purple-900 mt-3 mb-3 bg-purple-100 py-2 rounded-xl border border-purple-200 select-all">
                    UPI NO: {OFFICE_NUMBER}
                  </div>

                  <p className="text-[10px] text-gray-400 font-bold mb-3">Upload Screenshot after payment to confirm order</p>
                  <input type="file" accept="image/*" onChange={handleScreenshotUpload} className="text-[10px] block mx-auto text-purple-900 font-black" />
                </div>
              )}
            </div>
            
            <div onClick={() => setPaymentMode('DAILY')} className={`p-4 rounded-2xl border-2 cursor-pointer transition-all ${paymentMode === 'DAILY' ? 'border-purple-600 bg-purple-50 shadow-md' : 'border-gray-200 bg-white'}`}>
              <div className="font-black text-purple-900">Daily Collection (Auto-Pay)</div>
              {paymentMode === 'DAILY' && (
                <div className="mt-4 rounded-xl overflow-hidden shadow-inner border border-purple-100">
                  <iframe width="100%" height="180" src="https://www.youtube.com/embed/tgbNymZ7vqY" frameBorder="0" allowFullScreen></iframe>
                </div>
              )}
            </div>
          </div>

          <div className="fixed bottom-[55px] left-0 right-0 max-w-md mx-auto bg-white border-t p-5 rounded-t-3xl shadow-2xl z-40">
            <div className="flex justify-between items-center mb-1 text-[10px] font-bold text-gray-400 uppercase">
              <span>Subtotal</span>
              <span className="line-through font-mono">₹{totalAmount.toLocaleString('en-IN')}</span>
            </div>
            <div className="flex justify-between items-center mb-4">
              <span className="font-black text-gray-800 text-lg">Final Amount</span>
              <span className="text-blue-900 text-2xl font-black">₹{finalAmount.toLocaleString('en-IN')}</span>
            </div>
            <button onClick={handleCheckout} disabled={loading} className={`w-full text-white font-black text-lg py-4 rounded-2xl shadow-lg active:scale-95 flex justify-center items-center ${!paymentMode ? 'bg-gray-300' : 'bg-blue-900'}`}>
              {loading ? <div className="border-4 border-white border-t-transparent w-6 h-6 rounded-full spinner"></div> : "CONFIRM ORDER"}
            </button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function LedgerView(props) {
  var user = props.user;
  var callAPI = props.callAPI;

  const [ledgerData, setLedgerData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    callAPI({ action: "getLedger", phone: user.phone }).then(res => {
      if (res && res.success) {
        setLedgerData(res.data);
      } else {
        alert(res.message || "Ledger statement sync issue.");
      }
      setLoading(false);
    });
  }, []);

  if (loading) return (
    <div className="flex flex-col justify-center items-center h-[70vh] text-blue-900">
      <div className="border-4 border-current border-t-transparent w-12 h-12 rounded-full spinner mb-4"></div>
      <p className="font-bold">Generating Ledger Statement...</p>
    </div>
  );

  let totalDebit = 0;
  let totalCredit = 0;
  ledgerData.forEach(item => {
    totalDebit += item.debit || 0;
    totalCredit += item.credit || 0;
  });
  const netBalance = totalDebit - totalCredit;

  return (
    <div className="p-4 bg-gray-50 min-h-screen pb-[100px] font-sans">
      <div className="bg-white rounded-2xl shadow-sm border p-4 mb-4">
        <h2 className="font-black text-gray-800 text-lg mb-1">Account Summary</h2>
        <p className="text-xs text-gray-400 mb-4 uppercase font-bold">Outstanding Balance</p>

        <div className="grid grid-cols-3 gap-2 text-center">
          <div className="bg-red-50 p-3 rounded-xl border border-red-100">
            <div className="text-[9px] text-red-600 font-bold uppercase">Total Bills</div>
            <div className="font-black text-red-900 text-sm mt-1">₹{Math.round(totalDebit).toLocaleString('en-IN')}</div>
          </div>
          <div className="bg-green-50 p-3 rounded-xl border border-green-100">
            <div className="text-[9px] text-green-600 font-bold uppercase">Total Paid</div>
            <div className="font-black text-green-900 text-sm mt-1">₹{Math.round(totalCredit).toLocaleString('en-IN')}</div>
          </div>
          <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
            <div className="text-[9px] text-blue-600 font-bold uppercase">Outstanding</div>
            <div className="font-black text-blue-900 text-sm mt-1">₹{Math.round(netBalance).toLocaleString('en-IN')}</div>
          </div>
        </div>
      </div>

      <h3 className="font-black text-gray-800 text-md mb-3 px-1">Ledger Entries</h3>
      <div className="space-y-3 font-mono">
        {ledgerData.length === 0 ? (
          <div className="text-center p-8 bg-white rounded-2xl border text-gray-400 font-bold">Koi ledger record nahi mila.</div>
        ) : (
          ledgerData.map((item, index) => {
            const isDebit = item.debit > 0;
            return (
              <div key={index} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex justify-between items-start">
                <div className="w-2/3">
                  <div className="text-[10px] text-gray-400 font-bold">{item.date}</div>
                  <h4 className="text-xs font-black text-gray-800 mt-1 leading-snug">{item.particulars}</h4>
                  {item.vchType && (
                    <div className="flex gap-1.5 mt-1.5 font-sans">
                      <span className="bg-gray-100 text-gray-600 font-bold text-[8px] px-1.5 py-0.5 rounded uppercase">{item.vchType}</span>
                      {item.vchNo && <span className="bg-blue-50 text-blue-600 font-bold text-[8px] px-1.5 py-0.5 rounded">No: {item.vchNo}</span>}
                    </div>
                  )}
                </div>
                <div className="text-right">
                  {isDebit ? (
                    <div>
                      <div className="text-xs text-red-500 font-bold">DR (Debited)</div>
                      <div className="font-black text-red-600 text-base mt-0.5">₹{Math.round(item.debit).toLocaleString('en-IN')}</div>
                    </div>
                  ) : (
                    <div>
                      <div className="text-xs text-green-500 font-bold">CR (Credited)</div>
                      <div className="font-black text-green-600 text-base mt-0.5">₹{Math.round(item.credit).toLocaleString('en-IN')}</div>
                    </div>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>

      <button onClick={() => window.print()} className="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg mt-6 flex items-center justify-center gap-1.5 active:scale-95">
        📥 DOWNLOAD LEDGER PDF
      </button>
    </div>
  );
}

function OrdersHistoryView(props) {
  var user = props.user;
  var callAPI = props.callAPI;
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [zoomedMedia, setZoomedMedia] = useState(null); 

  useEffect(() => {
    callAPI({ action: "getDealerOrders", phone: user.phone }).then(res => {
      if (res && res.success) {
        setOrders(res.data);
      } else {
        alert(res.message || "Orders history fetch failed.");
      }
      setLoading(false);
    });
  }, []);

  const getFileId = (url) => {
    if(!url || typeof url !== 'string') return null;
    const dMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (dMatch) return dMatch[1];
    if (idMatch) return idMatch[1];
    return null;
  };

  if (loading) return (
    <div className="flex flex-col justify-center items-center h-[70vh] text-blue-900">
      <div className="border-4 border-current border-t-transparent w-12 h-12 rounded-full spinner mb-4"></div>
      <p className="font-bold">Generating Order History...</p>
    </div>
  );

  return (
    <div className="p-4 bg-gray-50 min-h-screen pb-[100px] font-sans relative">
      <h2 className="font-black text-gray-800 text-lg mb-4 px-1 uppercase tracking-wide">My Past Orders</h2>
      {orders.length === 0 ? (
        <div className="text-center p-8 bg-white rounded-2xl border text-gray-400 font-bold uppercase">Koi order record nahi mila.</div>
      ) : (
        <div className="space-y-4">
          {orders.map((ord, idx) => {
            var itemsList = ord.items ? ord.items.toString().split(" | ") : ["N/A"];
            return (
              <div key={idx} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col justify-between animate-fade-in">
                <div className="flex justify-between items-start border-b border-gray-50 pb-2 mb-2">
                  <div>
                    <div className="text-[10px] text-gray-400 font-bold">{ord.date}</div>
                    <div className="font-black text-gray-800 text-xs mt-1">{ord.orderId}</div>
                  </div>
                  <span className={`text-[8px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider ${
                    ord.status === "Delivered" ? "bg-green-100 text-green-700" :
                    ord.status === "Dispatched" ? "bg-blue-100 text-blue-700" :
                    "bg-amber-100 text-amber-700"
                  }`}>
                    {ord.status || "Pending"}
                  </span>
                </div>

                {ord.attachments && ord.attachments.length > 0 && (
                    <div className="py-3 border-b border-dashed border-gray-100">
                        <div className="text-[9px] text-gray-400 font-black uppercase mb-2">Order Documents & Tracking</div>
                        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                            {ord.attachments.map((att, i) => {
                                const fileId = getFileId(att.url);
                                
                                let icon = "📄";
                                if(att.type === 'image' || att.label.toLowerCase().includes("screenshot")) icon = "📸";
                                if(att.type === 'audio') icon = "🎧";
                                if(att.type === 'rating') icon = "⭐";
                                
                                return (
                                    <div key={i} 
                                        onClick={() => setZoomedMedia({ ...att, fileId })}
                                        className="min-w-[70px] w-[70px] flex flex-col items-center gap-1 cursor-pointer active:scale-95 transition-transform"
                                    >
                                        <div className="w-14 h-14 bg-gray-50 rounded-xl border border-gray-200 overflow-hidden flex items-center justify-center shadow-sm relative">
                                            {att.type === 'rating' ? (
                                                <span className="text-xl font-black text-amber-500">{att.url}</span>
                                            ) : (
                                                <span className="text-2xl opacity-80">{icon}</span>
                                            )}
                                        </div>
                                        <span className="text-[8px] font-bold text-gray-600 text-center leading-tight line-clamp-2 w-full">{att.label}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                <div className="py-3 border-b border-dashed border-gray-100">
                  <div className="text-[9px] text-gray-400 font-black uppercase mb-1">Items & Billing Blueprint</div>
                  <div className="text-xs font-bold text-gray-700 leading-relaxed whitespace-pre-line">
                    {itemsList.map((it, i) => (
                      <div key={i} className="flex justify-between items-center py-0.5">
                        <span className={it.toLowerCase().includes("discount") || it.toLowerCase().includes("reward") ? "text-green-600 font-black" : ""}>• {it.trim()}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="flex justify-between items-center pt-2">
                  <div>
                    <div className="text-[9px] text-gray-400 font-black uppercase">Payment</div>
                    <div className="text-xs font-black text-gray-600">{ord.paymentMode}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-[9px] text-gray-400 font-black uppercase">Total Amount</div>
                    <div className="text-base font-black text-blue-900">₹{Number(ord.finalAmount || ord.totalAmount || 0).toLocaleString('en-IN')}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {zoomedMedia && (
         <div className="fixed inset-0 bg-black bg-opacity-95 z-[100] flex flex-col justify-center items-center p-4 animate-fade-in" onClick={() => setZoomedMedia(null)}>
            <button className="absolute top-4 right-5 text-white font-black text-xl bg-gray-800 bg-opacity-50 w-10 h-10 rounded-full flex items-center justify-center shadow-md z-50">✕</button>
            <div className="text-white font-black mb-4 uppercase tracking-wider text-center flex flex-col gap-1">
                <span>{zoomedMedia.label}</span>
                <span className="text-[9px] text-gray-400">Secure Viewer</span>
            </div>
            
            {zoomedMedia.type === 'rating' ? (
                <div className="bg-white p-8 rounded-3xl flex flex-col items-center gap-4 border-b-8 border-amber-500 max-w-xs w-full" onClick={(e) => e.stopPropagation()}>
                    <span className="text-6xl">⭐</span>
                    <h3 className="text-gray-900 font-black text-4xl">{zoomedMedia.url}</h3>
                    <p className="text-gray-400 text-xs font-bold uppercase tracking-widest text-center">Order Rating</p>
                </div>
            ) : zoomedMedia.fileId ? (
                <div className="w-full h-[65vh] max-w-sm bg-gray-900 rounded-2xl overflow-hidden shadow-2xl relative border border-gray-800" onClick={(e) => e.stopPropagation()}>
                    <iframe 
                        src={`https://drive.google.com/file/d/${zoomedMedia.fileId}/preview`} 
                        className="w-full h-full border-0" 
                        allow="autoplay"
                    ></iframe>
                </div>
            ) : (
                <div className="bg-gray-800 p-8 rounded-3xl flex flex-col items-center gap-4 border border-gray-700 max-w-sm w-full" onClick={(e) => e.stopPropagation()}>
                    <span className="text-5xl">🔗</span>
                    <h3 className="text-white font-black text-lg text-center">External Link</h3>
                    <p className="text-gray-400 text-xs font-bold text-center mb-2">Click below to open the file securely.</p>
                    <a href={zoomedMedia.url} target="_blank" rel="noreferrer" className="w-full bg-blue-600 text-white font-black px-6 py-4 rounded-xl shadow-lg active:scale-95 flex items-center justify-center gap-2 text-sm">
                        OPEN FILE ↗
                    </a>
                </div>
            )}
            <p className="text-gray-400 text-[10px] mt-6 font-bold uppercase tracking-wider text-center bg-gray-900 bg-opacity-40 px-4 py-1.5 rounded-full select-none pointer-events-none">
                Tap anywhere outside to close preview.
            </p>
         </div>
      )}
    </div>
  );
}

function ProductDetailModal(props) {
  var product = props.product;
  var onClose = props.onClose;
  var cart = props.cart;
  var updateQty = props.updateQty;
  var user = props.user;
  var globalProps = props.globalProps;
  var activeVariants = props.activeVariants;
  var setActiveVariants = props.setActiveVariants;

  var activeItemCode = activeVariants[String(getProp(product, "ItemCode") || "")] || (product.variants && product.variants[0] ? String(getProp(product.variants[0], "ItemCode") || "") : String(getProp(product, "ItemCode") || ""));
  var activeVariant = product.variants ? product.variants.find(v => String(getProp(v, "ItemCode") || "") === activeItemCode) || product : product;

  const [currentImgIndex, setCurrentImgIndex] = useState(0);
  const [imagesList, setImagesList] = useState([]);
  const [isZoomed, setIsZoomed] = useState(false);
  const [zoomScale, setZoomScale] = useState(1.25);

  const activeVariantCode = String(getProp(activeVariant, "ItemCode") || "");
  const currentQty = cart[activeVariantCode] ? cart[activeVariantCode].qty : 0;

  useEffect(() => {
    const list = [];
    const mainImg = getSmartImage(activeVariant);
    if (mainImg) {
      list.push(mainImg);
    }

    var allVariants = product.variants || [product];
    allVariants.forEach(function(v) {
      var vMoreImages = String(getProp(v, "MoreImages") || "");
      if (vMoreImages && vMoreImages.trim() !== "") {
        var extraImages = vMoreImages.split(" | ").map(img => img.trim());
        extraImages.forEach(function(img) {
          if (img !== "" && list.indexOf(img) === -1) {
            list.push(img);
          }
        });
      }
    });

    if (list.length === 0) {
      list.push("https://ui-avatars.com/api/?name=Yash+Marketing&background=f3f4f6&color=1e3a8a&size=200&bold=true");
    }
    setImagesList(list);
  }, [activeVariant, product]);

  const featuresList = [];
  var activeFeatures = String(getProp(activeVariant, "Features") || "");
  if (activeFeatures && activeFeatures.trim() !== "") {
    const parsed = activeFeatures.split(" | ").map(f => f.trim());
    parsed.forEach(f => {
      if (f !== "") featuresList.push(f);
    });
  }

  const mrpVal = Number(getProp(activeVariant, "MRP") || 0);
  const dealerVal = Number(getProp(activeVariant, "DealerPrice") || 0);
  const hasDiscount = !isNaN(mrpVal) && !isNaN(dealerVal) && mrpVal > dealerVal;
  const discountPercent = hasDiscount ? Math.round(((mrpVal - dealerVal) / mrpVal) * 100) : 0;

  const handleNextImage = () => {
    setCurrentImgIndex((prev) => (prev + 1) % imagesList.length);
  };

  const handlePrevImage = () => {
    setCurrentImgIndex((prev) => (prev - 1 + imagesList.length) % imagesList.length);
  };

  if (imagesList.length === 0) return null;

  var activeName = String(getProp(product, "ProductName") || "Premium Item");
  var activeBrand = String(getProp(activeVariant, "Brand") || "Premium");
  var activeType = String(getProp(activeVariant, "Type") || "Accessories");
  var activeStock = String(getProp(activeVariant, "Stock") || "Available");

  const isAlwaysLiveBrand = activeBrand.toUpperCase().includes("HIKVISION") || activeBrand.toUpperCase().includes("VELOCITY");
  const stockValInt = parseInt(activeStock || 0);
  const showOnOrder = isAlwaysLiveBrand && stockValInt <= 0;

  return (
    <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-end justify-center animate-fade-in">
      <div className="absolute inset-0" onClick={onClose}></div>
      <div className="bg-white w-full max-w-md rounded-t-3xl overflow-hidden max-h-[88vh] flex flex-col animate-slide-up shadow-2xl relative z-10 font-sans">

        <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto my-3 cursor-pointer" onClick={onClose}></div>

        <button onClick={onClose} className="absolute right-5 top-3 bg-gray-100 text-gray-700 font-extrabold w-8 h-8 rounded-full flex items-center justify-center shadow-sm hover:bg-gray-200 z-20">✕</button>

        <div className="overflow-y-auto no-scrollbar pb-32">
          <div className="relative bg-white p-4 flex items-center justify-center border-b border-gray-100 h-80 select-none cursor-zoom-in" onClick={() => setIsZoomed(true)}>
            <img
              src={imagesList[currentImgIndex]}
              className="h-72 max-w-full object-contain"
              onError={(e) => {
                if (imagesList.length > 1) {
                  const updatedList = imagesList.filter((_, idx) => idx !== currentImgIndex);
                  setImagesList(updatedList);
                  setCurrentImgIndex(0);
                } else {
                  e.target.src = "https://ui-avatars.com/api/?name=Yash+Marketing&background=f3f4f6&color=1e3a8a&size=200&bold=true";
                }
              }}
            />

            {imagesList.length > 1 && (
              <React.Fragment>
                <button onClick={(e) => { e.stopPropagation(); handlePrevImage(); }} className="absolute left-3 bg-white bg-opacity-95 text-gray-800 font-black p-2.5 rounded-full shadow-md hover:bg-gray-50">←</button>
                <button onClick={(e) => { e.stopPropagation(); handleNextImage(); }} className="absolute right-3 bg-white bg-opacity-95 text-gray-800 font-black p-2.5 rounded-full shadow-md hover:bg-gray-50">→</button>

                <div className="absolute bottom-3 flex gap-1.5 justify-center w-full">
                  {imagesList.map((_, idx) => {
                    const varItemCode = String(getProp(product.variants[idx] || {}, "ItemCode") || "");
                    return (
                      <div key={varItemCode || idx} className={`h-2 rounded-full transition-all ${idx === currentImgIndex ? 'w-5 bg-blue-900' : 'w-2 bg-gray-300'}`}></div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}
          </div>

          <div className="p-5">
            <span className="text-[10px] bg-blue-50 text-blue-900 font-black px-2.5 py-1 rounded-full uppercase tracking-wider">{activeBrand}</span>
            <h2 className="text-lg font-black text-gray-900 mt-2 leading-tight">{activeName}</h2>
            <p className="text-xs text-gray-400 font-bold mt-1 uppercase">Category: {activeType}</p>

            {product.isGrouped && (
              <div className="mt-4">
                <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-2">Select Variant Size</h4>
                <div className="flex flex-wrap gap-2">
                  {product.variants.map(v => {
                    const vItemCode = String(getProp(v, "ItemCode") || "");
                    return (
                      <button
                        key={vItemCode}
                        onClick={() => {
                          var nextActives = Object.assign({}, activeVariants);
                          nextActives[String(getProp(product, "ItemCode") || "")] = vItemCode;
                          setActiveVariants(nextActives);
                        }}
                        className={`text-xs font-black px-3.5 py-2 rounded-xl border transition-all ${vItemCode === activeItemCode ? 'bg-blue-900 text-white border-blue-900 shadow-md' : 'bg-gray-50 text-gray-600 border-gray-100 hover:bg-gray-100'}`}
                      >
                        {v.capacity}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {!globalProps.customerMode ? (
              <div className="mt-4 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Dealer Price ({activeVariant.capacity})</div>
                <div className="flex items-baseline gap-2.5 mt-1">
                  <span className="text-3xl font-black text-blue-950">₹{dealerVal}</span>
                  {hasDiscount && (
                    <React.Fragment>
                      <span className="text-xs text-gray-400 line-through font-bold">MRP: ₹{mrpVal}</span>
                      <span className="text-[10px] bg-green-100 text-green-700 font-black px-2 py-0.5 rounded shadow-sm">{discountPercent}% OFF</span>
                    </React.Fragment>
                  )}
                </div>
                
                <div className="text-[10px] text-green-600 font-bold mt-2 flex items-center gap-1">
                  <span>{showOnOrder ? '⏳' : '📦'}</span> 
                  {showOnOrder ? "ON ORDER (Available Next Day)" : `In Stock Status: ${activeStock} units`}
                </div>
              </div>
            ) : (
              <div className="mt-4 bg-green-50 p-4 rounded-2xl border border-green-100">
                <div className="text-xs text-green-800 font-black uppercase tracking-wider">Offer MRP ({activeVariant.capacity})</div>
                <div className="text-3xl font-black text-green-950 mt-1">₹{mrpVal || 'Contact store'}</div>
              </div>
            )}

            <div className="mt-6">
              <h3 className="font-extrabold text-sm text-gray-900 mb-3 tracking-wide uppercase">Product Key Highlights</h3>
              {featuresList.length === 0 ? (
                <p className="text-xs text-gray-500 font-bold italic leading-relaxed">High-performance authentic build quality with official brand warranty check. Contact us for direct bulk details.</p>
              ) : (
                <ul className="space-y-2.5">
                  {featuresList.map((f, i) => (
                    <li key={i} className="text-xs text-gray-700 font-bold flex items-start gap-2 leading-snug">
                      <span className="text-green-600 text-sm leading-none mt-0.5">⚡</span>
                      <span>{f}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </div>
        </div>

        <div className="absolute bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center z-30 shadow-inner">
          {!globalProps.customerMode ? (
            <React.Fragment>
              <div>
                <div className="text-[9px] uppercase font-black text-gray-400">Total Selection ({activeVariant.capacity})</div>
                <div className="font-black text-lg text-gray-900 leading-none mt-0.5">₹{(dealerVal * (currentQty || 1)).toLocaleString('en-IN')}</div>
              </div>

              <div className="w-1/2">
                {currentQty > 0 ? (
                  <div className="flex justify-between items-center bg-blue-50 rounded-xl p-1 border border-blue-100">
                    <button onClick={() => updateQty(activeVariant, -1)} className="bg-white text-blue-900 font-black w-10 h-10 rounded-lg shadow-sm">-</button>
                    <span className="font-black text-blue-900 text-lg">{currentQty}</span>
                    <button onClick={() => updateQty(activeVariant, 1)} className="bg-blue-900 text-white font-black w-10 h-10 rounded-lg shadow-sm">+</button>
                  </div>
                ) : (
                  <button onClick={() => updateQty(activeVariant, 1)} className="w-full bg-blue-900 text-white text-xs font-black py-4 rounded-xl shadow-lg active:scale-95">
                    {showOnOrder ? "Add To Order (Next Day)" : "Add To Order"}
                  </button>
                )}
              </div>
            </React.Fragment>
          ) : (
            <button onClick={() => {
              const shareText = `🔥 Check out this item at our store!\n\n📦 *Product:* ${activeName} (${activeVariant.capacity})\n⚡ *Brand:* ${activeBrand}\n\n🏢 *Dealer:* ${user ? user.shopName : ''}\n📞 *Contact:* ${user ? user.phone : ''}\n\nAsk for the best price today!`;
              if (navigator.share) {
                navigator.share({ title: activeName, text: shareText, url: imagesList[0] }).catch(() => {});
              } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText + "\nImage: " + imagesList[0])}`, '_blank');
              }
            }} className="w-full bg-green-600 hover:bg-green-700 text-white text-sm font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-1.5 active:scale-95">
              📲 SHARE PHOTO WITH DEALER
            </button>
          )}
        </div>
      </div>

      {isZoomed && (
        <div className="fixed inset-0 bg-black bg-opacity-95 z-[90] flex flex-col justify-center items-center p-4 animate-fade-in cursor-zoom-out" onClick={() => setIsZoomed(false)}>
          <button className="absolute top-4 right-5 text-white font-black text-xl bg-gray-800 bg-opacity-50 w-10 h-10 rounded-full flex items-center justify-center shadow-md">✕</button>

          {imagesList.length > 1 && (
            <div className="absolute left-4 right-4 flex justify-between z-[100] pointer-events-none">
              <button onClick={(e) => { e.stopPropagation(); handlePrevImage(); }} className="pointer-events-auto bg-white bg-opacity-20 text-white font-black w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:bg-opacity-40">←</button>
              <button onClick={(e) => { e.stopPropagation(); handleNextImage(); }} className="pointer-events-auto bg-white bg-opacity-20 text-white font-black w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:bg-opacity-40">→</button>
            </div>
          )}

          <img
            src={imagesList[currentImgIndex]}
            className="max-h-[80vh] max-w-full object-contain transition-transform duration-300 ease-out"
            style={{ transform: 'scale(' + zoomScale + ')' }}
            onClick={(e) => {
              e.stopPropagation();
              setZoomScale(zoomScale === 1.25 ? 2.2 : 1.25);
            }}
            alt="Zoomed Product"
          />
          <p className="text-gray-400 text-[10px] mt-6 font-bold uppercase tracking-wider text-center bg-gray-900 bg-opacity-40 px-4 py-1.5 rounded-full select-none pointer-events-none">
            Tap image to Zoom In / Out. Use arrows to change photos.
          </p>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
