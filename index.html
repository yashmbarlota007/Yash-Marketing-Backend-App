<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Marketing - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stage-card { transition: all 0.2s; cursor: pointer; }
        .stage-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
        .locked { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="loginScreen" class="flex h-[80vh] items-center justify-center">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">YASH MARKETING</h1>
            <p class="text-slate-400 text-sm tracking-widest mb-8 uppercase">Staff Authentication</p>
            <form id="loginForm" class="space-y-4">
                <!-- Changed to text input, updated ID, placeholder, and added uppercase transformation -->
                <input type="text" id="loginEmpId" placeholder="Employee ID (e.g. YM001)" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                <input type="password" id="loginPass" placeholder="Password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition">Initialize Protocol</button>
            </form>
            <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 border-b border-slate-700 pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Active Sprints</h1>
                <p class="text-emerald-400 text-sm mt-1">Logged in as: <span id="userName" class="font-bold"></span></p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 border border-slate-700 rounded-lg p-2 flex items-center">
                    <label class="text-xs text-slate-400 mr-2 uppercase tracking-wider">Audit Date:</label>
                    <input type="date" id="historyDate" onchange="renderDashboard()" class="bg-slate-900 text-sm text-white rounded p-1 border border-slate-600 focus:outline-none focus:border-blue-500">
                    <button onclick="clearDateFilter()" class="ml-2 text-xs text-blue-400 hover:text-blue-300">Clear</button>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-white text-sm bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">Sign Out</button>
            </div>
        </div>

        <div id="stageFilterBar" class="flex overflow-x-auto gap-3 mb-6 pb-2 hide-scrollbar">
            </div>
        
        <div id="orderGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-95 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="glass-panel w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh] shadow-[0_0_50px_rgba(0,0,0,0.6)]">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                <div>
                    <h2 class="text-2xl font-bold text-white" id="modalOrderId">ORD-000</h2>
                    <p class="text-emerald-400 text-sm font-semibold" id="modalShopName">Shop Name</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-3xl font-bold transition-colors">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-grow" id="stagesContainer">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyws0jd3sL7L3rp0nXsHxcnI3A8npsJldRuCeSV_BswzHsYB5Syzm9dLpFlSA_tIW0vsQ/exec"; // <--- PASTE DEPLOYED URL HERE
        
        const STAGE_NAMES = [
            "Order Received", "Balance Check", "Call 1 (Confirmation)", 
            "Processed (Stock)", "Invoiced", "Dispatched", 
            "Call 2 (Out-for-delivery)", "Delivered", "Final Call (Rating)"
        ];

        let allOrdersData = [];
        let currentActiveOrder = null;
        let activeStageFilter = null;

        // --- AUTHENTICATION ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            btn.innerText = "Authenticating...";
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        // Shifted from 'phone' to 'employeeId' to match the backend expectation
                        employeeId: document.getElementById('loginEmpId').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('yash_user', data.user.name);
                    showDashboard(data.user.name);
                } else {
                    error.innerText = data.message;
                    error.classList.remove('hidden');
                    btn.innerText = "Initialize Protocol";
                }
            } catch (err) {
                error.innerText = "Connection Error.";
                error.classList.remove('hidden');
                btn.innerText = "Initialize Protocol";
            }
        });

        function showDashboard(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = name;
            fetchOrders();
        }

        function logout() { localStorage.removeItem('yash_user'); location.reload(); }
        if (localStorage.getItem('yash_user')) { showDashboard(localStorage.getItem('yash_user')); }

        // --- DATA FETCHING ---
        async function fetchOrders() {
            const grid = document.getElementById('orderGrid');
            grid.innerHTML = '<p class="text-slate-400 animate-pulse">Syncing with Control Tower...</p>';
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getOrders' })
                });
                const response = await res.json();
                
                if (response.status === 'success') {
                    allOrdersData = response.data;
                    renderDashboard();
                }
            } catch (err) {
                grid.innerHTML = '<p class="text-red-400">Failed to load system data.</p>';
            }
        }

        function clearDateFilter() {
            document.getElementById('historyDate').value = "";
            renderDashboard();
        }
        
        function setStageFilter(stageIndex) {
            activeStageFilter = stageIndex;
            renderDashboard();
        }

        // --- RENDERING METRICS & CARDS ---
        function renderDashboard() {
            const grid = document.getElementById('orderGrid');
            const filterBar = document.getElementById('stageFilterBar');
            const selectedDate = document.getElementById('historyDate').value;
            
            // Filter Base Data by Date
            let baseOrders = allOrdersData.filter(order => {
                if (selectedDate) {
                    const orderDate = new Date(order.date).toISOString().split('T')[0];
                    return orderDate === selectedDate;
                } else {
                    return !order.isFullyCompleted;
                }
            });

            // Calculate Stage Counts for the Top Bar
            let stageCounts = Array(9).fill(0);
            baseOrders.forEach(o => {
                if(o.completedStages < 9) {
                    stageCounts[o.completedStages]++;
                }
            });

            // Render Stage Filter Pipeline
            let filterHtml = `<button onclick="setStageFilter(null)" class="${activeStageFilter === null ? 'bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-slate-800 hover:bg-slate-700'} px-5 py-2.5 rounded-xl whitespace-nowrap border border-slate-700 text-sm font-bold transition-all text-white shrink-0">Pipeline Overview (All)</button>`;
            
            STAGE_NAMES.forEach((name, idx) => {
                let isActive = activeStageFilter === idx;
                filterHtml += `<button onclick="setStageFilter(${idx})" class="${isActive ? 'bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-slate-800 hover:bg-slate-700'} px-4 py-2.5 rounded-xl whitespace-nowrap border border-slate-700 text-sm flex gap-3 items-center transition-all text-slate-300 shrink-0">
                    <span class="font-medium">Step ${idx+1}: ${name.split(' (')[0]}</span>
                    <span class="${stageCounts[idx] > 0 ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-slate-900 text-slate-500'} px-2.5 py-0.5 rounded-full text-xs font-bold">${stageCounts[idx]}</span>
                </button>`;
            });
            filterBar.innerHTML = filterHtml;

            // Apply Active Stage Filter
            let displayOrders = baseOrders;
            if (activeStageFilter !== null) {
                displayOrders = baseOrders.filter(o => o.completedStages === activeStageFilter);
            }

            // Render Cards
            grid.innerHTML = '';
            if(displayOrders.length === 0) {
                grid.innerHTML = '<div class="col-span-full bg-slate-800/30 border border-slate-700/50 p-8 rounded-2xl text-center"><p class="text-slate-400 text-lg">No orders currently pending at this stage.</p></div>';
                return;
            }

            displayOrders.forEach(order => {
                const progress = (order.completedStages / 9) * 100;
                let dateString = "Invalid Date";
                if(order.date) {
                    const d = new Date(order.date);
                    if(!isNaN(d)) dateString = d.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short' });
                }
                
                let nextStepName = order.completedStages < 9 ? STAGE_NAMES[order.completedStages] : "Fully Completed";
                
                grid.innerHTML += `
                    <div onclick='openModal(${JSON.stringify(order).replace(/'/g, "\\'")})' class="bg-slate-800 border border-slate-700 rounded-xl p-5 stage-card shadow-lg flex flex-col justify-between relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-blue-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                        <div>
                            <div class="flex justify-between items-start mb-2 relative z-10">
                                <h3 class="font-bold text-lg text-white">${order.orderId}</h3>
                                <span class="bg-slate-900 text-[10px] px-2 py-1 rounded border border-slate-700 text-slate-400 font-mono tracking-tighter">${dateString}</span>
                            </div>
                            <p class="text-emerald-400 font-semibold text-sm mb-4 truncate">${order.shopName}</p>
                            
                            <div class="bg-slate-900/50 p-3 rounded-lg mb-4 border border-slate-700/50 flex items-center justify-between">
                                <span class="text-xs text-slate-400 uppercase tracking-widest font-bold">Pending Action:</span>
                                <span class="text-xs text-blue-400 font-bold bg-blue-900/30 px-2 py-1 rounded">${nextStepName}</span>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2 font-medium">
                                <span>Pipeline Progress</span>
                                <span class="text-white">${order.completedStages} / 9</span>
                            </div>
                            <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-700">
                                <div class="bg-gradient-to-r from-blue-500 to-emerald-400 h-2 rounded-full shadow-[0_0_10px_rgba(52,211,153,0.5)]" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- EXECUTION MODAL LOGIC ---
        function openModal(order) {
            currentActiveOrder = order;
            document.getElementById('modalOrderId').innerText = order.orderId;
            document.getElementById('modalShopName').innerText = order.shopName;
            
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            
            // --- NEW: Visual Order Items Roster ---
            let itemsHtml = `
                <div class="mb-8 bg-slate-800 border border-slate-600 rounded-xl p-5 shadow-inner">
                    <h3 class="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        Items to Pick
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-52 overflow-y-auto pr-2 hide-scrollbar">
            `;
            
            if (order.items && order.items.length > 0) {
                order.items.forEach(item => {
                    let imgTag = item.image 
                        ? `<img src="${item.image}" class="w-14 h-14 object-cover rounded bg-white p-1">` 
                        : `<div class="w-14 h-14 bg-slate-700 rounded flex items-center justify-center text-[10px] text-slate-400 font-mono text-center leading-tight">No Img</div>`;
                    
                    itemsHtml += `
                        <div class="flex items-center gap-4 bg-slate-900/80 p-3 rounded-lg border border-slate-700 hover:border-slate-500 transition-colors">
                            ${imgTag}
                            <div class="flex-1 min-w-0">
                                <p class="text-sm text-white font-semibold leading-tight truncate" title="${item.name}">${item.name}</p>
                                <div class="mt-1 flex items-center gap-2">
                                    <span class="text-xs text-slate-400">Qty:</span>
                                    <span class="text-sm font-bold text-emerald-400 bg-emerald-900/30 px-2 rounded">${item.qty}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                itemsHtml += `<p class="text-sm text-slate-500 italic">No products detected. Check Data format.</p>`;
            }
            itemsHtml += `</div></div>`;
            container.innerHTML += itemsHtml;

            // --- Stages Logic ---
            let stagesListHtml = '<div class="space-y-4">';
            for (let i = 0; i < 9; i++) {
                const stageNum = i + 1;
                const isCompleted = i < order.completedStages;
                const isActive = i === order.completedStages;
                const isLocked = i > order.completedStages;
                
                let uiHtml = '';
                
                if (isCompleted) {
                    let fileUrl = order.stageUrls ? order.stageUrls[i] : "";
                    let previewHtml = "";
                    
                    if (fileUrl && fileUrl.includes("http")) {
                        if (stageNum === 3 || stageNum === 7 || stageNum === 9) { 
                            previewHtml = `<div class="mt-3 bg-slate-900/50 p-2 rounded-lg border border-slate-700"><audio controls src="${fileUrl}" class="w-full h-8 outline-none"></audio></div>`;
                        } else { 
                            previewHtml = `<a href="${fileUrl}" target="_blank" class="mt-3 inline-flex items-center text-xs font-bold text-blue-400 hover:text-blue-300 bg-blue-900/30 px-4 py-2 rounded-lg border border-blue-800 transition shadow-sm">View Uploaded Proof &rarr;</a>`;
                        }
                    }

                    uiHtml = `<div class="bg-emerald-900/10 border border-emerald-500/30 rounded-xl p-4 flex flex-col justify-between opacity-80 hover:opacity-100 transition-opacity">
                                <div class="flex justify-between items-center">
                                    <span class="text-emerald-400 font-medium">${stageNum}. ${STAGE_NAMES[i]}</span>
                                    <span class="text-emerald-500 font-bold bg-emerald-900/50 px-3 py-1 rounded text-xs shadow-inner">✔ COMPLETED</span>
                                </div>
                                ${previewHtml}
                              </div>`;
                } else if (isLocked) {
                    uiHtml = `<div class="bg-slate-800/30 border border-slate-700/50 rounded-xl p-4 locked flex items-center justify-between">
                                <span class="text-slate-500">${stageNum}. ${STAGE_NAMES[i]}</span>
                                <span class="text-slate-600 font-mono text-xs tracking-widest">LOCKED</span>
                              </div>`;
                } else if (isActive) {
                    let inputHtml = '';
                    if (stageNum === 1) {
                        inputHtml = `<button onclick="submitStage(${stageNum})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95 text-lg">Accept Task & Begin Processing</button>`;
                    } else {
                        let acceptType = "image/*";
                        if (stageNum === 3 || stageNum === 7 || stageNum === 9) acceptType = "audio/mp3,audio/wav,audio/m4a,audio/*"; 
                        
                        inputHtml = `<input type="file" id="fileUpload" accept="${acceptType}" class="w-full mt-4 text-sm text-slate-300 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-500 file:transition-colors bg-slate-900 p-1.5 rounded-lg border border-slate-600 cursor-pointer">`;
                        
                        if (stageNum === 9) {
                            inputHtml += `<input type="number" id="ratingInput" min="1" max="5" placeholder="Enter Customer Rating (1-5)" class="w-full mt-4 bg-slate-900 border border-slate-600 rounded-lg p-3.5 text-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold">`;
                        }
                        inputHtml += `<button id="submitBtn_${stageNum}" onclick="submitStage(${stageNum})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all active:scale-95 text-lg">Upload Proof & Complete Task</button>`;
                    }
                    
                    uiHtml = `<div class="bg-slate-800 border-2 border-blue-500 rounded-xl p-6 shadow-[0_0_30px_rgba(59,130,246,0.15)] relative overflow-hidden transform scale-[1.02] transition-transform">
                                <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500 shadow-[0_0_10px_#3b82f6]"></div>
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-white font-bold text-xl">${stageNum}. ${STAGE_NAMES[i]}</span>
                                    <span class="bg-blue-500/20 text-blue-400 border border-blue-500/50 text-[10px] font-bold px-2 py-1 rounded animate-pulse tracking-widest uppercase">Action Required</span>
                                </div>
                                <div id="actionArea_${stageNum}">${inputHtml}</div>
                                <p id="status_${stageNum}" class="text-sm mt-3 hidden font-mono"></p>
                              </div>`;
                }
                stagesListHtml += uiHtml;
            }
            stagesListHtml += '</div>';
            container.innerHTML += stagesListHtml;
            
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
            fetchOrders(); 
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function submitStage(stageNum) {
            const btn = document.getElementById(`submitBtn_${stageNum}`);
            const statusLabel = document.getElementById(`status_${stageNum}`);
            let payload = { action: 'updateStage', orderId: currentActiveOrder.orderId, stage: stageNum };
            
            if (stageNum !== 1) {
                const fileInput = document.getElementById('fileUpload');
                if (fileInput.files.length === 0) { alert("Proof file is required to clear this stage."); return; }
                
                const file = fileInput.files[0];
                if ([3, 7, 9].includes(stageNum) && !file.type.startsWith('audio/')) {
                    alert("System Restriction: Audio proof required for this task.");
                    fileInput.value = ""; return;
                }
                if (![1, 3, 7, 9].includes(stageNum) && !file.type.startsWith('image/')) {
                    alert("System Restriction: Image/Photo proof required for this task.");
                    fileInput.value = ""; return;
                }

                btn.innerText = "Encoding & Transmitting..."; btn.disabled = true;
                payload.fileName = file.name;
                payload.mimeType = file.type;
                payload.fileBase64 = await getBase64(file);
                
                if (stageNum === 9) {
                    const rating = document.getElementById('ratingInput').value;
                    if(!rating) { alert("Customer Rating required."); btn.disabled = false; btn.innerText = "Upload Proof & Complete Task"; return;}
                    payload.rating = rating;
                }
            } else {
                if(btn) { btn.innerText = "Initiating Process..."; btn.disabled = true; }
            }
            
            if(statusLabel) {
                statusLabel.innerText = "> Uplinking to Control Tower...";
                statusLabel.className = "text-xs mt-3 text-blue-400 block animate-pulse";
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                
                if (data.status === 'success') {
                    closeModal(); 
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                if(statusLabel) {
                    statusLabel.innerText = "> Sync Failed. Check network.";
                    statusLabel.className = "text-xs mt-3 text-red-500 block font-bold";
                }
                if(btn) { btn.innerText = "Retry Transmission"; btn.disabled = false; }
            }
        }
    </script>
</body>
</html>
